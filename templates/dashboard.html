{% raw %}
<!-- Add this just before the closing body tag in dashboard.html -->

<script>
// Loading state management
document.addEventListener('DOMContentLoaded', function() {
    // Setup loading indicators
    setupLoadingIndicators();
    
    // Add loading functionality to all data sections
    setupDataSectionLoading();
    
    // Setup refresh functionality
    setupRefreshButtons();
});

function setupLoadingIndicators() {
    // Create loading overlay template
    const loadingTemplate = `
        <div class="loading-overlay fixed inset-0 bg-white bg-opacity-75 flex items-center justify-center z-50">
            <div class="text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
                <p class="mt-4 text-gray-700">Loading data...</p>
            </div>
        </div>
    `;
    
    // Insert template into document
    const templateDiv = document.createElement('div');
    templateDiv.id = 'loading-template';
    templateDiv.style.display = 'none';
    templateDiv.innerHTML = loadingTemplate;
    document.body.appendChild(templateDiv);
}

function setupDataSectionLoading() {
    // Add loading states to all panel elements
    document.querySelectorAll('.panel').forEach(panel => {
        // Create a panel-specific loading indicator
        const loadingIndicator = document.createElement('div');
        loadingIndicator.className = 'panel-loading hidden absolute inset-0 bg-white bg-opacity-75 flex items-center justify-center z-10';
        loadingIndicator.innerHTML = `
            <div class="text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500"></div>
                <p class="mt-2 text-sm text-gray-700">Loading...</p>
            </div>
        `;
        
        // Make panel position relative for absolute positioning of indicator
        panel.style.position = 'relative';
        panel.appendChild(loadingIndicator);
    });
}

function showPanelLoading(panelElement) {
    const loadingElement = panelElement.querySelector('.panel-loading');
    if (loadingElement) {
        loadingElement.classList.remove('hidden');
    }
}

function hidePanelLoading(panelElement) {
    const loadingElement = panelElement.querySelector('.panel-loading');
    if (loadingElement) {
        loadingElement.classList.add('hidden');
    }
}

function showGlobalLoading() {
    const loadingOverlay = document.createElement('div');
    loadingOverlay.className = 'loading-overlay fixed inset-0 bg-white bg-opacity-75 flex items-center justify-center z-50';
    loadingOverlay.innerHTML = document.getElementById('loading-template').innerHTML;
    document.body.appendChild(loadingOverlay);
    return loadingOverlay;
}

function hideGlobalLoading(overlayElement) {
    if (overlayElement && overlayElement.parentNode) {
        overlayElement.parentNode.removeChild(overlayElement);
    }
}

function setupRefreshButtons() {
    // Global refresh button
    const refreshDataButton = document.querySelector('a[href*="ingest_threat_data"]');
    if (refreshDataButton) {
        refreshDataButton.addEventListener('click', function(e) {
            e.preventDefault();
            const originalHtml = this.innerHTML;
            this.innerHTML = '<i class="fas fa-sync fa-spin mr-2"></i> Refreshing...';
            this.classList.add('pointer-events-none', 'opacity-75');
            
            const overlay = showGlobalLoading();
            
            // Make the actual request
            fetch(this.href)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(() => {
                    // Reload the page to show updated data
                    window.location.reload();
                })
                .catch(error => {
                    console.error('Error:', error);
                    hideGlobalLoading(overlay);
                    this.innerHTML = originalHtml;
                    this.classList.remove('pointer-events-none', 'opacity-75');
                    alert('Error refreshing data. Please try again.');
                });
        });
    }
    
    // Individual panel refresh buttons
    document.querySelectorAll('.panel-header a[href*="view"]').forEach(btn => {
        btn.addEventListener('click', function(e) {
            const panel = this.closest('.panel');
            if (panel) {
                showPanelLoading(panel);
            }
        });
    });
}

// Function to refresh data in specific panels via API
function refreshPanelData(panelElement, endpoint, params = {}) {
    if (!panelElement) return;
    
    showPanelLoading(panelElement);
    
    // Build query string
    const queryString = Object.keys(params)
        .map(key => `${encodeURIComponent(key)}=${encodeURIComponent(params[key])}`)
        .join('&');
    
    const url = `/api/${endpoint}${queryString ? '?' + queryString : ''}`;
    
    fetch(url)
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
        })
        .then(data => {
            // Update panel content based on data
            updatePanelContent(panelElement, data);
            hidePanelLoading(panelElement);
        })
        .catch(error => {
            console.error('Error refreshing panel data:', error);
            hidePanelLoading(panelElement);
        });
}

function updatePanelContent(panelElement, data) {
    // This function would be customized based on the specific panel
    // For example, to update a table, chart, etc.
    
    // Generic identification logic - what type of panel is this?
    const hasTable = panelElement.querySelector('table') !== null;
    const hasChart = panelElement.querySelector('[id$="Chart"]') !== null;
    
    if (hasTable) {
        updateTableContent(panelElement, data);
    } else if (hasChart) {
        updateChartContent(panelElement, data);
    } else {
        // Generic update - just update text content
        const contentDiv = panelElement.querySelector('.panel-body');
        if (contentDiv && data.html) {
            contentDiv.innerHTML = data.html;
        }
    }
}

function updateTableContent(panelElement, data) {
    const tableBody = panelElement.querySelector('tbody');
    if (!tableBody || !data.records) return;
    
    // Clear existing rows
    tableBody.innerHTML = '';
    
    // Check if we have data
    if (data.records.length === 0) {
        const colSpan = panelElement.querySelectorAll('thead th').length || 4;
        tableBody.innerHTML = `
            <tr>
                <td colspan="${colSpan}" class="px-6 py-4 text-center text-gray-500">
                    <div class="py-6">
                        <i class="fas fa-info-circle text-gray-300 text-4xl mb-3"></i>
                        <p>No data available</p>
                    </div>
                </td>
            </tr>
        `;
        return;
    }
    
    // Add new rows based on panel type
    const panelTitle = panelElement.querySelector('.panel-title')?.textContent.toLowerCase() || '';
    
    if (panelTitle.includes('campaign')) {
        // Campaigns table
        data.records.forEach(campaign => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <a href="/content/campaign/${campaign.campaign_id}" class="text-blue-600 hover:underline">
                        ${campaign.campaign_name || 'Unknown Campaign'}
                    </a>
                </td>
                <td>${campaign.threat_actor || 'Unknown'}</td>
                <td>${campaign.source_count || 0}</td>
                <td>${formatDate(campaign.last_seen || 'N/A')}</td>
                <td>
                    <span class="severity-badge ${campaign.severity || 'medium'}">${campaign.severity || 'Medium'}</span>
                </td>
            `;
            tableBody.appendChild(row);
        });
    } else if (panelTitle.includes('ioc') || panelTitle.includes('indicator')) {
        // IOCs table
        data.records.forEach(ioc => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <span class="badge-ioc badge-${ioc.type || 'unknown'}">${ioc.type || 'unknown'}</span>
                </td>
                <td>
                    <a href="/content/ioc/${ioc.type}/${ioc.value}" class="text-blue-600 hover:underline truncate max-w-xs block">
                        ${ioc.value || 'Unknown Value'}
                    </a>
                </td>
                <td>${ioc.sources || ioc.count || 0}</td>
                <td>
                    <div class="w-24 bg-gray-200 rounded-full h-1.5">
                        <div class="bg-blue-500 h-1.5 rounded-full" style="width: 40%"></div>
                    </div>
                    <span class="text-xs text-gray-500">Medium</span>
                </td>
            `;
            tableBody.appendChild(row);
        });
    } else {
        // Generic table - just add fields we have
        data.records.forEach(record => {
            const row = document.createElement('tr');
            let cells = '';
            for (const [key, value] of Object.entries(record)) {
                if (key.startsWith('_')) continue; // Skip internal fields
                cells += `<td>${value}</td>`;
            }
            row.innerHTML = cells;
            tableBody.appendChild(row);
        });
    }
}

function updateChartContent(panelElement, data) {
    // Get chart element
    const chartEl = panelElement.querySelector('[id$="Chart"]');
    if (!chartEl) return;
    
    const chartId = chartEl.id;
    
    // Different update logic based on chart type
    if (chartId.includes('ioc')) {
        // IOC type distribution chart
        if (data.types) {
            const labels = data.types.map(t => t.type);
            const values = data.types.map(t => t.count);
            
            Plotly.newPlot(chartId, [{
                labels: labels,
                values: values,
                type: 'pie',
                textinfo: 'label+percent',
                insidetextorientation: 'radial',
                marker: {
                    colors: ['#fcd34d', '#10b981', '#3b82f6', '#ef4444', '#f97316']
                }
            }], {
                margin: { t: 0, b: 10, l: 10, r: 10 },
                showlegend: true,
                legend: { orientation: 'h', y: -0.1 }
            });
        }
    } else if (chartId.includes('activity')) {
        // Activity chart
        if (data.daily_counts) {
            const dates = data.daily_counts.map(d => d.date);
            const counts = data.daily_counts.map(d => d.count);
            
            Plotly.newPlot(chartId, [{
                x: dates,
                y: counts,
                type: 'scatter',
                mode: 'lines+markers',
                line: { color: '#3b82f6', shape: 'spline' },
                marker: { color: '#3b82f6', size: 6 }
            }], {
                margin: { t: 10, b: 30, l: 40, r: 10 },
                xaxis: { title: '' },
                yaxis: { title: 'Records' }
            });
        }
    } else {
        // Generic chart - just try to update with the data we have
        if (data.labels && data.values) {
            Plotly.newPlot(chartId, [{
                x: data.labels,
                y: data.values,
                type: 'bar',
                marker: { color: '#3b82f6' }
            }], {
                margin: { t: 10, b: 30, l: 40, r: 10 }
            });
        }
    }
}

// Helper function to format dates
function formatDate(dateString) {
    if (!dateString || dateString === 'N/A') return 'N/A';
    
    try {
        const date = new Date(dateString);
        return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
    } catch (e) {
        return dateString;
    }
}
</script>

<style>
.loading-overlay {
    backdrop-filter: blur(2px);
}
.panel-loading {
    backdrop-filter: blur(1px);
}
</style>
{% endraw %}
