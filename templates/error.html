{% extends "base.html" %}

{% block title %}
{{ error_code }} Error - Threat Intelligence Platform
{% endblock %}

{% block content %}
<div class="page-header mb-6">
    <h1 class="text-2xl font-bold mb-2 flex items-center">
        <i class="fas fa-{{ error_icon|default('exclamation-triangle') }} text-red-600 mr-3"></i>
        {{ error_code }} - {{ error_message }}
    </h1>
    <p class="text-gray-600">{{ error_description }}</p>
</div>

<div class="auth-card max-w-lg mx-auto">
    <div class="text-center mb-8">
        <div class="text-red-600 text-6xl mb-4 flex justify-center">
            <i class="fas fa-{{ error_icon|default('exclamation-triangle') }}"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-3">{{ error_message }}</h2>
        <p class="text-gray-600">{{ error_description }}</p>
    </div>
    
    <div class="flex justify-center space-x-4">
        <a href="/" class="btn btn-primary flex items-center">
            <i class="fas fa-home mr-2"></i> Go to Dashboard
        </a>
        <a href="javascript:window.history.back()" class="btn btn-secondary flex items-center">
            <i class="fas fa-arrow-left mr-2"></i> Go Back
        </a>
    </div>
</div>
{% endblock %}
