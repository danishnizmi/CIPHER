# Cloud Build configuration for Threat Intelligence Platform
# Production-ready configuration with all fixes applied

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: threat-intelligence-platform
  _DATASET: threat_intelligence
  _BUCKET_SUFFIX: threat-data
  _MIN_INSTANCES: '1'
  _MAX_INSTANCES: '10'
  _MEMORY: 2Gi
  _CPU: '2'

steps:
  # Step 0: Create necessary GCP resources
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    env:
      - 'PROJECT_ID=$PROJECT_ID'
    args:
      - '-c'
      - |
        set -e
        echo "======================================"
        echo "Creating necessary GCP resources..."
        echo "======================================"
        echo "PROJECT_ID: $$PROJECT_ID"
        
        # Create BigQuery dataset if it doesn't exist
        echo "Checking BigQuery dataset: ${_DATASET}"
        if bq show --project_id=$$PROJECT_ID "$$PROJECT_ID:${_DATASET}" >/dev/null 2>&1; then
          echo "BigQuery dataset already exists: ${_DATASET}"
        else
          echo "Creating BigQuery dataset: ${_DATASET}"
          bq mk --project_id=$$PROJECT_ID --location=US "$$PROJECT_ID:${_DATASET}"
        fi
        
        # Create all required BigQuery tables
        echo "Creating required BigQuery tables..."
        TABLES=("indicators" "vulnerabilities" "threat_actors" "campaigns" "malware")
        for table in "$${TABLES[@]}"; do
          if bq show --project_id=$$PROJECT_ID "$$PROJECT_ID:${_DATASET}.$${table}" >/dev/null 2>&1; then
            echo "Table already exists: $${table}"
          else
            echo "Creating table: $${table}"
            # Create table with minimal schema - the app will handle schema updates
            if [ "$${table}" = "indicators" ]; then
              bq mk --project_id=$$PROJECT_ID \
                "$$PROJECT_ID:${_DATASET}.$${table}" \
                id:STRING,value:STRING,type:STRING,created_at:TIMESTAMP
            else
              bq mk --project_id=$$PROJECT_ID \
                "$$PROJECT_ID:${_DATASET}.$${table}" \
                id:STRING,created_at:TIMESTAMP
            fi
          fi
        done
        
        # Create Cloud Storage bucket if it doesn't exist
        BUCKET_NAME="$$PROJECT_ID-${_BUCKET_SUFFIX}"
        echo "Checking Cloud Storage bucket: $${BUCKET_NAME}"
        if gsutil ls -p $$PROJECT_ID gs://$${BUCKET_NAME} >/dev/null 2>&1; then
          echo "Cloud Storage bucket already exists: $${BUCKET_NAME}"
        else
          echo "Creating Cloud Storage bucket: $${BUCKET_NAME}"
          gsutil mb -p $$PROJECT_ID -l ${_REGION} gs://$${BUCKET_NAME}
          
          # Create folder structure
          echo "Creating folder structure..."
          for folder in feeds raw processed cache exports; do
            echo "Creating folder: $${folder}/"
            # Using echo to create empty file instead of /dev/null
            echo "" | gsutil cp - gs://$${BUCKET_NAME}/$${folder}/.keep
          done
        fi
        
        # Create Pub/Sub topics if they don't exist
        echo "Creating Pub/Sub topics..."
        TOPICS=("threat-data-ingestion" "threat-analysis-events")
        for topic in "$${TOPICS[@]}"; do
          if gcloud pubsub topics describe $${topic} --project=$$PROJECT_ID >/dev/null 2>&1; then
            echo "Pub/Sub topic already exists: $${topic}"
          else
            echo "Creating Pub/Sub topic: $${topic}"
            gcloud pubsub topics create $${topic} --project=$$PROJECT_ID
          fi
        done
        
        # Create API key secret if it doesn't exist
        echo "Checking secrets..."
        if ! gcloud secrets describe api-keys --project=$$PROJECT_ID >/dev/null 2>&1; then
          echo "Creating secret: api-keys"
          API_KEY=$$(openssl rand -hex 32)
          echo "Generated API key: $${API_KEY:0:8}..."
          echo -n "$${API_KEY}" | gcloud secrets create api-keys --data-file=- --project=$$PROJECT_ID
        else
          echo "Secret already exists: api-keys"
        fi
        
        # Create feed configuration secret if it doesn't exist
        if ! gcloud secrets describe feed-config --project=$$PROJECT_ID >/dev/null 2>&1; then
          echo "Creating secret: feed-config"
          cat > /tmp/feed-config.json << 'EOF'
        {
          "feeds": [
            {
              "id": "threatfox",
              "name": "ThreatFox IOCs",
              "url": "https://threatfox.abuse.ch/export/json/recent/",
              "description": "Recent indicators from ThreatFox",
              "format": "json",
              "type": "mixed",
              "update_frequency": "daily",
              "enabled": true
            },
            {
              "id": "urlhaus",
              "name": "URLhaus Malware",
              "url": "https://urlhaus.abuse.ch/downloads/csv_recent/",
              "description": "Recent malware URLs from URLhaus",
              "format": "csv",
              "type": "url",
              "update_frequency": "daily",
              "enabled": true
            }
          ]
        }
        EOF
          cat /tmp/feed-config.json | gcloud secrets create feed-config --data-file=- --project=$$PROJECT_ID
          rm -f /tmp/feed-config.json
        else
          echo "Secret already exists: feed-config"
        fi
        
        # Grant necessary permissions to the service account
        SA="cloud-build-service@$$PROJECT_ID.iam.gserviceaccount.com"
        echo "Granting permissions to service account: $${SA}"
        
        # Required roles - fixing the condition issue
        ROLES=(
          "roles/bigquery.dataEditor"
          "roles/storage.objectAdmin"
          "roles/pubsub.editor"
          "roles/secretmanager.secretAccessor"
          "roles/run.developer"
          "roles/logging.logWriter"
          "roles/errorreporting.writer"
          "roles/monitoring.metricWriter"
        )
        
        for role in "$${ROLES[@]}"; do
          echo "Checking role: $${role}"
          if ! gcloud projects get-iam-policy $$PROJECT_ID --flatten="bindings[].members" --format='csv(bindings.role,bindings.members)' | grep -q "$${role},serviceAccount:$${SA}"; then
            echo "Granting role: $${role}"
            # Adding --condition=None to explicitly specify no condition
            gcloud projects add-iam-policy-binding $$PROJECT_ID \
              --member="serviceAccount:$${SA}" \
              --role="$${role}" \
              --condition=None \
              --quiet
          else
            echo "Role already exists: $${role}"
          fi
        done
        
        echo "======================================"
        echo "Resource creation completed successfully"
        echo "======================================"

  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest'
      - '.'
    timeout: '900s'

  # Step 2: Push Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME'
    timeout: '600s'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=$_MEMORY'
      - '--cpu=$_CPU'
      - '--min-instances=$_MIN_INSTANCES'
      - '--max-instances=$_MAX_INSTANCES'
      - '--timeout=900'
      - '--concurrency=80'
      - '--cpu-boost'
      - '--execution-environment=gen2'
      - '--set-env-vars=ENVIRONMENT=production,GCP_PROJECT=$PROJECT_ID,GCP_REGION=$_REGION,BIGQUERY_DATASET=$_DATASET,GCS_BUCKET=$PROJECT_ID-$_BUCKET_SUFFIX,PUBSUB_TOPIC=threat-data-ingestion,PUBSUB_ANALYSIS_TOPIC=threat-analysis-events,VERSION=1.0.3,DEBUG=false,PYTHONPATH=/app,PYTHONDONTWRITEBYTECODE=1,PYTHONUNBUFFERED=1,LOG_LEVEL=INFO,LOG_TO_CLOUD=true,ENABLE_ERROR_REPORTING=true,AUTO_ANALYZE=false,NLP_ENABLED=true,ANALYSIS_ENABLED=true,BIGQUERY_MAX_BYTES_BILLED=104857600,ENSURE_GCP_RESOURCES=false'
      - '--set-secrets=API_KEY=api-keys:latest'
      - '--service-account=cloud-build-service@$PROJECT_ID.iam.gserviceaccount.com'
      - '--quiet'
    timeout: '900s'

  # Step 4: Verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    env:
      - 'PROJECT_ID=$PROJECT_ID'
    args:
      - '-c'
      - |
        set -e
        echo "======================================"
        echo "Verifying deployment..."
        echo "======================================"
        
        # Give Cloud Run a moment to stabilize
        sleep 10
        
        # Get the service URL
        SERVICE_URL=$$(gcloud run services describe $_SERVICE_NAME \
          --platform managed \
          --region $_REGION \
          --project $$PROJECT_ID \
          --format 'value(status.url)')
        
        echo "Service URL: $${SERVICE_URL}"
        
        # Wait for the service to be ready
        echo "Waiting for service to be ready..."
        MAX_ATTEMPTS=60
        ATTEMPT=1
        
        while [ $$ATTEMPT -le $$MAX_ATTEMPTS ]; do
          echo "Attempt $$ATTEMPT/$$MAX_ATTEMPTS: Checking service health..."
          
          HTTP_CODE=$$(curl -s -o /dev/null -w "%{http_code}" "$${SERVICE_URL}/health" --max-time 10 || echo "000")
          
          if [ "$${HTTP_CODE}" -eq 200 ]; then
            echo "✓ Service is ready! (HTTP 200)"
            break
          elif [ "$${HTTP_CODE}" -eq 503 ] || [ "$${HTTP_CODE}" -eq 500 ]; then
            echo "Service is initializing (HTTP $${HTTP_CODE})..."
            if RESPONSE=$$(curl -s "$${SERVICE_URL}/health" --max-time 10 2>/dev/null); then
              echo "Response: $${RESPONSE}" | jq '.' 2>/dev/null || echo "$${RESPONSE}" | head -n 5
            fi
          else
            echo "Service returned HTTP $${HTTP_CODE}"
          fi
          
          if [ $$ATTEMPT -eq $$MAX_ATTEMPTS ]; then
            echo "WARNING: Service health check not successful after $$MAX_ATTEMPTS attempts"
            echo "The service may need more time to fully initialize."
            echo "Please check the logs for more information."
            # Don't fail the build, as the service might still be initializing
            break
          fi
          
          ATTEMPT=$$((ATTEMPT + 1))
          sleep 10
        done
        
        # Perform final checks
        echo "======================================"
        echo "Performing final deployment checks..."
        echo "======================================"
        
        # Check service status
        echo "Service Status:"
        gcloud run services describe $_SERVICE_NAME \
          --platform managed \
          --region $_REGION \
          --project $$PROJECT_ID \
          --format 'table(status.conditions.type,status.conditions.status,status.conditions.message)'
        
        # Get revisions
        echo ""
        echo "Service Revisions:"
        gcloud run revisions list \
          --service $_SERVICE_NAME \
          --platform managed \
          --region $_REGION \
          --project $$PROJECT_ID \
          --limit 3 \
          --format 'table(metadata.name:label=REVISION,status.conditions[0].status:label=READY,metadata.creationTimestamp:sort=1:reverse:label=CREATED)'
        
        # Final status check
        echo ""
        if STATUS_RESPONSE=$$(curl -s "$${SERVICE_URL}/status" --max-time 10 2>/dev/null); then
          echo "Service status response:"
          echo "$${STATUS_RESPONSE}" | jq '.' 2>/dev/null || echo "$${STATUS_RESPONSE}"
        fi
        
        # Print deployment information
        echo "======================================"
        echo "Deployment Information:"
        echo "======================================"
        echo "✓ Service URL: $${SERVICE_URL}"
        echo "✓ Service Name: $_SERVICE_NAME"
        echo "✓ Region: $_REGION"
        echo "✓ Image: gcr.io/$$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA"
        echo ""
        echo "Useful links:"
        echo "- Service URL: $${SERVICE_URL}"
        echo "- Logs: https://console.cloud.google.com/logs/query;query=resource.type%3D%22cloud_run_revision%22%0Aresource.labels.service_name%3D%22$_SERVICE_NAME%22?project=$$PROJECT_ID"
        echo "- Cloud Run Console: https://console.cloud.google.com/run/detail/$_REGION/$_SERVICE_NAME/metrics?project=$$PROJECT_ID"
        echo "- BigQuery Dataset: https://console.cloud.google.com/bigquery?project=$$PROJECT_ID&ws=!1m4!1m3!3m2!1s$$PROJECT_ID!2s$_DATASET"
        echo "======================================"
        echo "Deployment completed successfully!"
        echo "======================================"

images:
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  dynamicSubstitutions: true
  substitution_option: 'ALLOW_LOOSE'

timeout: '3600s'  # 60 minutes total timeout

# Production-specific settings
tags:
  - 'production'
  - 'threat-intelligence-platform'
  - 'deployment'
