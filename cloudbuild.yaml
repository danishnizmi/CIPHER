steps:
  # Install development dependencies
  - name: 'python:3.10'
    id: 'install-dev-dependencies'
    script: |
      echo "Installing development dependencies..."
      pip install --upgrade pip
      pip install flake8 pytest pytest-cov black isort

  # Lint Python code
  - name: 'python:3.10'
    id: 'lint-code'
    script: |
      echo "Running linting checks..."
      flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      black --check --diff .
      isort --check-only --profile black .

  # Install application dependencies
  - name: 'python:3.10'
    id: 'install-app-dependencies'
    script: |
      echo "Installing application dependencies..."
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt

  # Run unit tests
  - name: 'python:3.10'
    id: 'run-tests'
    script: |
      echo "Running unit tests..."
      # Create mock configuration for tests
      mkdir -p tests
      cat > tests/test_config.py << 'EOF'
      import os
      import sys
      sys.path.append('.')
      import unittest
      from unittest.mock import patch, MagicMock
      import config
      
      class TestConfig(unittest.TestCase):
          def test_config_exists(self):
              self.assertIsNotNone(config.Config)
              
      if __name__ == '__main__':
          unittest.main()
      EOF
      
      # Run the test
      python -m tests.test_config

  # Set up frontend and build assets
  - name: 'node:16'
    id: 'build-frontend'
    script: |
      echo "Building frontend assets..."
      
      # Set up package.json for Tailwind
      cat > package.json << 'EOF'
      {
        "name": "threat-intelligence-platform",
        "version": "1.0.0",
        "scripts": {
          "build": "tailwindcss -i static/src/input.css -o static/dist/output.css --minify"
        },
        "devDependencies": {
          "tailwindcss": "^3.3.0",
          "postcss": "^8.4.21",
          "autoprefixer": "^10.4.14"
        }
      }
      EOF
      
      # Create directories and files
      mkdir -p static/src static/dist templates
      echo '@tailwind base; @tailwind components; @tailwind utilities;' > static/src/input.css
      
      # Set up Tailwind config
      cat > tailwind.config.js << 'EOF'
      module.exports = {
        content: ["./templates/**/*.html"],
        theme: {
          extend: {
            colors: {
              primary: '#0d6efd',
              secondary: '#6c757d',
              success: '#198754',
              info: '#0dcaf0',
              warning: '#ffc107',
              danger: '#dc3545',
              light: '#f8f9fa',
              dark: '#212529'
            }
          }
        },
        plugins: []
      };
      EOF
      
      # Install dependencies and build CSS
      npm install
      npx tailwindcss -i static/src/input.css -o static/dist/output.css --minify

  # Create Dockerfile
  - name: 'python:3.10'
    id: 'create-dockerfile'
    script: |
      echo "Creating optimized Dockerfile..."
      
      cat > Dockerfile << 'EOF'
      FROM python:3.10-slim

      WORKDIR /app

      # Set environment variables
      ENV PYTHONDONTWRITEBYTECODE=1 \
          PYTHONUNBUFFERED=1 \
          PYTHONPATH=/app \
          PORT=8080

      # Install system dependencies
      RUN apt-get update && apt-get install -y --no-install-recommends \
          gcc \
          python3-dev \
          && apt-get clean \
          && rm -rf /var/lib/apt/lists/*

      # Create necessary directories
      RUN mkdir -p static/dist templates

      # Copy requirements first for better layer caching
      COPY requirements.txt .

      # Install dependencies with strict version pinning
      RUN pip install --upgrade pip && \
          pip install numpy==1.24.3 pandas==1.5.3 && \
          pip install -r requirements.txt

      # Copy application code
      COPY . .

      # Create startup script with error handling
      RUN echo '#!/bin/bash' > /app/start.sh && \
          echo 'cd /app' >> /app/start.sh && \
          echo 'echo "Starting application on port $PORT"' >> /app/start.sh && \
          echo 'exec gunicorn --bind :$PORT --workers 2 --threads 8 --timeout 120 app:app' >> /app/start.sh && \
          chmod +x /app/start.sh

      EXPOSE 8080

      CMD ["/app/start.sh"]
      EOF

  # Enable required Google Cloud APIs
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'enable-apis'
    script: |
      echo "Enabling required Google Cloud APIs..."
      
      gcloud services enable \
        cloudfunctions.googleapis.com \
        run.googleapis.com \
        cloudbuild.googleapis.com \
        cloudscheduler.googleapis.com \
        secretmanager.googleapis.com \
        cloudresourcemanager.googleapis.com \
        clouderrorreporting.googleapis.com \
        pubsub.googleapis.com \
        storage-api.googleapis.com \
        bigquery.googleapis.com \
        monitoring.googleapis.com \
        iam.googleapis.com

  # Set up required service accounts and permissions
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-service-accounts'
    script: |
      echo "Setting up service accounts and permissions..."
      
      # Get project ID
      PROJECT_ID=$(gcloud config get-value project)
      
      # Create service account for the application if it doesn't exist
      SERVICE_ACCOUNT="threat-intelligence-sa"
      SERVICE_ACCOUNT_EMAIL="${SERVICE_ACCOUNT}@${PROJECT_ID}.iam.gserviceaccount.com"
      
      if ! gcloud iam service-accounts describe ${SERVICE_ACCOUNT_EMAIL} &>/dev/null; then
        echo "Creating service account: ${SERVICE_ACCOUNT_EMAIL}"
        gcloud iam service-accounts create ${SERVICE_ACCOUNT} \
          --display-name="Threat Intelligence Platform Service Account"
      fi
      
      # Grant necessary roles to the service account
      declare -a ROLES=(
        "roles/bigquery.dataEditor"
        "roles/bigquery.jobUser"
        "roles/storage.objectAdmin"
        "roles/pubsub.editor"
        "roles/secretmanager.secretAccessor"
        "roles/logging.logWriter"
        "roles/errorreporting.writer"
      )
      
      for ROLE in "${ROLES[@]}"; do
        echo "Granting ${ROLE} to ${SERVICE_ACCOUNT_EMAIL}"
        gcloud projects add-iam-policy-binding ${PROJECT_ID} \
          --member="serviceAccount:${SERVICE_ACCOUNT_EMAIL}" \
          --role="${ROLE}" --quiet
      done

  # Set up secrets in Secret Manager
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-secrets'
    script: |
      echo "Setting up secrets in Secret Manager..."
      
      # Get project ID
      PROJECT_ID=$(gcloud config get-value project)
      
      # Create api-keys secret if it doesn't exist
      if ! gcloud secrets describe api-keys 2>/dev/null; then
        platform_api_key=$(python3 -c "import secrets; print(secrets.token_hex(16))")
        api_keys_json="{\"platform_api_key\":\"$platform_api_key\",\"created_at\":\"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}"
        echo "$api_keys_json" | gcloud secrets create api-keys --replication-policy="automatic" --data-file=-
      fi
      
      # Create other required secrets
      for SECRET_NAME in auth-config database-credentials feed-config admin-initial-password; do
        if ! gcloud secrets describe $SECRET_NAME 2>/dev/null; then
          if [ "$SECRET_NAME" = "admin-initial-password" ]; then
            admin_password=$(python3 -c "import secrets, string; chars = string.ascii_letters + string.digits; print(''.join(secrets.choice(chars) for i in range(12)))")
            echo "$admin_password" | gcloud secrets create $SECRET_NAME --replication-policy="automatic" --data-file=-
          elif [ "$SECRET_NAME" = "auth-config" ]; then
            session_secret=$(python3 -c "import secrets; print(secrets.token_hex(32))")
            auth_config_json="{\"session_secret\":\"$session_secret\",\"users\":{}}"
            echo "$auth_config_json" | gcloud secrets create $SECRET_NAME --replication-policy="automatic" --data-file=-
          else
            echo "{}" | gcloud secrets create $SECRET_NAME --replication-policy="automatic" --data-file=-
          fi
        fi
        
        # Grant access to the service account
        SERVICE_ACCOUNT="threat-intelligence-sa@${PROJECT_ID}.iam.gserviceaccount.com"
        gcloud secrets add-iam-policy-binding $SECRET_NAME \
          --member="serviceAccount:$SERVICE_ACCOUNT" \
          --role="roles/secretmanager.secretAccessor" || true
      done

  # Create BigQuery dataset if it doesn't exist
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-bigquery'
    script: |
      echo "Setting up BigQuery dataset..."
      
      # Get project ID
      PROJECT_ID=$(gcloud config get-value project)
      
      # Create BigQuery dataset if it doesn't exist
      DATASET_ID="threat_intelligence"
      
      if ! bq ls --project_id=${PROJECT_ID} | grep -q ${DATASET_ID}; then
        echo "Creating BigQuery dataset: ${DATASET_ID}"
        bq --location=US mk --dataset \
          --description="Threat Intelligence Platform Data" \
          ${PROJECT_ID}:${DATASET_ID}
      fi
      
      # Define tables to create if they don't exist
      declare -a TABLES=(
        "indicators"
        "vulnerabilities"
        "threat_actors"
        "campaigns"
        "malware"
        "users"
        "audit_log"
      )
      
      # Create tables if they don't exist (basic schema)
      for TABLE in "${TABLES[@]}"; do
        if ! bq ls --project_id=${PROJECT_ID} ${DATASET_ID} | grep -q ${TABLE}; then
          echo "Creating table: ${TABLE}"
          
          # Create a simple schema file
          cat > ${TABLE}_schema.json << EOF
          [
            {"name": "id", "type": "STRING", "mode": "REQUIRED"},
            {"name": "created_at", "type": "TIMESTAMP", "mode": "REQUIRED"},
            {"name": "updated_at", "type": "TIMESTAMP", "mode": "NULLABLE"}
          ]
          EOF
          
          # Create the table with the schema
          bq mk --table \
            --project_id=${PROJECT_ID} \
            --schema=${TABLE}_schema.json \
            ${DATASET_ID}.${TABLE}
          
          # Clean up schema file
          rm ${TABLE}_schema.json
        fi
      done

  # Create GCS bucket if it doesn't exist
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-storage'
    script: |
      echo "Setting up Cloud Storage bucket..."
      
      # Get project ID
      PROJECT_ID=$(gcloud config get-value project)
      
      # Create GCS bucket if it doesn't exist
      BUCKET_NAME="${PROJECT_ID}-threat-data"
      
      if ! gsutil ls -b gs://${BUCKET_NAME} &>/dev/null; then
        echo "Creating GCS bucket: ${BUCKET_NAME}"
        gsutil mb -l us-central1 gs://${BUCKET_NAME}
        
        # Create necessary folder structure with empty objects
        declare -a FOLDERS=(
          "feeds"
          "raw"
          "processed"
          "cache"
          "exports"
        )
        
        for FOLDER in "${FOLDERS[@]}"; do
          gsutil cp /dev/null gs://${BUCKET_NAME}/${FOLDER}/.keep
        done
      fi

  # Set up PubSub topics and subscriptions
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-pubsub'
    script: |
      echo "Setting up PubSub topics and subscriptions..."
      
      # Get project ID
      PROJECT_ID=$(gcloud config get-value project)
      
      # Create PubSub topics
      declare -a TOPICS=(
        "threat-data-ingestion"
        "threat-analysis-events"
      )
      
      for TOPIC in "${TOPICS[@]}"; do
        if ! gcloud pubsub topics describe ${TOPIC} --project=${PROJECT_ID} &>/dev/null; then
          echo "Creating PubSub topic: ${TOPIC}"
          gcloud pubsub topics create ${TOPIC} --project=${PROJECT_ID}
        fi
        
        # Create subscription if it doesn't exist
        SUBSCRIPTION="${TOPIC}-sub"
        if ! gcloud pubsub subscriptions describe ${SUBSCRIPTION} --project=${PROJECT_ID} &>/dev/null; then
          echo "Creating PubSub subscription: ${SUBSCRIPTION}"
          gcloud pubsub subscriptions create ${SUBSCRIPTION} \
            --topic=${TOPIC} \
            --project=${PROJECT_ID} \
            --message-retention-duration=7d
        fi
      done

  # Build container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-container'
    args: [
      'build',
      '--cache-from', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest',
      '-t', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest',
      '-t', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:$COMMIT_SHA',
      '.'
    ]

  # Push container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-container'
    args: [
      'push', 
      'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest'
    ]

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    script: |
      echo "Deploying to Cloud Run..."
      
      # Get project ID
      PROJECT_ID=$(gcloud config get-value project)
      
      # Get API key from Secret Manager
      api_key_value=$(gcloud secrets versions access latest --secret=api-keys | python3 -c "import sys, json; print(json.load(sys.stdin).get('platform_api_key', ''))" || echo "")
      if [ -z "$api_key_value" ]; then
        api_key_value=$(python3 -c "import secrets; print(secrets.token_hex(16))")
        api_keys_json="{\"platform_api_key\":\"$api_key_value\",\"updated_at\":\"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}"
        echo "$api_keys_json" | gcloud secrets versions add api-keys --data-file=-
      fi
      
      # Get session key
      secret_key_value=$(gcloud secrets versions access latest --secret=auth-config | python3 -c "import sys, json; print(json.load(sys.stdin).get('session_secret', ''))" || echo "")
      if [ -z "$secret_key_value" ]; then
        secret_key_value=$(python3 -c "import secrets; print(secrets.token_hex(32))")
      fi
      
      # Service account email
      SERVICE_ACCOUNT="threat-intelligence-sa@${PROJECT_ID}.iam.gserviceaccount.com"
      
      # Bucket name
      BUCKET_NAME="${PROJECT_ID}-threat-data"
      
      # Deploy to Cloud Run
      gcloud run deploy threat-intelligence-platform \
        --image "gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest" \
        --region us-central1 \
        --platform managed \
        --allow-unauthenticated \
        --cpu 2 \
        --memory 2Gi \
        --set-env-vars="ENVIRONMENT=production,GCP_PROJECT=${PROJECT_ID},GCP_REGION=us-central1,BIGQUERY_DATASET=threat_intelligence,GCS_BUCKET=${BUCKET_NAME},PUBSUB_TOPIC=threat-data-ingestion,PUBSUB_ANALYSIS_TOPIC=threat-analysis-events,API_KEY=${api_key_value},SECRET_KEY=${secret_key_value},VERSION=${COMMIT_SHA},DEBUG=false,PYTHONPATH=/app,CLOUD_LOGGING=true,ENABLE_ERROR_REPORTING=true,LOG_LEVEL=INFO" \
        --service-account="${SERVICE_ACCOUNT}" \
        --min-instances=1 \
        --max-instances=20 \
        --timeout=300 \
        --cpu-boost \
        --execution-environment=gen2 \
        --update-labels=app=threat-intelligence-platform,managed-by=cloudbuild

  # Set up Cloud Scheduler job for regular updates
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-scheduler'
    script: |
      echo "Setting up Cloud Scheduler job for regular updates..."
      
      # Get project ID
      PROJECT_ID=$(gcloud config get-value project)
      
      # Get API key from Secret Manager
      api_key_value=$(gcloud secrets versions access latest --secret=api-keys | python3 -c "import sys, json; print(json.load(sys.stdin).get('platform_api_key', ''))" || echo "")
      
      # Get Cloud Run URL
      cloud_run_url=$(gcloud run services describe threat-intelligence-platform --region=us-central1 --format='value(status.url)')
      
      # Delete existing job if it exists
      gcloud scheduler jobs delete update-threat-feeds --location=us-central1 --quiet 2>/dev/null || echo "Job doesn't exist yet"
      
      # Create new job
      gcloud scheduler jobs create http update-threat-feeds \
        --location=us-central1 \
        --schedule="0 */3 * * *" \
        --uri="${cloud_run_url}/api/admin/ingest" \
        --http-method=POST \
        --headers="X-API-Key=${api_key_value}" \
        --message-body='{"process_all": true}' \
        --time-zone="UTC" \
        --description="Update threat feeds every 3 hours" \
        --project=${PROJECT_ID} || echo "Scheduler job setup failed"

  # Verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify-deployment'
    script: |
      echo "Verifying deployment..."
      
      # Wait for service to be ready
      sleep 30
      service_url=$(gcloud run services describe threat-intelligence-platform --region=us-central1 --format='value(status.url)')
      echo "Service deployed at: ${service_url}"
      
      # Check health endpoint
      max_attempts=10
      for attempt in $(seq 1 $max_attempts); do
        echo "Health check attempt $attempt of $max_attempts..."
        response_code=$(curl -s -o /dev/null -w "%{http_code}" "${service_url}/health" || echo "failed")
        if [ "$response_code" = "200" ]; then
          echo "✅ Health check successful!"
          break
        else
          echo "⚠️ Health check returned: $response_code - waiting 15s..."
          sleep 15
        fi
      done
      
      # Get logs if health check failed
      if [ "$response_code" != "200" ]; then
        echo "❌ Health check failed. Retrieving logs..."
        gcloud logging read "resource.type=cloud_run_revision AND resource.labels.service_name=threat-intelligence-platform" --limit=50
      else
        echo "✨ Deployment completed successfully! ✨"
        echo "Service URL: ${service_url}"
      fi

# Build timeout and options
timeout: '3600s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  env:
    - 'PYTHONUNBUFFERED=1'
