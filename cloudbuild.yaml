steps:
# Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest', '.']

# Push Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/threat-intelligence-platform']

# Deploy to Cloud Run with all necessary settings
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'threat-intelligence-platform'
  - '--image=gcr.io/$PROJECT_ID/threat-intelligence-platform:$COMMIT_SHA'
  - '--region=us-central1'
  - '--platform=managed'
  - '--allow-unauthenticated'
  - '--memory=2Gi'
  - '--cpu=2'
  - '--min-instances=1'
  - '--max-instances=10'
  - '--timeout=300'
  - '--set-env-vars=ENVIRONMENT=production,GCP_PROJECT=$PROJECT_ID,GCP_REGION=us-central1,BIGQUERY_DATASET=threat_intelligence,GCS_BUCKET=$PROJECT_ID-threat-data,PUBSUB_TOPIC=threat-data-ingestion,PUBSUB_ANALYSIS_TOPIC=threat-analysis-events,VERSION=1.0.3,DEBUG=false,PYTHONPATH=/app,PYTHONDONTWRITEBYTECODE=1,PYTHONUNBUFFERED=1,LOG_LEVEL=INFO,LOG_TO_CLOUD=true,ENABLE_ERROR_REPORTING=true,AUTO_ANALYZE=false,NLP_ENABLED=true,ANALYSIS_ENABLED=true'
  - '--set-secrets=API_KEY=api-keys:latest'
  - '--command=/app/init-app.sh'
  - '--args=gunicorn,--bind,0.0.0.0:8080,--workers,2,--threads,4,--timeout,120,--worker-class,gthread,--preload,--log-level,info,app:app'

images:
- 'gcr.io/$PROJECT_ID/threat-intelligence-platform:$COMMIT_SHA'
- 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest'

options:
  logging: CLOUD_LOGGING_ONLY
