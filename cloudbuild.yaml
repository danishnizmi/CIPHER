steps:
  # Build container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-container'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest',
      '.'
    ]

  # Push container to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-container'
    args: [
      'push', 
      'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest'
    ]

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Deploying to Cloud Run..."
        
        gcloud run services replace cloudrun.yaml \
          --region us-central1 \
          --project=$PROJECT_ID
        
        echo "Deployment complete!"

  # Verify deployment  
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify-deployment'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Verifying deployment..."
        
        # Wait for service to be ready
        sleep 30
        
        SERVICE_URL=$(gcloud run services describe threat-intelligence-platform \
          --region=us-central1 \
          --project=$PROJECT_ID \
          --format='value(status.url)')
        
        echo "Service URL: $SERVICE_URL"
        
        # Test health endpoint
        for i in {1..10}; do
          echo "Health check attempt $i..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Health check successful!"
            exit 0
          else
            echo "⚠️ Health check returned: $HTTP_CODE"
            if [ $i -lt 10 ]; then
              echo "Waiting 10 seconds..."
              sleep 10
            fi
          fi
        done
        
        echo "❌ Health check failed after 10 attempts"
        exit 1

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
