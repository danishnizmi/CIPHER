steps:
  # Install dependencies and run checks
  - name: 'python:3.10'
    id: 'setup-and-checks'
    script: |
      echo "Installing dependencies..."
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt
      
      # Run basic syntax checks
      echo "Running syntax checks..."
      python -m py_compile app.py
      python -m py_compile config.py
      python -m py_compile frontend.py
      
      echo "Dependencies installed and checked successfully!"

  # Build frontend assets
  - name: 'node:16'
    id: 'build-frontend'
    script: |
      echo "Building frontend assets..."
      mkdir -p static/src static/dist templates
      
      # Create Tailwind CSS
      echo '@tailwind base; @tailwind components; @tailwind utilities;' > static/src/input.css
      
      # Create package.json
      cat > package.json << 'EOF'
      {
        "name": "threat-intelligence-platform",
        "version": "1.0.0",
        "scripts": {
          "build": "tailwindcss -i static/src/input.css -o static/dist/output.css --minify"
        },
        "devDependencies": {
          "tailwindcss": "^3.3.0"
        }
      }
      EOF
      
      # Create tailwind.config.js
      cat > tailwind.config.js << 'EOF'
      module.exports = {
        content: [
          "./templates/**/*.html",
          "./frontend.py",
          "./app.py"
        ],
        theme: { extend: {} },
        plugins: []
      };
      EOF
      
      npm install
      npx tailwindcss -i static/src/input.css -o static/dist/output.css --minify

  # Build container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-container'
    args: ['build', '-t', 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest', '.']

  # Push container to Container Registry  
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-container'
    args: ['push', 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Deploying to Cloud Run..."
        
        gcloud run deploy threat-intelligence-platform \
          --image gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --memory 4Gi \
          --cpu 4 \
          --timeout 900 \
          --port 8080 \
          --max-instances 20 \
          --min-instances 1 \
          --execution-environment gen2 \
          --concurrency 80 \
          --no-cpu-throttling \
          --cpu-boost \
          --set-env-vars ENVIRONMENT=production \
          --set-env-vars GCP_PROJECT=${PROJECT_ID} \
          --set-env-vars GCP_REGION=us-central1 \
          --set-env-vars BIGQUERY_DATASET=threat_intelligence \
          --set-env-vars GCS_BUCKET=${PROJECT_ID}-threat-data \
          --set-env-vars PUBSUB_TOPIC=threat-data-ingestion \
          --set-env-vars PUBSUB_ANALYSIS_TOPIC=threat-analysis-events \
          --set-env-vars VERSION=1.0.2 \
          --set-env-vars DEBUG=false \
          --set-env-vars PYTHONPATH=/app \
          --set-env-vars PYTHONDONTWRITEBYTECODE=1 \
          --set-env-vars PYTHONUNBUFFERED=1 \
          --set-env-vars LOAD_SECRETS=true \
          --set-env-vars ENSURE_GCP_RESOURCES=true \
          --set-env-vars IGNORE_PERMISSION_ERRORS=false \
          --set-env-vars AUTH_ENABLED=true \
          --set-env-vars SESSION_COOKIE_SECURE=true \
          --set-env-vars SESSION_COOKIE_HTTPONLY=true \
          --set-env-vars SESSION_COOKIE_SAMESITE=Lax \
          --set-env-vars PREFERRED_URL_SCHEME=https \
          --set-env-vars GUNICORN_WORKERS=2 \
          --set-env-vars GUNICORN_THREADS=4 \
          --set-env-vars GUNICORN_TIMEOUT=300 \
          --set-env-vars GUNICORN_PRELOAD=true \
          --set-env-vars GUNICORN_WORKER_CLASS=gthread \
          --set-env-vars LOG_LEVEL=INFO \
          --set-env-vars LOG_TO_CLOUD=true \
          --set-env-vars CLOUD_LOGGING=true \
          --set-env-vars USE_HTTP_MIDDLEWARE=true \
          --set-env-vars SERVER_NAME= \
          --set-env-vars SERVER_PORT= \
          --service-account cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com

  # Verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify-deployment'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Waiting for service to be ready..."
        sleep 30
        
        CLOUD_RUN_URL=$$(gcloud run services describe threat-intelligence-platform \
          --region=us-central1 \
          --project=${PROJECT_ID} \
          --format='value(status.url)')
        
        echo "Service deployed at: $$CLOUD_RUN_URL"
        
        # Test health endpoint first
        echo "Testing health endpoint..."
        for attempt in $$(seq 1 10); do
          echo "Health check attempt $$attempt/10..."
          
          HEALTH_RESPONSE=$$(curl -s -w "\n%{http_code}" "$$CLOUD_RUN_URL/health")
          STATUS_CODE=$$(echo "$$HEALTH_RESPONSE" | tail -n1)
          RESPONSE_BODY=$$(echo "$$HEALTH_RESPONSE" | head -n-1)
          
          echo "Response code: $$STATUS_CODE"
          echo "Response body: $$RESPONSE_BODY"
          
          if [ "$$STATUS_CODE" -eq 200 ]; then
            echo "✅ Health check successful!"
            break
          else
            echo "⚠️ Health check returned: $$STATUS_CODE"
            if [ $$attempt -lt 10 ]; then
              echo "Waiting 15 seconds before next attempt..."
              sleep 15
            fi
          fi
        done
        
        # Test root endpoint
        echo "Testing root endpoint..."
        ROOT_RESPONSE=$$(curl -s -w "\n%{http_code}" -L "$$CLOUD_RUN_URL/")
        ROOT_STATUS=$$(echo "$$ROOT_RESPONSE" | tail -n1)
        echo "Root endpoint status: $$ROOT_STATUS"
        
        # Test login endpoint
        echo "Testing login endpoint..."
        LOGIN_RESPONSE=$$(curl -s -w "\n%{http_code}" -L "$$CLOUD_RUN_URL/login")
        LOGIN_STATUS=$$(echo "$$LOGIN_RESPONSE" | tail -n1)
        echo "Login endpoint status: $$LOGIN_STATUS"
        
        echo "Deployment verification complete. Access the application at: $$CLOUD_RUN_URL"

  # Debug information
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'debug-info'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Checking service status..."
        gcloud run services describe threat-intelligence-platform \
          --region=us-central1 \
          --project=${PROJECT_ID} \
          --format=yaml > service-status.yaml
        
        echo "Service Configuration:"
        cat service-status.yaml
        
        echo "Checking latest logs..."
        gcloud run logs read threat-intelligence-platform \
          --region=us-central1 \
          --limit=50 \
          --since=5m

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  disk_size_gb: 20
