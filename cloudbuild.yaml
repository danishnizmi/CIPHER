steps:
  # Install dependencies and run checks
  - name: 'python:3.10'
    id: 'setup-and-checks'
    script: |
      echo "Installing dependencies..."
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt
      
      # Run basic syntax checks
      echo "Running syntax checks..."
      python -m py_compile app.py
      python -m py_compile config.py
      python -m py_compile frontend.py
      echo "Syntax checks passed!"

  # Build frontend assets
  - name: 'node:16'
    id: 'build-frontend'
    script: |
      echo "Building frontend assets..."
      mkdir -p static/src static/dist templates
      
      # Create Tailwind CSS
      echo '@tailwind base; @tailwind components; @tailwind utilities;' > static/src/input.css
      
      # Create package.json
      cat > package.json << 'EOF'
      {
        "name": "threat-intelligence-platform",
        "version": "1.0.0",
        "scripts": {
          "build": "tailwindcss -i static/src/input.css -o static/dist/output.css --minify"
        },
        "devDependencies": {
          "tailwindcss": "^3.3.0"
        }
      }
      EOF
      
      # Create tailwind.config.js
      cat > tailwind.config.js << 'EOF'
      module.exports = {
        content: [
          "./templates/**/*.html",
          "./frontend.py",
          "./app.py"
        ],
        theme: { extend: {} },
        plugins: []
      };
      EOF
      
      npm install
      npx tailwindcss -i static/src/input.css -o static/dist/output.css --minify
      echo "Frontend build complete!"

  # Create required secrets before deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'create-secrets'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Creating required secrets..."
        
        # Function to create secret with value
        create_secret() {
          SECRET_NAME=$1
          SECRET_VALUE=$2
          
          echo "Checking if secret $SECRET_NAME exists..."
          if ! gcloud secrets describe $SECRET_NAME 2>/dev/null; then
            echo "Creating secret $SECRET_NAME..."
            echo -n "$SECRET_VALUE" | gcloud secrets create $SECRET_NAME --data-file=-
            echo "Secret $SECRET_NAME created successfully."
          else
            echo "Secret $SECRET_NAME already exists."
            # Add a new version to ensure 'latest' is available
            echo -n "$SECRET_VALUE" | gcloud secrets versions add $SECRET_NAME --data-file=-
            echo "Added new version to $SECRET_NAME."
          fi
        }
        
        # Create all required secrets
        create_secret "api-keys" '{"platform_api_key":"dev-api-key"}'
        create_secret "auth-config" '{"session_secret":"dev-secret-key","enabled":true}'
        create_secret "feed-config" '{"feeds":[]}'
        create_secret "admin-initial-password" 'admin'

  # Build container with cache optimization
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-container'
    args: [
      'build', 
      '--cache-from', 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest', 
      '-t', 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest', 
      '.'
    ]

  # Push container to Container Registry  
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-container'
    args: ['push', 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Deploying to Cloud Run..."
        
        # Create a temporary YAML file for the Cloud Run service
        cat > service.yaml << EOF
        apiVersion: serving.knative.dev/v1
        kind: Service
        metadata:
          name: threat-intelligence-platform
          namespace: ${PROJECT_ID}
          labels:
            app: threat-intelligence-platform
            environment: production
          annotations:
            run.googleapis.com/ingress: all
            run.googleapis.com/execution-environment: gen2
        spec:
          template:
            metadata:
              annotations:
                autoscaling.knative.dev/minScale: "1"
                autoscaling.knative.dev/maxScale: "20"
                run.googleapis.com/cpu-throttling: "false"
                run.googleapis.com/startup-cpu-boost: "true"
              labels:
                app: threat-intelligence-platform
                environment: production
            spec:
              containerConcurrency: 80
              timeoutSeconds: 900
              serviceAccountName: cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com
              containers:
              - image: gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest
                ports:
                - name: http1
                  containerPort: 8080
                resources:
                  limits:
                    cpu: "4"
                    memory: "4Gi"
                env:
                - name: ENVIRONMENT
                  value: "production"
                - name: GCP_PROJECT
                  value: "${PROJECT_ID}"
                - name: GCP_REGION
                  value: "us-central1"
                - name: BIGQUERY_DATASET
                  value: "threat_intelligence"
                - name: GCS_BUCKET
                  value: "${PROJECT_ID}-threat-data"
                - name: PUBSUB_TOPIC
                  value: "threat-data-ingestion"
                - name: PUBSUB_ANALYSIS_TOPIC
                  value: "threat-analysis-events"
                - name: VERSION
                  value: "1.0.3"
                - name: DEBUG
                  value: "false"
                - name: PYTHONPATH
                  value: "/app"
                - name: PYTHONDONTWRITEBYTECODE
                  value: "1"
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: LOAD_SECRETS
                  value: "true"
                - name: ENSURE_GCP_RESOURCES
                  value: "true"
                - name: IGNORE_PERMISSION_ERRORS
                  value: "false"
                - name: AUTH_ENABLED
                  value: "true"
                - name: SESSION_COOKIE_SECURE
                  value: "true"
                - name: SESSION_COOKIE_HTTPONLY
                  value: "true"
                - name: SESSION_COOKIE_SAMESITE
                  value: "Lax"
                - name: SESSION_USE_SIGNER
                  value: "true"
                - name: SESSION_KEY_PREFIX
                  value: "threat_intel:"
                - name: SESSION_PROTECTION
                  value: "basic"
                - name: PREFERRED_URL_SCHEME
                  value: "https"
                - name: GUNICORN_WORKERS
                  value: "2"
                - name: GUNICORN_THREADS
                  value: "4"
                - name: GUNICORN_TIMEOUT
                  value: "120"
                - name: GUNICORN_PRELOAD
                  value: "true"
                - name: GUNICORN_WORKER_CLASS
                  value: "gthread"
                - name: LOG_LEVEL
                  value: "INFO"
                - name: LOG_TO_CLOUD
                  value: "true"
                - name: CLOUD_LOGGING
                  value: "true"
                - name: USE_HTTP_MIDDLEWARE
                  value: "true"
                - name: ENABLE_ERROR_REPORTING
                  value: "true"
                - name: AUTO_INGEST
                  value: "true"
                - name: AUTO_ANALYZE
                  value: "true"
                - name: USE_ENV_VARS_FOR_SECRETS
                  value: "true"
                - name: API_KEY
                  value: "dev-api-key"
                - name: SECRET_KEY
                  value: "dev-secret-key"
                - name: ADMIN_PASSWORD
                  value: "admin"
                startupProbe:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 10
                livenessProbe:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
                volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: app-data
                  mountPath: /app/data
              volumes:
              - name: tmp
                emptyDir:
                  medium: Memory
              - name: app-data
                emptyDir:
                  medium: Memory
          traffic:
          - percent: 100
            latestRevision: true
        EOF
        
        # Deploy using the YAML file
        gcloud run services replace service.yaml --region=us-central1
        
        # Set public access
        gcloud run services set-iam-policy threat-intelligence-platform \
          --region=us-central1 \
          --member="allUsers" \
          --role="roles/run.invoker"

  # Verify deployment - more efficient with fewer retries
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify-deployment'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Waiting for service to be ready..."
        sleep 30
        
        CLOUD_RUN_URL=$(gcloud run services describe threat-intelligence-platform \
          --region=us-central1 \
          --format='value(status.url)')
        
        echo "Service deployed at: $CLOUD_RUN_URL"
        
        # Test health endpoint with more retries
        echo "Testing health endpoint..."
        for attempt in $(seq 1 10); do
          echo "Health check attempt $attempt/10..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" "$CLOUD_RUN_URL/health")
          STATUS_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "Response code: $STATUS_CODE"
          echo "Response body: $BODY"
          
          if [ "$STATUS_CODE" -eq 200 ]; then
            echo "✅ Health check successful!"
            
            # Also test the root endpoint
            echo "Testing root endpoint..."
            ROOT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$CLOUD_RUN_URL/")
            echo "Root endpoint status: $ROOT_STATUS"
            
            echo "✅ Deployment verified successfully!"
            echo "Access the application at: $CLOUD_RUN_URL"
            exit 0
          else
            echo "⚠️ Health check returned: $STATUS_CODE"
            if [ $attempt -lt 10 ]; then
              echo "Waiting 10 seconds before next attempt..."
              sleep 10
            fi
          fi
        done
        
        echo "❌ Health check failed after 10 attempts"
        echo "Checking latest logs..."
        echo "Logs URL: https://console.cloud.google.com/logs/viewer?project=${PROJECT_ID}"
        exit 1

timeout: '900s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  disk_size_gb: 10
