substitutions:
  _BUCKET_NAME: '${PROJECT_ID}-threat-data'
  _DATASET_NAME: 'threat_intelligence'
  _REGION: 'us-central1'
  _SERVICE_NAME: 'threat-intelligence-platform'
  _MIN_INSTANCES: '1'
  _MAX_INSTANCES: '10'

steps:
# Step 1: Enable required APIs and set permissions
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  id: 'setup-apis-and-permissions'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    echo "Enabling required APIs..."
    gcloud services enable \
      cloudbuild.googleapis.com \
      run.googleapis.com \
      storage.googleapis.com \
      bigquery.googleapis.com \
      secretmanager.googleapis.com \
      cloudscheduler.googleapis.com \
      pubsub.googleapis.com \
      logging.googleapis.com \
      clouderrorreporting.googleapis.com \
      aiplatform.googleapis.com \
      --project=$$PROJECT_ID
    
    echo "Setting up IAM permissions..."
    SERVICE_ACCOUNT="cloud-build-service@$$PROJECT_ID.iam.gserviceaccount.com"
    
    # Grant necessary roles (skip if already exists)
    for role in \
      "roles/logging.logWriter" \
      "roles/bigquery.admin" \
      "roles/storage.admin" \
      "roles/pubsub.editor" \
      "roles/secretmanager.secretAccessor" \
      "roles/aiplatform.user" \
      "roles/run.admin"; do
      
      gcloud projects add-iam-policy-binding $$PROJECT_ID \
        --member="serviceAccount:$$SERVICE_ACCOUNT" \
        --role="$$role" \
        --condition=None || echo "Role $$role already exists"
    done
    
    echo "API and permission setup complete."

# Step 2: Validate Python dependencies
- name: 'python:3.10-slim'
  id: 'validate-dependencies'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Validating Python dependencies..."
    pip install --quiet -r requirements.txt
    python -c "import flask, google.cloud.bigquery, google.cloud.storage, google.cloud.pubsub_v1; print('Dependencies validated')"

# Step 3: Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-image'
  args:
  - 'build'
  - '-t'
  - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${COMMIT_SHA}'
  - '-t'
  - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest'
  - '.'
  timeout: '1200s'

# Step 4: Push Docker image
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-image'
  args:
  - 'push'
  - '--all-tags'
  - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}'

# Step 5: Setup GCP resources
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  id: 'setup-resources'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    echo "Setting up GCP resources..."
    
    # Create API keys secret if it doesn't exist
    if ! gcloud secrets describe api-keys --project=$$PROJECT_ID >/dev/null 2>&1; then
      echo "Creating api-keys secret..."
      gcloud secrets create api-keys \
        --replication-policy="automatic" \
        --project=$$PROJECT_ID
      
      # Generate and store API key
      API_KEY=$$(openssl rand -hex 32)
      echo "{\"platform_api_key\": \"$$API_KEY\"}" | \
        gcloud secrets versions add api-keys --data-file=- --project=$$PROJECT_ID
    else
      echo "api-keys secret already exists"
    fi
    
    # Create feed-config secret if it doesn't exist
    if ! gcloud secrets describe feed-config --project=$$PROJECT_ID >/dev/null 2>&1; then
      echo "Creating feed-config secret..."
      gcloud secrets create feed-config \
        --replication-policy="automatic" \
        --project=$$PROJECT_ID
    else
      echo "feed-config secret already exists"
    fi
    
    # Create BigQuery dataset
    if ! bq --location=US ls -d --project_id=$$PROJECT_ID | grep -q "${_DATASET_NAME}"; then
      echo "Creating BigQuery dataset ${_DATASET_NAME}..."
      bq --location=US mk -d \
        --description="Threat Intelligence Data" \
        --project_id=$$PROJECT_ID \
        "${_DATASET_NAME}"
    else
      echo "BigQuery dataset ${_DATASET_NAME} already exists"
    fi
    
    # Create Cloud Storage bucket  
    if ! gsutil ls -b "gs://${_BUCKET_NAME}" >/dev/null 2>&1; then
      echo "Creating storage bucket ${_BUCKET_NAME}..."
      gsutil mb -l "${_REGION}" -c standard -p $$PROJECT_ID "gs://${_BUCKET_NAME}"
      
      # Set lifecycle rule
      cat > /tmp/lifecycle.json << 'EOF'
    {
      "lifecycle": {
        "rule": [
          {
            "action": {"type": "Delete"},
            "condition": {"age": 30}
          }
        ]
      }
    }
    EOF
      gsutil lifecycle set /tmp/lifecycle.json "gs://${_BUCKET_NAME}"
    else
      echo "Storage bucket ${_BUCKET_NAME} already exists"
    fi
    
    # Create Pub/Sub topics
    if ! gcloud pubsub topics describe threat-data-ingestion --project=$$PROJECT_ID >/dev/null 2>&1; then
      echo "Creating threat-data-ingestion topic..."
      gcloud pubsub topics create threat-data-ingestion --project=$$PROJECT_ID
    else
      echo "Topic threat-data-ingestion already exists"
    fi
    
    if ! gcloud pubsub topics describe threat-analysis-events --project=$$PROJECT_ID >/dev/null 2>&1; then
      echo "Creating threat-analysis-events topic..."
      gcloud pubsub topics create threat-analysis-events --project=$$PROJECT_ID
    else
      echo "Topic threat-analysis-events already exists"
    fi
    
    echo "Resource setup complete."

# Step 6: Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  id: 'deploy-cloudrun'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    echo "Deploying to Cloud Run..."
    
    # Deploy the service
    gcloud run deploy ${_SERVICE_NAME} \
      --image=gcr.io/$$PROJECT_ID/${_SERVICE_NAME}:$$COMMIT_SHA \
      --region=${_REGION} \
      --platform=managed \
      --allow-unauthenticated \
      --execution-environment=gen2 \
      --memory=2Gi \
      --cpu=2 \
      --min-instances=${_MIN_INSTANCES} \
      --max-instances=${_MAX_INSTANCES} \
      --timeout=300s \
      --service-account=cloud-build-service@$$PROJECT_ID.iam.gserviceaccount.com \
      --set-env-vars="ENVIRONMENT=production" \
      --set-env-vars="GCP_PROJECT=$$PROJECT_ID" \
      --set-env-vars="GCP_REGION=${_REGION}" \
      --set-env-vars="BIGQUERY_DATASET=${_DATASET_NAME}" \
      --set-env-vars="GCS_BUCKET=${_BUCKET_NAME}" \
      --set-env-vars="PUBSUB_TOPIC=threat-data-ingestion" \
      --set-env-vars="PUBSUB_ANALYSIS_TOPIC=threat-analysis-events" \
      --set-env-vars="VERSION=1.0.3" \
      --set-env-vars="DEBUG=false" \
      --set-env-vars="PYTHONPATH=/app" \
      --set-env-vars="PYTHONDONTWRITEBYTECODE=1" \
      --set-env-vars="PYTHONUNBUFFERED=1" \
      --set-env-vars="LOG_LEVEL=INFO" \
      --set-env-vars="LOG_TO_CLOUD=true" \
      --set-env-vars="ENABLE_ERROR_REPORTING=true" \
      --set-env-vars="AUTO_ANALYZE=false" \
      --set-env-vars="NLP_ENABLED=true" \
      --set-env-vars="ANALYSIS_ENABLED=true" \
      --set-env-vars="BIGQUERY_MAX_BYTES_BILLED=104857600" \
      --set-env-vars="ENSURE_GCP_RESOURCES=true" \
      --set-secrets="API_KEY=api-keys:latest" \
      --command="/app/init-app.sh" \
      --args="gunicorn,--bind,0.0.0.0:8080,--workers,2,--threads,4,--timeout,120,--worker-class,gthread,--preload,--log-level,info,app:app" \
      --project=$$PROJECT_ID
    
    echo "Deployment complete."

# Step 7: Setup Cloud Scheduler
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  id: 'setup-scheduler'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    echo "Setting up Cloud Scheduler..."
    
    # Get service URL
    SERVICE_URL=$$(gcloud run services describe ${_SERVICE_NAME} \
      --region=${_REGION} \
      --platform=managed \
      --format='value(status.url)' \
      --project=$$PROJECT_ID)
    
    echo "Service URL: $$SERVICE_URL"
    
    # Get API key from secret
    API_KEY="default-api-key"
    if gcloud secrets versions access latest --secret=api-keys --project=$$PROJECT_ID >/dev/null 2>&1; then
      API_KEY_JSON=$$(gcloud secrets versions access latest --secret=api-keys --project=$$PROJECT_ID || echo '{}')
      # Extract API key using sed (more reliable than jq in Alpine)
      API_KEY=$$(echo "$$API_KEY_JSON" | sed -n 's/.*"platform_api_key"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
      if [ -z "$$API_KEY" ]; then
        API_KEY="default-api-key"
      fi
    fi
    
    echo "Using API key starting with: $${API_KEY:0:8}..."
    
    # Delete existing jobs if they exist
    for job in threat-data-ingestion threat-analysis; do
      gcloud scheduler jobs delete $$job \
        --location=${_REGION} \
        --quiet \
        --project=$$PROJECT_ID 2>/dev/null || true
    done
    
    # Create data ingestion job
    gcloud scheduler jobs create http threat-data-ingestion \
      --location=${_REGION} \
      --schedule="0 */6 * * *" \
      --uri="$$SERVICE_URL/api/admin/ingest" \
      --http-method=POST \
      --headers="Content-Type=application/json,X-API-Key=$$API_KEY" \
      --message-body='{"process_all": true}' \
      --time-zone="UTC" \
      --project=$$PROJECT_ID
    
    # Create analysis job
    gcloud scheduler jobs create http threat-analysis \
      --location=${_REGION} \
      --schedule="0 2 * * *" \
      --uri="$$SERVICE_URL/api/admin/analyze" \
      --http-method=POST \
      --headers="Content-Type=application/json,X-API-Key=$$API_KEY" \
      --message-body='{"analyze_all": true}' \
      --time-zone="UTC" \
      --project=$$PROJECT_ID
    
    echo "Scheduler setup complete."

# Step 8: Verify deployment
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  id: 'verify-deployment'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Verifying deployment..."
    
    SERVICE_URL=$$(gcloud run services describe ${_SERVICE_NAME} \
      --region=${_REGION} \
      --platform=managed \
      --format='value(status.url)' \
      --project=$$PROJECT_ID)
    
    echo "Service URL: $$SERVICE_URL"
    echo "Waiting for service to be ready..."
    sleep 30
    
    # Test health endpoint
    if curl -f -s "$$SERVICE_URL/health" -o /dev/null; then
      echo "Health check passed!"
    else
      echo "Health check failed (service may still be starting)"
    fi
    
    echo "Build and deployment completed successfully!"

images:
- 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${COMMIT_SHA}'
- 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest'

timeout: '3600s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  substitution_option: 'ALLOW_LOOSE'
