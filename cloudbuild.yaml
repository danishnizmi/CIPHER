steps:
  # Install dependencies
  - name: 'python:3.10'
    id: 'install-dependencies'
    script: |
      echo "Installing dependencies with optimized settings..."
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt --user

  # Prepare functions structure
  - name: 'python:3.10'
    id: 'prepare-functions'
    script: |
      # Create functions directory structure
      mkdir -p functions/ingestion functions/analysis scripts
      
      # Copy main files
      cp config.py functions/analysis/
      cp config.py functions/ingestion/
      
      # Create function entry points
      echo 'from ingestion import ingest_threat_data' > functions/ingestion/main.py
      echo 'from analysis import analyze_threat_data' > functions/analysis/main.py
      
      # Create requirements files with pinned versions to avoid backtracking
      cat > functions/ingestion/requirements.txt << 'EOF'
      google-cloud-bigquery==3.11.4
      google-cloud-storage==2.10.0
      google-cloud-pubsub==2.18.4
      google-cloud-secret-manager==2.17.0
      google-cloud-logging==3.8.0
      google-cloud-error-reporting==1.9.1
      google-auth==2.23.0
      requests==2.31.0
      python-dateutil==2.8.2
      EOF
      
      cat > functions/analysis/requirements.txt << 'EOF'
      google-cloud-bigquery==3.11.4
      google-cloud-storage==2.10.0
      google-cloud-pubsub==2.18.4
      google-cloud-language==2.11.1
      google-cloud-secret-manager==2.17.0
      google-cloud-logging==3.8.0
      google-cloud-error-reporting==1.9.1
      vertexai==1.43.0
      google-auth==2.23.0
      requests==2.31.0
      python-dateutil==2.8.2
      EOF
      
      # Setup BigQuery script
      cp requirements.txt scripts/

  # Run basic tests
  - name: 'python:3.10'
    id: 'run-tests'
    script: |
      echo "Running basic tests..."
      python -m py_compile app.py config.py api.py frontend.py || echo "Warning: Python syntax check failed"
      if [ -d "templates" ]; then echo "Template directory exists"; else echo "Warning: Template directory missing"; fi

  # Build frontend
  - name: 'node:16'
    id: 'build-frontend'
    script: |
      mkdir -p static/src static/dist
      if [ ! -f static/src/input.css ]; then
        echo '@tailwind base; @tailwind components; @tailwind utilities;' > static/src/input.css
      fi
      
      cat > package.json << 'EOF'
      {"name":"threat-intelligence-platform","version":"1.0.0","scripts":{"build":"tailwindcss -i static/src/input.css -o static/dist/output.css --minify"},"devDependencies":{"tailwindcss":"^3.3.0","postcss":"^8.4.21","autoprefixer":"^10.4.14"}}
      EOF
      
      cat > tailwind.config.js << 'EOF'
      module.exports = {content: ["./templates/**/*.html"],theme: {extend: {colors: {primary: '#0d6efd',secondary: '#6c757d',success: '#198754',info: '#0dcaf0',warning: '#ffc107',danger: '#dc3545',light: '#f8f9fa',dark: '#212529'}}},plugins: []};
      EOF
      
      npm install
      npm run build

  # Enable required APIs
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'enable-apis'
    script: |
      gcloud services enable cloudfunctions.googleapis.com eventarc.googleapis.com appengine.googleapis.com cloudscheduler.googleapis.com secretmanager.googleapis.com run.googleapis.com cloudbuild.googleapis.com cloudresourcemanager.googleapis.com clouderrorreporting.googleapis.com monitoring.googleapis.com aiplatform.googleapis.com

  # Build container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-container'
    args: [
      'build',
      '--cache-from', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest',
      '-t', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:$SHORT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest',
      '.'
    ]

  # Push container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-container'
    args: ['push', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:$SHORT_SHA']

  # Setup secrets - FIXED VERSION
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-secrets'
    script: |
      # Create service account variable with hardcoded project ID
      SERVICE_ACCOUNT="cloud-build-service@primal-chariot-382610.iam.gserviceaccount.com"
      echo "Using service account: $SERVICE_ACCOUNT"
      
      # Check and create secrets with meaningful initial values if they don't exist
      if ! gcloud secrets describe api-keys 2>/dev/null; then
        platform_api_key=$(python3 -c "import secrets; print(secrets.token_hex(16))")
        api_keys_json="{\"platform_api_key\":\"$platform_api_key\",\"created_at\":\"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}"
        echo "$api_keys_json" | gcloud secrets create api-keys --replication-policy="automatic" --data-file=-
      fi
      
      for SECRET_NAME in auth-config database-credentials feed-config admin-initial-password; do
        if ! gcloud secrets describe $SECRET_NAME 2>/dev/null; then
          if [ "$SECRET_NAME" = "admin-initial-password" ]; then
            admin_password=$(python3 -c "import secrets, string; chars = string.ascii_letters + string.digits + '!@#\$%^&*()'; print(''.join(secrets.choice(chars) for i in range(12)))")
            echo "$admin_password" | gcloud secrets create $SECRET_NAME --replication-policy="automatic" --data-file=-
          elif [ "$SECRET_NAME" = "auth-config" ]; then
            # Create auth-config with a session secret
            session_secret=$(python3 -c "import secrets; print(secrets.token_hex(32))")
            auth_config_json="{\"session_secret\":\"$session_secret\",\"users\":{}}"
            echo "$auth_config_json" | gcloud secrets create $SECRET_NAME --replication-policy="automatic" --data-file=-
          else
            echo "{}" | gcloud secrets create $SECRET_NAME --replication-policy="automatic" --data-file=-
          fi
        fi
        
        # Grant access using hardcoded service account
        gcloud secrets add-iam-policy-binding $SECRET_NAME --member="serviceAccount:$SERVICE_ACCOUNT" --role="roles/secretmanager.secretAccessor" || true
      done

  # Add a health endpoint explicitly before deployment
  - name: 'python:3.10'
    id: 'ensure-health-endpoint'
    script: |
      # Create or update app.py to ensure it has proper health endpoints
      if [ -f app.py ]; then
        # Check if health endpoint exists
        if ! grep -q "@app.route('/health'" app.py && ! grep -q "@app.route('/api/health'" app.py; then
          # Add health endpoints if not found
          cat >> app.py << 'EOF'

      # Health check endpoints
      @app.route('/health', methods=['GET'])
      def health_check():
          """Basic health check endpoint for Cloud Run probes."""
          return jsonify({"status": "healthy", "version": os.environ.get('VERSION', '1.0.0')}), 200

      @app.route('/api/health', methods=['GET'])
      def api_health_check():
          """API health check endpoint for Cloud Run probes."""
          return jsonify({"status": "healthy", "api": "up", "version": os.environ.get('VERSION', '1.0.0')}), 200
      EOF
          echo "Added health check endpoints to app.py"
        else
          echo "Health endpoints already exist in app.py"
        fi
      else
        echo "WARNING: app.py not found. Creating a minimal app with health endpoints."
        cat > app.py << 'EOF'
      import os
      from flask import Flask, jsonify
      
      app = Flask(__name__)
      
      @app.route('/health', methods=['GET'])
      def health_check():
          """Basic health check endpoint for Cloud Run probes."""
          return jsonify({"status": "healthy", "version": os.environ.get('VERSION', '1.0.0')}), 200
      
      @app.route('/api/health', methods=['GET'])
      def api_health_check():
          """API health check endpoint for Cloud Run probes."""
          return jsonify({"status": "healthy", "api": "up", "version": os.environ.get('VERSION', '1.0.0')}), 200
      
      if __name__ == '__main__':
          app.run(debug=False, host='0.0.0.0', port=int(os.environ.get('PORT', 8080)))
      EOF
      fi
      
      # Make sure Flask is imported and jsonify is available
      if grep -q "import Flask" app.py || grep -q "from flask import Flask" app.py; then
        if ! grep -q "jsonify" app.py; then
          # Add jsonify import if missing
          sed -i "s/from flask import Flask/from flask import Flask, jsonify/" app.py
          echo "Added jsonify import to app.py"
        fi
      fi

  # Deploy to Cloud Run with fixed deployment command
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    script: |
      # Create service account variable with hardcoded project ID
      SERVICE_ACCOUNT="cloud-build-service@primal-chariot-382610.iam.gserviceaccount.com"
      echo "Using service account: $SERVICE_ACCOUNT"
      
      # Get API key from Secret Manager
      api_key_value=$(gcloud secrets versions access latest --secret=api-keys | python3 -c "import sys, json; print(json.load(sys.stdin).get('platform_api_key', ''))" || echo "")
      if [ -z "$api_key_value" ]; then
        api_key_value=$(python3 -c "import secrets; print(secrets.token_hex(16))")
        api_keys_json="{\"platform_api_key\":\"$api_key_value\",\"updated_at\":\"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}"
        echo "$api_keys_json" | gcloud secrets versions add api-keys --data-file=-
      fi
      
      # Get session key
      secret_key_value=$(gcloud secrets versions access latest --secret=auth-config | python3 -c "import sys, json; print(json.load(sys.stdin).get('session_secret', ''))" || echo "")
      if [ -z "$secret_key_value" ]; then
        secret_key_value=$(python3 -c "import secrets; print(secrets.token_hex(32))")
      fi
      
      # Deploy to Cloud Run with simplified configuration
      # Using fully specified image name with explicit SHORT_SHA variable
      image_name="gcr.io/primal-chariot-382610/threat-intelligence-platform:$SHORT_SHA"
      echo "Deploying image: $image_name"
      
      gcloud run deploy threat-intelligence-platform \
        --image "$image_name" \
        --region us-central1 \
        --platform managed \
        --allow-unauthenticated \
        --cpu 2 \
        --memory 2Gi \
        --set-env-vars="ENVIRONMENT=production,GCP_PROJECT=primal-chariot-382610,GCP_REGION=us-central1,BIGQUERY_DATASET=threat_intelligence,GCS_BUCKET=primal-chariot-382610-threat-data,PUBSUB_TOPIC=threat-data-ingestion,API_KEY=$api_key_value,SECRET_KEY=$secret_key_value,VERSION=1.0.2,DEBUG=false" \
        --service-account="$SERVICE_ACCOUNT" \
        --min-instances=1 \
        --max-instances=20 \
        --timeout=300 \
        --update-labels=app=threat-intelligence-platform,managed-by=cloudbuild

  # Deploy PubSub and scheduler
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-services'
    script: |
      # Create service account variable with hardcoded project ID
      SERVICE_ACCOUNT="cloud-build-service@primal-chariot-382610.iam.gserviceaccount.com"
      
      # Setup PubSub topics and subscriptions
      gcloud pubsub topics create threat-data-ingestion --project=primal-chariot-382610 2>/dev/null || echo "Topic exists"
      gcloud pubsub topics create threat-analysis-events --project=primal-chariot-382610 2>/dev/null || echo "Topic exists"
      gcloud pubsub subscriptions create threat-data-ingestion-sub --topic=threat-data-ingestion --project=primal-chariot-382610 --message-retention-duration=7d 2>/dev/null || echo "Subscription exists"
      gcloud pubsub subscriptions create threat-analysis-events-sub --topic=threat-analysis-events --project=primal-chariot-382610 --message-retention-duration=7d 2>/dev/null || echo "Subscription exists"
      
      # Get API key for scheduler
      api_key_value=$(gcloud secrets versions access latest --secret=api-keys | python3 -c "import sys, json; print(json.load(sys.stdin).get('platform_api_key', ''))" || echo "")
      
      # Create scheduler job
      cloud_run_url=$(gcloud run services describe threat-intelligence-platform --region=us-central1 --format='value(status.url)')
      # Delete existing job if it exists
      gcloud scheduler jobs delete update-threat-feeds --location=us-central1 --quiet 2>/dev/null || echo "Job doesn't exist yet"
      gcloud scheduler jobs create http update-threat-feeds \
        --location=us-central1 \
        --schedule="0 */3 * * *" \
        --uri="$cloud_run_url/api/admin/ingest" \
        --http-method=POST \
        --headers="X-API-Key=$api_key_value" \
        --message-body='{"process_all": true}' \
        --time-zone="UTC" \
        --description="Update threat feeds every 3 hours" \
        --project=primal-chariot-382610 || echo "Scheduler job setup failed"

  # Check deployment and provide status
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'post-deployment-check'
    script: |
      echo "Waiting for service to be ready..."
      sleep 30
      service_url=$(gcloud run services describe threat-intelligence-platform --region=us-central1 --project=primal-chariot-382610 --format='value(status.url)')
      echo "Service deployed at: $service_url"
      
      # Check if service is responding
      max_attempts=10
      for attempt in $(seq 1 $max_attempts); do
        echo "Health check attempt $attempt of $max_attempts..."
        response_code=$(curl -s -o /dev/null -w "%{http_code}" "$service_url/health" || echo "failed")
        if [ "$response_code" = "200" ]; then
          echo "✅ Health check successful!"
          break
        else
          echo "⚠️ Health check returned: $response_code - waiting 15s..."
          sleep 15
        fi
      done
      
      # Print logs if health check failed
      if [ "$response_code" != "200" ]; then
        echo "❌ Health check failed after $max_attempts attempts. Retrieving logs..."
        gcloud logging read "resource.type=cloud_run_revision AND resource.labels.service_name=threat-intelligence-platform" --limit=50
      else
        echo "✨ Deployment completed successfully! ✨"
      fi

  # Cleanup old images
  - name: 'gcr.io/cloud-builders/docker'
    id: 'cleanup-old-images'
    script: |
      # List and delete old images, keeping the latest 5
      gcloud container images list-tags gcr.io/primal-chariot-382610/threat-intelligence-platform \
        --format="get(digest)" | tail -n +6 | xargs -I {} gcloud container images delete \
        --quiet gcr.io/primal-chariot-382610/threat-intelligence-platform@{} --force-delete-tags || true

# Set a longer timeout for the build
timeout: '1800s'

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
