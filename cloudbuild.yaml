steps:
# Install dependencies with caching
- name: 'python:3.10'
  id: 'install-dependencies'
  entrypoint: bash
  args:
    - '-c'
    - |
      echo "Installing dependencies with optimized settings..."
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt --user

# Prepare function directories with minimal requirements
- name: 'python:3.10'
  id: 'prepare-functions'
  entrypoint: bash
  args:
    - '-c'
    - |
      # Create functions directory structure
      mkdir -p functions/ingestion functions/analysis scripts
      
      # Copy main files
      cp config.py functions/analysis/
      cp config.py functions/ingestion/
      
      # Create function entry points
      echo 'from ingestion import ingest_threat_data' > functions/ingestion/main.py
      echo 'from analysis import analyze_threat_data' > functions/analysis/main.py
      
      # Create requirements files with pinned versions to avoid backtracking
      cat > functions/ingestion/requirements.txt << 'EOF'
      google-cloud-bigquery==3.11.4
      google-cloud-storage==2.10.0
      google-cloud-pubsub==2.18.4
      google-cloud-secret-manager==2.17.0
      google-cloud-logging==3.8.0
      google-cloud-error-reporting==1.9.1
      google-auth==2.23.0
      requests==2.31.0
      python-dateutil==2.8.2
      EOF
      
      cat > functions/analysis/requirements.txt << 'EOF'
      google-cloud-bigquery==3.11.4
      google-cloud-storage==2.10.0
      google-cloud-pubsub==2.18.4
      google-cloud-language==2.11.1
      google-cloud-secret-manager==2.17.0
      google-cloud-logging==3.8.0
      google-cloud-error-reporting==1.9.1
      vertexai==1.43.0
      google-auth==2.23.0
      requests==2.31.0
      python-dateutil==2.8.2
      EOF
      
      # Setup BigQuery script
      cp requirements.txt scripts/

# Run basic tests
- name: 'python:3.10'
  id: 'run-tests'
  entrypoint: bash
  args:
    - '-c'
    - |
      echo "Running basic tests..."
      python -m py_compile app.py config.py api.py frontend.py || echo "Warning: Python syntax check failed"
      if [ -d "templates" ]; then echo "Template directory exists"; else echo "Warning: Template directory missing"; fi

# Build frontend
- name: 'node:16'
  id: 'build-frontend'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      mkdir -p static/src static/dist
      if [ ! -f static/src/input.css ]; then
        echo '@tailwind base; @tailwind components; @tailwind utilities;' > static/src/input.css
      fi
      
      cat > package.json << 'EOF'
      {"name":"threat-intelligence-platform","version":"1.0.0","scripts":{"build":"tailwindcss -i static/src/input.css -o static/dist/output.css --minify"},"devDependencies":{"tailwindcss":"^3.3.0","postcss":"^8.4.21","autoprefixer":"^10.4.14"}}
      EOF
      
      cat > tailwind.config.js << 'EOF'
      module.exports = {content: ["./templates/**/*.html"],theme: {extend: {colors: {primary: '#0d6efd',secondary: '#6c757d',success: '#198754',info: '#0dcaf0',warning: '#ffc107',danger: '#dc3545',light: '#f8f9fa',dark: '#212529'}}},plugins: []};
      EOF
      
      npm install
      npm run build

# Enable APIs with fault tolerance
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'enable-apis'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      gcloud services enable cloudfunctions.googleapis.com eventarc.googleapis.com appengine.googleapis.com cloudscheduler.googleapis.com secretmanager.googleapis.com run.googleapis.com cloudbuild.googleapis.com cloudresourcemanager.googleapis.com clouderrorreporting.googleapis.com monitoring.googleapis.com aiplatform.googleapis.com

# Fix Go compilation step to properly initialize dependencies
- name: 'golang:1.19'
  id: 'test-go-compilation'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo "Setting up Go dependencies..."
      # Initialize module
      go mod init github.com/threat-intelligence-platform/ingestion
      
      # Get required dependencies
      go get cloud.google.com/go/bigquery@v1.50.0
      go get cloud.google.com/go/secretmanager/apiv1@v1.10.0
      go get cloud.google.com/go/secretmanager/apiv1/secretmanagerpb
      go get github.com/joho/godotenv
      go get google.golang.org/api/option
      
      # Fix the unused variable on line 945
      sed -i "s/v := pattern.FindAllString(content, -1)/_ = pattern.FindAllString(content, -1)/" threat_ingestion.go
      
      # Tidy up dependencies
      go mod tidy
      
      echo "Testing Go compilation..."
      go build -o /tmp/threat_ingestion threat_ingestion.go
      echo "Go compilation successful"

# Prepare Dockerfile for build
- name: 'golang:1.19'
  id: 'prepare-dockerfile'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo "Fixing Dockerfile for Go dependencies..."
      # Create a patched version of the Dockerfile
      cat > Dockerfile.new << 'EOF'
      # Multi-stage build for Threat Intelligence Platform
      # Stage 1: Build Go ingestion service
      FROM golang:1.19-alpine AS go-builder

      # Install required build tools
      RUN apk add --no-cache git gcc musl-dev

      # Set working directory
      WORKDIR /go/src/app

      # Initialize Go module
      RUN go mod init github.com/threat-intelligence-platform/ingestion

      # Add required Go dependencies
      RUN go get cloud.google.com/go/bigquery@v1.50.0 && \
          go get cloud.google.com/go/secretmanager/apiv1@v1.10.0 && \
          go get cloud.google.com/go/secretmanager/apiv1/secretmanagerpb && \
          go get github.com/joho/godotenv && \
          go get google.golang.org/api/option && \
          go mod tidy

      # Copy the Go source code after dependency download
      COPY threat_ingestion.go ./

      # Fix the unused variable on line 945
      RUN sed -i "s/v := pattern.FindAllString(content, -1)/_ = pattern.FindAllString(content, -1)/" threat_ingestion.go

      # Build the Go binary
      RUN CGO_ENABLED=0 GOOS=linux go build -a -installsuffix cgo -o threat_ingestion .

      # Stage 2: Build Python application
      FROM python:3.10-slim

      # Set working directory
      WORKDIR /app

      # Set environment variables
      ENV PYTHONDONTWRITEBYTECODE=1 \
          PYTHONUNBUFFERED=1 \
          PORT=8080 \
          CONTAINER_BUILD=true \
          PYTHONPATH=/app \
          PIP_NO_CACHE_DIR=1 \
          PIP_DISABLE_PIP_VERSION_CHECK=1 \
          GO_INGESTION_PORT=8081

      # Install system dependencies with cleanup in single layer
      RUN apt-get update && apt-get install -y --no-install-recommends \
          gcc \
          curl \
          python3-dev \
          libffi-dev \
          git \
          procps \
          netcat \
          && apt-get clean \
          && rm -rf /var/lib/apt/lists/*

      # Create necessary directories
      RUN mkdir -p scripts static/src static/dist templates functions/ingestion functions/analysis bin logs

      # Install numpy and pandas first to ensure compatibility
      RUN pip install --upgrade pip && \
          pip install numpy==1.23.5 && \
          pip install pandas==2.1.0

      # Copy requirements.txt and install remaining dependencies
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt

      # Create Python package structure
      RUN touch __init__.py \
          functions/__init__.py \
          functions/ingestion/__init__.py \
          functions/analysis/__init__.py

      # Copy Go binary from the go-builder stage
      COPY --from=go-builder /go/src/app/threat_ingestion /app/bin/threat_ingestion
      RUN chmod +x /app/bin/threat_ingestion

      # Copy application code
      COPY . .

      # Create startup script
      RUN echo '#!/bin/bash\n\
      set -e\n\
      \n\
      # Initialize\n\
      echo "Starting Threat Intelligence Platform..."\n\
      python --version\n\
      \n\
      # Verify critical files\n\
      if [ ! -f app.py ]; then\n\
        echo "ERROR: app.py not found!"\n\
        exit 1\n\
      fi\n\
      \n\
      # Set PYTHONPATH\n\
      export PYTHONPATH=/app:$PYTHONPATH\n\
      \n\
      # Verify numpy and pandas compatibility before starting\n\
      python -c "import numpy; import pandas; print(f\"NumPy version: {numpy.__version__}, Pandas version: {pandas.__version__}\")"\n\
      \n\
      # Verify imports\n\
      python -c "import flask; print(\"flask module found\")" || echo "WARNING: flask module not found"\n\
      python -c "import config; print(\"config module found\")" || echo "WARNING: config module not found"\n\
      \n\
      # Start the Go ingestion service in the background\n\
      echo "Starting Go Threat Ingestion service..."\n\
      /app/bin/threat_ingestion > /app/logs/go_ingestion.log 2>&1 &\n\
      INGESTION_PID=$!\n\
      echo "Go ingestion service started with PID: $INGESTION_PID"\n\
      \n\
      # Wait for Go service to be ready\n\
      echo "Waiting for Go service to be ready..."\n\
      for i in {1..10}; do\n\
        if nc -z localhost $GO_INGESTION_PORT; then\n\
          echo "Go service is ready!"\n\
          break\n\
        fi\n\
        echo "Waiting for Go service..."\n\
        sleep 1\n\
        if [ $i -eq 10 ]; then\n\
          echo "WARNING: Go service did not start in time."\n\
          exit 1\n\
        fi\n\
      done\n\
      \n\
      # Setup cleanup on exit\n\
      cleanup() {\n\
        echo "Shutting down services..."\n\
        if [ -n "$INGESTION_PID" ]; then\n\
          kill -TERM $INGESTION_PID 2>/dev/null || true\n\
          wait $INGESTION_PID 2>/dev/null || true\n\
        fi\n\
        echo "Cleanup complete"\n\
        exit 0\n\
      }\n\
      trap cleanup SIGTERM SIGINT\n\
      \n\
      # Start gunicorn in the foreground\n\
      echo "Starting gunicorn..."\n\
      cd /app && exec gunicorn \\\n\
        --bind :$PORT \\\n\
        --workers 2 \\\n\
        --threads 8 \\\n\
        --timeout 300 \\\n\
        --log-level info \\\n\
        app:app\n\
      ' > /app/docker-entrypoint.sh && chmod +x /app/docker-entrypoint.sh

      # Setup non-root user
      RUN groupadd -r appuser && useradd -r -g appuser appuser
      RUN mkdir -p /secrets && chown -R appuser:appuser /app /secrets
      USER appuser

      # Expose ports
      EXPOSE $PORT
      EXPOSE $GO_INGESTION_PORT

      # Set entrypoint
      ENTRYPOINT ["/app/docker-entrypoint.sh"]
      EOF
      
      # Replace the original Dockerfile
      mv Dockerfile.new Dockerfile
      echo "Dockerfile has been fixed for Go dependencies"

# Build container with caching
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-container'
  args:
    - 'build'
    - '--cache-from'
    - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest'
    - '-t'
    - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:${COMMIT_SHA}'
    - '-t'
    - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest'
    - '.'

# Push container
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-container'
  args:
    - 'push'
    - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:${COMMIT_SHA}'

# Setup secrets
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'setup-secrets'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Check and create secrets with meaningful initial values if they don't exist
      if ! gcloud secrets describe api-keys 2>/dev/null; then
        platform_api_key=$(python3 -c "import secrets; print(secrets.token_hex(16))")
        api_keys_json="{\"platform_api_key\":\"$platform_api_key\",\"created_at\":\"$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")\"}"
        echo "$api_keys_json" | gcloud secrets create api-keys --replication-policy="automatic" --data-file=-
      fi
      
      for SECRET_NAME in auth-config database-credentials feed-config admin-initial-password; do
        if ! gcloud secrets describe $SECRET_NAME 2>/dev/null; then
          if [ "$SECRET_NAME" = "admin-initial-password" ]; then
            admin_password=$(python3 -c "import secrets, string; chars = string.ascii_letters + string.digits + '!@#\$%^&*()'; print(''.join(secrets.choice(chars) for i in range(12)))")
            echo "$admin_password" | gcloud secrets create $SECRET_NAME --replication-policy="automatic" --data-file=-
          else
            echo "{}" | gcloud secrets create $SECRET_NAME --replication-policy="automatic" --data-file=-
          fi
        fi
        
        # Grant access
        gcloud secrets add-iam-policy-binding $SECRET_NAME --member="serviceAccount:cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com" --role="roles/secretmanager.secretAccessor" || true
      done

# Deploy to Cloud Run 
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy-cloudrun'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Get API key from Secret Manager
      api_key_value=$(gcloud secrets versions access latest --secret=api-keys | python3 -c "import sys, json; print(json.load(sys.stdin).get('platform_api_key', ''))" || echo "")
      if [ -z "$api_key_value" ]; then
        api_key_value=$(python3 -c "import secrets; print(secrets.token_hex(16))")
        api_keys_json="{\"platform_api_key\":\"$api_key_value\",\"updated_at\":\"$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")\"}"
        echo "$api_keys_json" | gcloud secrets versions add api-keys --data-file=-
      fi
      
      # Get session key
      secret_key_value=$(gcloud secrets versions access latest --secret=auth-config | python3 -c "import sys, json; print(json.load(sys.stdin).get('session_secret', ''))" || echo "")
      if [ -z "$secret_key_value" ]; then
        secret_key_value=$(python3 -c "import secrets; print(secrets.token_hex(32))")
      fi
      
      # Deploy to Cloud Run
      gcloud run deploy threat-intelligence-platform \
        --image gcr.io/${PROJECT_ID}/threat-intelligence-platform:${COMMIT_SHA} \
        --region ${_REGION} \
        --platform managed \
        --allow-unauthenticated \
        --cpu 2 \
        --memory 2Gi \
        --set-env-vars "ENVIRONMENT=${_ENVIRONMENT},GCP_PROJECT=${PROJECT_ID},GCP_REGION=${_REGION},BIGQUERY_DATASET=threat_intelligence,GCS_BUCKET=${PROJECT_ID}-threat-data,PUBSUB_TOPIC=threat-data-ingestion,API_KEY=$api_key_value,SECRET_KEY=$secret_key_value,VERSION=1.0.2" \
        --service-account cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com

# Deploy functions and services in parallel
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy-services'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Setup PubSub topics and subscriptions
      gcloud pubsub topics create threat-data-ingestion --project=${PROJECT_ID} 2>/dev/null || echo "Topic exists"
      gcloud pubsub topics create threat-analysis-events --project=${PROJECT_ID} 2>/dev/null || echo "Topic exists"
      gcloud pubsub subscriptions create threat-data-ingestion-sub --topic=threat-data-ingestion --project=${PROJECT_ID} --message-retention-duration=7d 2>/dev/null || echo "Subscription exists"
      gcloud pubsub subscriptions create threat-analysis-events-sub --topic=threat-analysis-events --project=${PROJECT_ID} --message-retention-duration=7d 2>/dev/null || echo "Subscription exists"
      
      # Create scheduler job
      gcloud scheduler jobs create http update-threat-feeds \
        --location=${_REGION} \
        --schedule="0 */3 * * *" \
        --uri="https://${_REGION}-${PROJECT_ID}.cloudfunctions.net/ingest_threat_data" \
        --http-method=POST \
        --headers="X-API-Key=$api_key_value" \
        --message-body='{"process_all": true}' \
        --time-zone="UTC" \
        --description="Update threat feeds every 3 hours" \
        --project=${PROJECT_ID} 2>/dev/null || echo "Scheduler job exists"

# Run post-deployment check
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'post-deployment-check'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo "Waiting for service to be ready..."
      sleep 30
      service_url=$(gcloud run services describe threat-intelligence-platform --region=${_REGION} --project=${PROJECT_ID} --format='value(status.url)')
      echo "Service deployed at: $service_url"
      
      # Check if service is responding
      for attempt in {1..5}; do
        echo "Health check attempt $attempt of 5..."
        response_code=$(curl -s -o /dev/null -w "%{http_code}" "$service_url/health" || echo "failed")
        if [ "$response_code" = "200" ]; then
          echo "✅ Health check successful!"
          break
        else
          echo "⚠️ Health check returned: $response_code - waiting 30s..."
          sleep 30
        fi
      done
      
      echo "✨ Deployment completed! ✨"

# Clean up old images (keeping 5)
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'cleanup-old-images'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      gcloud container images list-tags gcr.io/${PROJECT_ID}/threat-intelligence-platform \
        --format="get(digest)" | tail -n +6 | xargs -I {} gcloud container images delete \
        --quiet gcr.io/${PROJECT_ID}/threat-intelligence-platform@{} --force-delete-tags || true

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

substitutions:
  _ENVIRONMENT: 'production'
  _REGION: 'us-central1'

images:
  - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:${COMMIT_SHA}'
  - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest'

timeout: '2700s'
