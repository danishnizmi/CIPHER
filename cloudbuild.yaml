steps:
# Build the image
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-image'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest', '.']
  timeout: '1200s'  # Increased timeout for Go module download and compilation

# Push to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-image'
  args: ['push', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest']
  timeout: '300s'
  waitFor: ['build-image']

# Deploy to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'deploy-cloud-run'
  args:
  - 'run'
  - 'deploy'
  - 'threat-intelligence-platform'
  - '--image'
  - 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--memory'
  - '2Gi'  # Increased memory
  - '--cpu'
  - '2'     # Increased CPU
  - '--min-instances'
  - '1'     # Keep at least 1 instance running
  - '--max-instances'
  - '20'
  - '--port'
  - '8080'
  - '--set-env-vars'
  - 'ENVIRONMENT=production,GCP_PROJECT=$PROJECT_ID,GCP_REGION=us-central1,BIGQUERY_DATASET=threat_intelligence,GCS_BUCKET=$PROJECT_ID-threat-data,PUBSUB_TOPIC=threat-data-ingestion,GO_INGESTION_PORT=8081,API_KEY=b03bb05c6597c6473e83a271c0bb5d492061fea4c0e67cc7,SECRET_KEY=5a92c3067bc4587d021925678ea071825973c85c2b824df3bfff14ff8bc803a9,VERSION=1.0.2'
  timeout: '300s'
  waitFor: ['push-image']

images:
- 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  env:
  - 'CLOUDSDK_CORE_PROJECT=$PROJECT_ID'

timeout: '1800s'  # Increased overall timeout
