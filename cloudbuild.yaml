steps:
# Ensure permissions for service account
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'ensure-permissions'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Ensuring service account has logging permissions..."
    gcloud projects add-iam-policy-binding $PROJECT_ID \
      --member=serviceAccount:cloud-build-service@$PROJECT_ID.iam.gserviceaccount.com \
      --role=roles/logging.logWriter \
      --condition=None || echo "Permissions setup complete."

# Setup and check environment
- name: 'python:3.10'
  id: 'setup-and-checks'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Setting up Python environment and checking dependencies..."
    pip install -q -r requirements.txt

# Build the container image
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-container'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest', '.']

# Prepare GCP resources
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'prepare-resources'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Creating/updating Secret Manager secrets..."
    
    # Create API keys secret if it doesn't exist
    gcloud secrets describe api-keys 2>/dev/null || \
      gcloud secrets create api-keys --replication-policy="automatic"
    
    # Create feed config secret if it doesn't exist
    gcloud secrets describe feed-config 2>/dev/null || \
      gcloud secrets create feed-config --replication-policy="automatic"
    
    # Create BigQuery dataset if it doesn't exist
    bq --location=US ls threat_intelligence >/dev/null 2>&1 || \
      bq --location=US mk --dataset $PROJECT_ID:threat_intelligence
    
    # Create Cloud Storage bucket if it doesn't exist
    gsutil ls -b gs://$PROJECT_ID-threat-data >/dev/null 2>&1 || \
      gsutil mb -l us-central1 gs://$PROJECT_ID-threat-data
    
    # Create Pub/Sub topics if they don't exist
    gcloud pubsub topics describe threat-data-ingestion 2>/dev/null || \
      gcloud pubsub topics create threat-data-ingestion
    
    gcloud pubsub topics describe threat-analysis-events 2>/dev/null || \
      gcloud pubsub topics create threat-analysis-events

# Push the container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-container'
  args: ['push', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest']

# Deploy to Cloud Run - simplified without auth secrets
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy-cloudrun'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Deploying to Cloud Run..."
    
    # Deploy service with all configurations in a single command
    gcloud run deploy threat-intelligence-platform \
      --image gcr.io/$PROJECT_ID/threat-intelligence-platform:latest \
      --region us-central1 \
      --platform managed \
      --allow-unauthenticated \
      --execution-environment gen2 \
      --memory 2Gi \
      --cpu 2 \
      --min-instances 1 \
      --max-instances 10 \
      --timeout 300s \
      --set-env-vars "ENVIRONMENT=production,GCP_PROJECT=$PROJECT_ID,GCP_REGION=us-central1,BIGQUERY_DATASET=threat_intelligence,GCS_BUCKET=$PROJECT_ID-threat-data,PUBSUB_TOPIC=threat-data-ingestion,PUBSUB_ANALYSIS_TOPIC=threat-analysis-events,VERSION=1.0.3,DEBUG=false,PYTHONPATH=/app,PYTHONDONTWRITEBYTECODE=1,PYTHONUNBUFFERED=1,LOG_LEVEL=INFO,LOG_TO_CLOUD=true,ENABLE_ERROR_REPORTING=true,AUTO_ANALYZE=false,NLP_ENABLED=true,ANALYSIS_ENABLED=true" \
      --set-secrets "API_KEY=api-keys:latest" \
      --command "/app/init-app.sh" \
      --args "gunicorn,--bind,0.0.0.0:8080,--workers,2,--threads,4,--timeout,120,--worker-class,gthread,--preload,--log-level,info,app:app"

# Set up Cloud Scheduler for automated ingestion and analysis
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'setup-scheduler'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Setting up Cloud Scheduler jobs..."
    
    # Enable Cloud Scheduler API
    gcloud services enable cloudscheduler.googleapis.com
    
    # Create scheduler job for data ingestion (every 6 hours)
    gcloud scheduler jobs delete threat-data-ingestion --quiet 2>/dev/null || true
    gcloud scheduler jobs create http threat-data-ingestion \
      --location us-central1 \
      --schedule "0 */6 * * *" \
      --uri "https://threat-intelligence-platform-$PROJECT_ID.uc.r.appspot.com/api/admin/ingest" \
      --http-method POST \
      --headers "Content-Type=application/json,X-API-Key=$(gcloud secrets versions access latest --secret=api-keys | python -c "import sys, json; print(json.load(sys.stdin).get('platform_api_key', ''))")" \
      --message-body '{"process_all": true}' \
      --time-zone "UTC"
    
    # Create scheduler job for AI analysis (daily at 2 AM UTC)
    gcloud scheduler jobs delete threat-analysis --quiet 2>/dev/null || true
    gcloud scheduler jobs create http threat-analysis \
      --location us-central1 \
      --schedule "0 2 * * *" \
      --uri "https://threat-intelligence-platform-$PROJECT_ID.uc.r.appspot.com/api/admin/analyze" \
      --http-method POST \
      --headers "Content-Type=application/json,X-API-Key=$(gcloud secrets versions access latest --secret=api-keys | python -c "import sys, json; print(json.load(sys.stdin).get('platform_api_key', ''))")" \
      --message-body '{"analyze_all": true}' \
      --time-zone "UTC"
    
    echo "Deployment complete!"

images:
- 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest'

timeout: 1800s
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
