steps:
  # Install dependencies and run checks in a single step
  - name: 'python:3.10'
    id: 'setup-and-checks'
    script: |
      echo "Installing dependencies and running basic checks..."
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt
      
      # Optional: Run simple verification checks
      python -c "import config; print('Config module loaded successfully')"

  # Build frontend assets
  - name: 'node:16'
    id: 'build-frontend'
    script: |
      echo "Building frontend assets..."
      
      # Create directories and files
      mkdir -p static/src static/dist templates
      echo '@tailwind base; @tailwind components; @tailwind utilities;' > static/src/input.css
      
      # Set up package.json for Tailwind
      cat > package.json << 'EOF'
      {
        "name": "threat-intelligence-platform",
        "version": "1.0.0",
        "scripts": {
          "build": "tailwindcss -i static/src/input.css -o static/dist/output.css --minify"
        },
        "devDependencies": {
          "tailwindcss": "^3.3.0",
          "postcss": "^8.4.21",
          "autoprefixer": "^10.4.14"
        }
      }
      EOF
      
      # Set up Tailwind config
      cat > tailwind.config.js << 'EOF'
      module.exports = {
        content: ["./templates/**/*.html"],
        theme: {
          extend: {
            colors: {
              primary: '#0d6efd',
              secondary: '#6c757d',
              success: '#198754',
              info: '#0dcaf0',
              warning: '#ffc107',
              danger: '#dc3545',
              light: '#f8f9fa',
              dark: '#212529'
            }
          }
        },
        plugins: []
      };
      EOF
      
      # Install dependencies and build CSS
      npm install
      npx tailwindcss -i static/src/input.css -o static/dist/output.css --minify

  # Enable required Google Cloud APIs and setup resources
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-gcp'
    script: |
      echo "Setting up Google Cloud resources..."
      
      # Define project ID
      PROJECT_ID="primal-chariot-382610"
      SERVICE_ACCOUNT="cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com"
      
      # Enable required APIs
      gcloud services enable \
        run.googleapis.com \
        cloudbuild.googleapis.com \
        secretmanager.googleapis.com \
        cloudresourcemanager.googleapis.com \
        clouderrorreporting.googleapis.com \
        pubsub.googleapis.com \
        storage.googleapis.com \
        bigquery.googleapis.com \
        iam.googleapis.com \
        aiplatform.googleapis.com
      
      # Verify secrets exist
      echo "Verifying required secrets..."
      for SECRET_NAME in api-keys auth-config admin-initial-password feed-config flask-secret-key; do
        if ! gcloud secrets describe $SECRET_NAME --project=${PROJECT_ID} >/dev/null 2>&1; then
          echo "Creating required secret $SECRET_NAME"
          gcloud secrets create $SECRET_NAME --project=${PROJECT_ID} || true
        else
          echo "Secret $SECRET_NAME exists"
        fi
          
        # Ensure the service account has access to the secret
        gcloud secrets add-iam-policy-binding $SECRET_NAME \
          --member="serviceAccount:${SERVICE_ACCOUNT}" \
          --role="roles/secretmanager.secretAccessor" || true
      done
      
      # Create BigQuery dataset if needed with improved error handling
      echo "Setting up BigQuery..."
      DATASET_ID="threat_intelligence"
      if ! bq ls --project_id=${PROJECT_ID} | grep -q ${DATASET_ID}; then
        bq --location=US mk --dataset \
          --description="Threat Intelligence Platform Data" \
          ${PROJECT_ID}:${DATASET_ID} || true
        echo "Created BigQuery dataset ${DATASET_ID}"
      else
        echo "BigQuery dataset ${DATASET_ID} already exists"
      fi
      
      # Create GCS bucket if needed with improved error handling
      echo "Setting up Cloud Storage..."
      BUCKET_NAME="${PROJECT_ID}-threat-data"
      if ! gsutil ls -b gs://${BUCKET_NAME} &>/dev/null; then
        gsutil mb -l us-central1 gs://${BUCKET_NAME} || true
        gsutil uniformbucketlevelaccess set on gs://${BUCKET_NAME} || true
        echo "Created GCS bucket ${BUCKET_NAME}"
      else
        echo "GCS bucket ${BUCKET_NAME} already exists"
        gsutil uniformbucketlevelaccess set on gs://${BUCKET_NAME} || true
      fi
      
      # Create folder structure regardless of whether bucket is new or existing
      for FOLDER in raw processed exports temp feeds cache; do
        echo "Setting up folder: ${FOLDER}"
        touch empty.txt
        gsutil cp empty.txt gs://${BUCKET_NAME}/${FOLDER}/ || true
        gsutil rm gs://${BUCKET_NAME}/${FOLDER}/empty.txt || true
      done
      rm -f empty.txt
      echo "Ensured GCS bucket folder structure exists"
      
      # Create PubSub topics if needed with improved error handling
      echo "Setting up PubSub..."
      for TOPIC in threat-data-ingestion threat-analysis-events; do
        if ! gcloud pubsub topics describe ${TOPIC} --project=${PROJECT_ID} &>/dev/null; then
          gcloud pubsub topics create ${TOPIC} --project=${PROJECT_ID} || true
          echo "Created PubSub topic ${TOPIC}"
        else
          echo "PubSub topic ${TOPIC} already exists"
        fi
        
        # Ensure Pub/Sub access for the service account
        gcloud pubsub topics add-iam-policy-binding ${TOPIC} \
          --project=${PROJECT_ID} \
          --member="serviceAccount:${SERVICE_ACCOUNT}" \
          --role="roles/pubsub.publisher" || true
          
        gcloud pubsub topics add-iam-policy-binding ${TOPIC} \
          --project=${PROJECT_ID} \
          --member="serviceAccount:${SERVICE_ACCOUNT}" \
          --role="roles/pubsub.subscriber" || true
      done
      
      # Set up default secrets if they don't exist with values
      if ! gcloud secrets versions list api-keys --project=${PROJECT_ID} 2>/dev/null | grep -q "1"; then
        API_KEY=$(openssl rand -hex 24)
        echo "{\"platform_api_key\": \"${API_KEY}\", \"created_at\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}" | \
        gcloud secrets versions add api-keys --data-file=- --project=${PROJECT_ID} || true
        echo "Created default API key"
      fi
      
      if ! gcloud secrets versions list auth-config --project=${PROJECT_ID} 2>/dev/null | grep -q "1"; then
        SESSION_SECRET=$(openssl rand -hex 32)
        ADMIN_PASS=$(echo -n "admin" | sha256sum | awk '{print $1}')
        echo "{\"session_secret\": \"${SESSION_SECRET}\", \"users\": {\"admin\": {\"password\": \"${ADMIN_PASS}\", \"role\": \"admin\", \"created_at\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}}}" | \
        gcloud secrets versions add auth-config --data-file=- --project=${PROJECT_ID} || true
        echo "Created default auth config"
      fi
      
      if ! gcloud secrets versions list feed-config --project=${PROJECT_ID} 2>/dev/null | grep -q "1"; then
        echo "{\"feeds\": [{\"id\": \"phishtank\", \"name\": \"PhishTank URLs\", \"url\": \"http://data.phishtank.com/data/online-valid.json\", \"description\": \"URLs verified as phishing by PhishTank community\", \"format\": \"json\", \"type\": \"url\", \"update_frequency\": \"daily\", \"enabled\": true}, {\"id\": \"urlhaus\", \"name\": \"URLhaus Malware\", \"url\": \"https://urlhaus.abuse.ch/downloads/csv_recent/\", \"description\": \"Recent malware URLs from URLhaus\", \"format\": \"csv\", \"type\": \"url\", \"update_frequency\": \"daily\", \"enabled\": true}, {\"id\": \"threatfox\", \"name\": \"ThreatFox IOCs\", \"url\": \"https://threatfox.abuse.ch/export/json/recent/\", \"description\": \"Recent indicators from ThreatFox\", \"format\": \"json\", \"type\": \"mixed\", \"update_frequency\": \"daily\", \"enabled\": true}], \"update_interval_hours\": 6, \"default_tags\": [], \"user_agent\": \"ThreatIntelligencePlatform/1.0.0\", \"request_timeout\": 30, \"max_retries\": 3}" | \
        gcloud secrets versions add feed-config --data-file=- --project=${PROJECT_ID} || true
        echo "Created default feed config"
      fi
      
      echo "GCP resource setup completed successfully"

  # Build container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-container'
    args: [
      'build',
      '--cache-from', 'gcr.io/primal-chariot-382610/threat-intelligence-platform:latest',
      '-t', 'gcr.io/primal-chariot-382610/threat-intelligence-platform:latest',
      '-t', 'gcr.io/primal-chariot-382610/threat-intelligence-platform:$COMMIT_SHA',
      '.'
    ]

  # Push container to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-container'
    args: [
      'push', 
      'gcr.io/primal-chariot-382610/threat-intelligence-platform:latest'
    ]

  # Deploy to Cloud Run with secrets mounted
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    script: |
      echo "Deploying to Cloud Run..."
      
      # Define project ID
      PROJECT_ID="primal-chariot-382610"
      SERVICE_ACCOUNT="cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com"
      
      # Create YAML configuration file for Secret volumes
      cat > cloudrun-config.yaml << EOF
      apiVersion: serving.knative.dev/v1
      kind: Service
      metadata:
        name: threat-intelligence-platform
        namespace: '561511062593'
        annotations:
          run.googleapis.com/client-name: "cloud-console"
          run.googleapis.com/ingress: all
          run.googleapis.com/ingress-status: all
        labels:
          app: threat-intelligence-platform
          environment: production
          managed-by: cloudbuild
      spec:
        template:
          metadata:
            annotations:
              autoscaling.knative.dev/minScale: "1"
              autoscaling.knative.dev/maxScale: "20"
              run.googleapis.com/cpu-throttling: "false"
              run.googleapis.com/startup-cpu-boost: "true"
              run.googleapis.com/execution-environment: "gen2"
            labels:
              app: threat-intelligence-platform
              managed-by: cloudbuild
              run.googleapis.com/startupProbeType: Default
          spec:
            serviceAccountName: "${SERVICE_ACCOUNT}"
            timeoutSeconds: 300
            containerConcurrency: 80
            containers:
            - image: gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest
              ports:
              - name: http1
                containerPort: 8080
              resources:
                limits:
                  cpu: "2"
                  memory: "2Gi"
              env:
              - name: GCP_PROJECT
                value: "${PROJECT_ID}"
              - name: ENVIRONMENT
                value: "production"
              - name: GCP_REGION
                value: "us-central1"
              - name: BIGQUERY_DATASET
                value: "threat_intelligence"
              - name: PORT
                value: "8080"
              - name: GCS_BUCKET
                value: "${PROJECT_ID}-threat-data"
              - name: PUBSUB_TOPIC
                value: "threat-data-ingestion"
              - name: PUBSUB_ANALYSIS_TOPIC
                value: "threat-analysis-events"
              - name: VERSION
                value: "1.0.2"
              - name: DEBUG
                value: "false"
              - name: PYTHONPATH
                value: "/app"
              - name: CLOUD_LOGGING
                value: "true"
              - name: ENABLE_ERROR_REPORTING
                value: "true"
              - name: LOG_LEVEL
                value: "INFO"
              - name: LOAD_SECRETS
                value: "true"
              - name: ENSURE_GCP_RESOURCES
                value: "true"
              - name: IGNORE_PERMISSION_ERRORS 
                value: "true"
              # Secret references
              - name: API_KEY
                valueFrom:
                  secretKeyRef:
                    name: api-keys
                    key: latest
              - name: SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: auth-config
                    key: latest
              startupProbe:
                tcpSocket:
                  port: 8080
                periodSeconds: 240
                failureThreshold: 1
                timeoutSeconds: 240
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8080
                periodSeconds: 30
                timeoutSeconds: 5
                failureThreshold: 3
              readinessProbe:
                httpGet:
                  path: /api/health
                  port: 8080
                periodSeconds: 10
                timeoutSeconds: 5
                successThreshold: 1
                failureThreshold: 3
              volumeMounts:
              - name: tmp
                mountPath: /tmp
              - name: app-data
                mountPath: /app/data
              - name: feed-config-volume
                mountPath: /app/secrets
                readOnly: true
            volumes:
            - name: tmp
              emptyDir: {}
            - name: app-data
              emptyDir: {}
            - name: feed-config-volume
              secret:
                secretName: feed-config
                items:
                - key: latest
                  path: feed-config.json
        traffic:
        - percent: 100
          latestRevision: true
      EOF
      
      # Deploy using the YAML configuration
      gcloud run services replace cloudrun-config.yaml \
        --region us-central1 \
        --project=${PROJECT_ID}
      
      # Get Cloud Run URL
      CLOUD_RUN_URL=$(gcloud run services describe threat-intelligence-platform --region=us-central1 --project=${PROJECT_ID} --format='value(status.url)')
      echo "Deployed to: $CLOUD_RUN_URL"

  # Verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify-deployment'
    script: |
      echo "Verifying deployment..."
      
      # Define project ID
      PROJECT_ID="primal-chariot-382610"
      
      # Wait for service to be ready
      sleep 45
      service_url=$(gcloud run services describe threat-intelligence-platform --region=us-central1 --project=${PROJECT_ID} --format='value(status.url)')
      echo "Service deployed at: ${service_url}"
      
      # Check health endpoint
      max_attempts=10
      for attempt in $(seq 1 $max_attempts); do
        echo "Health check attempt $attempt of $max_attempts..."
        response_code=$(curl -s -o /dev/null -w "%{http_code}" "${service_url}/health" || echo "failed")
        if [ "$response_code" = "200" ]; then
          echo "✅ Health check successful!"
          break
        else
          echo "⚠️ Health check returned: $response_code - waiting 30s..."
          sleep 30
        fi
      done
      
      echo "Deployment completed successfully! Service URL: ${service_url}"

# Build timeout and options
timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
