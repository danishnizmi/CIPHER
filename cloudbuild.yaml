steps:
# Build the image
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-image'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/cipher-app:latest', '.']
  timeout: '600s'

# Push to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-image'
  args: ['push', 'gcr.io/$PROJECT_ID/cipher-app:latest']
  timeout: '300s'
  waitFor: ['build-image']

# Deploy to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'deploy-cloud-run'
  args:
  - 'run'
  - 'deploy'
  - 'cipher-app'
  - '--image'
  - 'gcr.io/$PROJECT_ID/cipher-app:latest'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--memory'
  - '1Gi'
  - '--cpu'
  - '1'
  - '--min-instances'
  - '0'
  - '--max-instances'
  - '10'
  - '--port'
  - '8080'
  - '--set-env-vars'
  - 'ENVIRONMENT=production,GCP_PROJECT=$PROJECT_ID,GCP_REGION=us-central1'
  timeout: '300s'
  waitFor: ['push-image']

images:
- 'gcr.io/$PROJECT_ID/cipher-app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  env:
  - 'CLOUDSDK_CORE_PROJECT=$PROJECT_ID'

timeout: '1200s'
