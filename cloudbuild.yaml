steps:
  # Install dependencies and run checks
  - name: 'python:3.10'
    id: 'setup-and-checks'
    script: |
      echo "Installing dependencies..."
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt
      
      # Run basic syntax checks
      echo "Running syntax checks..."
      python -m py_compile app.py
      python -m py_compile config.py
      python -m py_compile frontend.py
      echo "Syntax checks passed!"

  # Build frontend assets
  - name: 'node:16'
    id: 'build-frontend'
    script: |
      echo "Building frontend assets..."
      mkdir -p static/src static/dist templates
      
      # Create Tailwind CSS
      echo '@tailwind base; @tailwind components; @tailwind utilities;' > static/src/input.css
      
      # Create package.json
      cat > package.json << 'EOF'
      {
        "name": "threat-intelligence-platform",
        "version": "1.0.3",
        "scripts": {
          "build": "tailwindcss -i static/src/input.css -o static/dist/output.css --minify"
        },
        "devDependencies": {
          "tailwindcss": "^3.3.0"
        }
      }
      EOF
      
      # Create tailwind.config.js
      cat > tailwind.config.js << 'EOF'
      module.exports = {
        content: [
          "./templates/**/*.html",
          "./frontend.py",
          "./app.py"
        ],
        theme: { extend: {} },
        plugins: []
      };
      EOF
      
      npm install
      npx tailwindcss -i static/src/input.css -o static/dist/output.css --minify
      echo "Frontend build complete!"

  # Create required resources - BigQuery dataset, GCS bucket, Pub/Sub topics
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'create-resources'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Creating required GCP resources..."
        
        # Create BigQuery dataset if it doesn't exist
        if ! bq ls --dataset ${PROJECT_ID}:threat_intelligence &>/dev/null; then
          echo "Creating BigQuery dataset threat_intelligence..."
          bq --location=US mk \
            --dataset \
            --description="Threat Intelligence Platform Dataset" \
            ${PROJECT_ID}:threat_intelligence
          echo "BigQuery dataset created successfully!"
        else
          echo "BigQuery dataset threat_intelligence already exists"
        fi
        
        # Create GCS bucket if it doesn't exist
        if ! gsutil ls -b gs://${PROJECT_ID}-threat-data &>/dev/null; then
          echo "Creating GCS bucket ${PROJECT_ID}-threat-data..."
          gsutil mb -l us-central1 gs://${PROJECT_ID}-threat-data
          echo "Bucket created successfully!"
        else
          echo "Bucket ${PROJECT_ID}-threat-data already exists"
        fi
        
        # Create Pub/Sub topics if they don't exist
        if ! gcloud pubsub topics describe threat-data-ingestion &>/dev/null; then
          echo "Creating Pub/Sub topic threat-data-ingestion..."
          gcloud pubsub topics create threat-data-ingestion
          echo "Pub/Sub topic created successfully!"
        else
          echo "Pub/Sub topic threat-data-ingestion already exists"
        fi
        
        if ! gcloud pubsub topics describe threat-analysis-events &>/dev/null; then
          echo "Creating Pub/Sub topic threat-analysis-events..."
          gcloud pubsub topics create threat-analysis-events
          echo "Pub/Sub topic created successfully!"
        else
          echo "Pub/Sub topic threat-analysis-events already exists"
        fi

  # Check for required secrets but don't fail if they don't exist
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify-secrets'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Verifying required secrets exist..."
        
        # Initialize variables to track missing secrets
        missing_secrets=()
        
        # Check api-keys secret
        if ! gcloud secrets describe api-keys --project=${PROJECT_ID} &>/dev/null; then
          echo "Warning: api-keys secret doesn't exist"
          missing_secrets+=("api-keys")
        else
          echo "✓ api-keys secret exists"
        fi
        
        # Check auth-config secret
        if ! gcloud secrets describe auth-config --project=${PROJECT_ID} &>/dev/null; then
          echo "Warning: auth-config secret doesn't exist"
          missing_secrets+=("auth-config")
        else
          echo "✓ auth-config secret exists"
        fi
        
        # Check feed-config secret
        if ! gcloud secrets describe feed-config --project=${PROJECT_ID} &>/dev/null; then
          echo "Warning: feed-config secret doesn't exist"
          missing_secrets+=("feed-config")
        else
          echo "✓ feed-config secret exists"
        fi
        
        # Check admin-initial-password secret
        if ! gcloud secrets describe admin-initial-password --project=${PROJECT_ID} &>/dev/null; then
          echo "Warning: admin-initial-password secret doesn't exist"
          missing_secrets+=("admin-initial-password")
        else
          echo "✓ admin-initial-password secret exists"
        fi
        
        # Report missing secrets but don't fail
        if [ ${#missing_secrets[@]} -gt 0 ]; then
          echo "Missing secrets detected: ${missing_secrets[*]}"
          echo "These will be created automatically when the application starts."
        else
          echo "All required secrets exist!"
        fi
        
        # Create a simple script to create default secrets if needed
        cat > create-default-secrets.sh << 'EOF'
        #!/bin/bash
        
        PROJECT_ID=$(gcloud config get-value project)
        echo "Creating default secrets for project: $PROJECT_ID"
        
        # Create api-keys secret if it doesn't exist
        if ! gcloud secrets describe api-keys --project=$PROJECT_ID &>/dev/null; then
          echo "Creating api-keys secret..."
          echo '{"platform_api_key":"dev-api-key"}' | gcloud secrets create api-keys --data-file=- --project=$PROJECT_ID
        fi
        
        # Create auth-config secret if it doesn't exist
        if ! gcloud secrets describe auth-config --project=$PROJECT_ID &>/dev/null; then
          echo "Creating auth-config secret..."
          echo '{"session_secret":"dev-secret-key","enabled":true,"users":{"admin":{"password":"8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918","role":"admin","created_at":"2023-01-01T00:00:00Z"}}}' | gcloud secrets create auth-config --data-file=- --project=$PROJECT_ID
        fi
        
        # Create feed-config secret if it doesn't exist
        if ! gcloud secrets describe feed-config --project=$PROJECT_ID &>/dev/null; then
          echo "Creating feed-config secret..."
          echo '{"feeds":[],"update_interval_hours":6}' | gcloud secrets create feed-config --data-file=- --project=$PROJECT_ID
        fi
        
        # Create admin-initial-password secret if it doesn't exist
        if ! gcloud secrets describe admin-initial-password --project=$PROJECT_ID &>/dev/null; then
          echo "Creating admin-initial-password secret..."
          echo 'admin' | gcloud secrets create admin-initial-password --data-file=- --project=$PROJECT_ID
        fi
        
        echo "Secret creation complete!"
        EOF
        
        chmod +x create-default-secrets.sh
        echo "Created secret creation helper script: create-default-secrets.sh"

  # Build container with cache optimization
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-container'
    args: [
      'build', 
      '--cache-from', 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest', 
      '-t', 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest', 
      '.'
    ]

  # Push container to Container Registry  
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-container'
    args: ['push', 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Deploying to Cloud Run..."
        
        # Deploy first without secret mappings
        gcloud run deploy threat-intelligence-platform \
          --image gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --memory 4Gi \
          --cpu 4 \
          --timeout 900 \
          --max-instances 20 \
          --min-instances 1 \
          --execution-environment gen2 \
          --concurrency 80 \
          --no-cpu-throttling \
          --cpu-boost \
          --set-env-vars ENVIRONMENT=production \
          --set-env-vars GCP_PROJECT=${PROJECT_ID} \
          --set-env-vars GCP_REGION=us-central1 \
          --set-env-vars BIGQUERY_DATASET=threat_intelligence \
          --set-env-vars GCS_BUCKET=${PROJECT_ID}-threat-data \
          --set-env-vars PUBSUB_TOPIC=threat-data-ingestion \
          --set-env-vars PUBSUB_ANALYSIS_TOPIC=threat-analysis-events \
          --set-env-vars VERSION=1.0.3 \
          --set-env-vars DEBUG=false \
          --set-env-vars PYTHONPATH=/app \
          --set-env-vars PYTHONDONTWRITEBYTECODE=1 \
          --set-env-vars PYTHONUNBUFFERED=1 \
          --set-env-vars LOAD_SECRETS=true \
          --set-env-vars ENSURE_GCP_RESOURCES=true \
          --set-env-vars IGNORE_PERMISSION_ERRORS=false \
          --set-env-vars AUTH_ENABLED=true \
          --set-env-vars SESSION_COOKIE_SECURE=true \
          --set-env-vars SESSION_COOKIE_HTTPONLY=true \
          --set-env-vars SESSION_COOKIE_SAMESITE=Lax \
          --set-env-vars SESSION_USE_SIGNER=true \
          --set-env-vars SESSION_KEY_PREFIX=threat_intel: \
          --set-env-vars SESSION_PROTECTION=basic \
          --set-env-vars PREFERRED_URL_SCHEME=https \
          --set-env-vars GUNICORN_WORKERS=2 \
          --set-env-vars GUNICORN_THREADS=4 \
          --set-env-vars GUNICORN_TIMEOUT=120 \
          --set-env-vars GUNICORN_PRELOAD=true \
          --set-env-vars GUNICORN_WORKER_CLASS=gthread \
          --set-env-vars LOG_LEVEL=INFO \
          --set-env-vars LOG_TO_CLOUD=true \
          --set-env-vars CLOUD_LOGGING=true \
          --set-env-vars USE_HTTP_MIDDLEWARE=true \
          --set-env-vars ENABLE_ERROR_REPORTING=true \
          --set-env-vars AUTO_INGEST=true \
          --set-env-vars AUTO_ANALYZE=true \
          --set-env-vars USE_ENV_VARS_FOR_SECRETS=true \
          --set-env-vars API_KEY=dev-api-key \
          --set-env-vars SECRET_KEY=dev-secret-key \
          --service-account cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com
        
        echo "Basic deployment complete!"
        
        # Now try to add secret mappings if secrets exist
        echo "Attempting to add secret mappings..."
        
        # Add API_KEY secret if it exists
        if gcloud secrets describe api-keys --project=${PROJECT_ID} &>/dev/null; then
          echo "Adding API_KEY secret mapping..."
          gcloud run services update threat-intelligence-platform \
            --region=us-central1 \
            --update-secrets=API_KEY=api-keys:latest
          echo "Added API_KEY secret mapping"
        else
          echo "Skipping API_KEY secret mapping - secret doesn't exist yet"
        fi
        
        # Add SECRET_KEY secret if it exists
        if gcloud secrets describe auth-config --project=${PROJECT_ID} &>/dev/null; then
          echo "Adding SECRET_KEY secret mapping..."
          gcloud run services update threat-intelligence-platform \
            --region=us-central1 \
            --update-secrets=SECRET_KEY=auth-config:latest
          echo "Added SECRET_KEY secret mapping"
        else
          echo "Skipping SECRET_KEY secret mapping - secret doesn't exist yet"
        fi
        
        echo "Deployment complete!"

  # Verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify-deployment'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Waiting for service to be ready..."
        sleep 45
        
        # Get service URL
        SERVICE_URL=$(gcloud run services describe threat-intelligence-platform \
          --region=us-central1 \
          --format='value(status.url)')
        
        echo "Service deployed at: $SERVICE_URL"
        
        # Test health endpoint with retries
        echo "Testing health endpoint..."
        MAX_RETRIES=20
        RETRY_DELAY=15
        
        for ATTEMPT in $(seq 1 $MAX_RETRIES); do
          echo "Health check attempt $ATTEMPT/$MAX_RETRIES..."
          
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" "$SERVICE_URL/health" || echo "000")
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n-1)
          
          echo "Response code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check successful!"
            echo "✅ Deployment verified successfully!"
            echo "Access the application at: $SERVICE_URL"
            echo "Login with username: admin, password: admin"
            exit 0
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "⚠️ Connection failed, retrying in $RETRY_DELAY seconds..."
          else
            echo "⚠️ Health check returned: $HTTP_CODE, retrying in $RETRY_DELAY seconds..."
          fi
          
          if [ $ATTEMPT -lt $MAX_RETRIES ]; then
            sleep $RETRY_DELAY
          fi
        done
        
        echo "❌ Health check failed after $MAX_RETRIES attempts"
        echo "Checking latest logs..."
        gcloud logging read "resource.type=cloud_run_revision AND resource.labels.service_name=threat-intelligence-platform" --limit=20 --format=json | jq '.[].textPayload' || echo "Failed to retrieve logs"
        echo "Deployment may still be in progress. You can check the status at: https://console.cloud.google.com/run/detail/us-central1/threat-intelligence-platform/revisions?project=${PROJECT_ID}"
        exit 1

timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  disk_size_gb: 10
