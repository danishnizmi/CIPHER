steps:
# Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '-t'
  - 'gcr.io/$PROJECT_ID/threat-intelligence-platform:$COMMIT_SHA'
  - '-t'
  - 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest'
  - '.'

# Push Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'push'
  - '--all-tags'
  - 'gcr.io/$PROJECT_ID/threat-intelligence-platform'

# Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    gcloud run deploy threat-intelligence-platform \
      --image=gcr.io/$PROJECT_ID/threat-intelligence-platform:$COMMIT_SHA \
      --region=us-central1 \
      --platform=managed \
      --allow-unauthenticated \
      --memory=2Gi \
      --cpu=2 \
      --min-instances=1 \
      --max-instances=10 \
      --timeout=300s \
      --set-env-vars="ENVIRONMENT=production" \
      --set-env-vars="GCP_PROJECT=$PROJECT_ID" \
      --set-env-vars="GCP_REGION=us-central1" \
      --set-env-vars="BIGQUERY_DATASET=threat_intelligence" \
      --set-env-vars="PUBSUB_TOPIC=threat-data-ingestion" \
      --set-env-vars="PUBSUB_ANALYSIS_TOPIC=threat-analysis-events" \
      --set-env-vars="VERSION=1.0.3" \
      --set-env-vars="DEBUG=false" \
      --set-env-vars="LOG_LEVEL=INFO" \
      --set-env-vars="NLP_ENABLED=true" \
      --set-env-vars="ANALYSIS_ENABLED=true"

images:
- 'gcr.io/$PROJECT_ID/threat-intelligence-platform:$COMMIT_SHA'
- 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest'

timeout: '2400s'
