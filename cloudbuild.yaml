steps:
# Install dependencies
- name: 'python:3.10'
  id: 'install-dependencies'
  entrypoint: bash
  args:
    - '-c'
    - |
      pip install --upgrade pip
      pip install -r requirements.txt --user

# Create a completely different Dockerfile approach without heredoc
- name: 'ubuntu'
  id: 'create-dockerfile'
  entrypoint: bash
  args:
    - '-c'
    - |
      cat > Dockerfile << EOF
      # Multi-stage build for Threat Intelligence Platform
      # Stage 1: Build Go ingestion service
      FROM golang:1.19-alpine AS go-builder
      
      # Install required build tools
      RUN apk add --no-cache git gcc musl-dev
      
      # Set working directory
      WORKDIR /go/src/app
      
      # Initialize Go module
      RUN go mod init github.com/threat-intelligence-platform/ingestion
      
      # Add required Go dependencies
      RUN go get cloud.google.com/go/bigquery@v1.50.0 && \\
          go get cloud.google.com/go/secretmanager/apiv1@v1.10.0 && \\
          go get cloud.google.com/go/secretmanager/apiv1/secretmanagerpb && \\
          go get github.com/joho/godotenv && \\
          go get google.golang.org/api/option && \\
          go mod tidy
      
      # Copy the Go source code after dependency download
      COPY threat_ingestion.go ./
      
      # Fix the unused variable on line 945
      RUN sed -i "s/v := pattern.FindAllString(content, -1)/_ = pattern.FindAllString(content, -1)/" threat_ingestion.go
      
      # Build the Go binary
      RUN CGO_ENABLED=0 GOOS=linux go build -a -installsuffix cgo -o threat_ingestion .
      
      # Stage 2: Build Python application
      FROM python:3.10-slim
      
      # Set working directory
      WORKDIR /app
      
      # Set environment variables
      ENV PYTHONDONTWRITEBYTECODE=1 \\
          PYTHONUNBUFFERED=1 \\
          PORT=8080 \\
          CONTAINER_BUILD=true \\
          PYTHONPATH=/app \\
          PIP_NO_CACHE_DIR=1 \\
          PIP_DISABLE_PIP_VERSION_CHECK=1 \\
          GO_INGESTION_PORT=8081
      
      # Install system dependencies with cleanup in single layer
      RUN apt-get update && apt-get install -y --no-install-recommends \\
          gcc \\
          curl \\
          python3-dev \\
          libffi-dev \\
          git \\
          procps \\
          netcat \\
          && apt-get clean \\
          && rm -rf /var/lib/apt/lists/*
      
      # Create necessary directories
      RUN mkdir -p scripts static/src static/dist templates functions/ingestion functions/analysis bin logs
      
      # Install numpy and pandas first to ensure compatibility
      RUN pip install --upgrade pip && \\
          pip install numpy==1.23.5 && \\
          pip install pandas==2.1.0
      
      # Copy requirements.txt and install remaining dependencies
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt
      
      # Create Python package structure
      RUN touch __init__.py \\
          functions/__init__.py \\
          functions/ingestion/__init__.py \\
          functions/analysis/__init__.py
      
      # Copy Go binary from the go-builder stage
      COPY --from=go-builder /go/src/app/threat_ingestion /app/bin/threat_ingestion
      RUN chmod +x /app/bin/threat_ingestion
      
      # Copy application code
      COPY . .
      
      # Create startup script
      COPY docker-entrypoint.sh /app/docker-entrypoint.sh
      RUN chmod +x /app/docker-entrypoint.sh
      
      # Setup non-root user
      RUN groupadd -r appuser && useradd -r -g appuser appuser
      RUN mkdir -p /secrets && chown -R appuser:appuser /app /secrets
      USER appuser
      
      # Expose ports
      EXPOSE \${PORT}
      EXPOSE \${GO_INGESTION_PORT}
      
      # Set entrypoint
      ENTRYPOINT ["/app/docker-entrypoint.sh"]
      EOF

# Create a simple entrypoint script
- name: 'ubuntu'
  id: 'create-entrypoint'
  entrypoint: bash
  args:
    - '-c'
    - |
      cat > docker-entrypoint.sh << 'EOF'
      #!/bin/bash
      set -e
      
      # Initialize
      echo "Starting Threat Intelligence Platform..."
      python --version
      
      # Verify critical files
      if [ ! -f app.py ]; then
        echo "ERROR: app.py not found!"
        exit 1
      fi
      
      # Set PYTHONPATH
      export PYTHONPATH=/app:$PYTHONPATH
      
      # Verify numpy and pandas compatibility before starting
      python -c "import numpy; import pandas; print(f\"NumPy version: {numpy.__version__}, Pandas version: {pandas.__version__}\")"
      
      # Verify imports
      python -c "import flask; print(\"flask module found\")" || echo "WARNING: flask module not found"
      python -c "import config; print(\"config module found\")" || echo "WARNING: config module not found"
      
      # Start the Go ingestion service in the background
      echo "Starting Go Threat Ingestion service..."
      /app/bin/threat_ingestion > /app/logs/go_ingestion.log 2>&1 &
      INGESTION_PID=$!
      echo "Go ingestion service started with PID: $INGESTION_PID"
      
      # Wait for Go service to be ready
      echo "Waiting for Go service to be ready..."
      for i in {1..10}; do
        if nc -z localhost $GO_INGESTION_PORT; then
          echo "Go service is ready!"
          break
        fi
        echo "Waiting for Go service..."
        sleep 1
        if [ $i -eq 10 ]; then
          echo "WARNING: Go service did not start in time."
          exit 1
        fi
      done
      
      # Setup cleanup on exit
      cleanup() {
        echo "Shutting down services..."
        if [ -n "$INGESTION_PID" ]; then
          kill -TERM $INGESTION_PID 2>/dev/null || true
          wait $INGESTION_PID 2>/dev/null || true
        fi
        echo "Cleanup complete"
        exit 0
      }
      trap cleanup SIGTERM SIGINT
      
      # Start gunicorn in the foreground
      echo "Starting gunicorn..."
      cd /app && exec gunicorn \
        --bind :$PORT \
        --workers 2 \
        --threads 8 \
        --timeout 300 \
        --log-level info \
        app:app
      EOF

# Build and push container
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-container'
  args:
    - 'build'
    - '-t'
    - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:${COMMIT_SHA}'
    - '-t'
    - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest'
    - '.'

- name: 'gcr.io/cloud-builders/docker'
  id: 'push-container'
  args:
    - 'push'
    - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:${COMMIT_SHA}'

# Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy-cloudrun'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Deploy to Cloud Run
      gcloud run deploy threat-intelligence-platform \
        --image gcr.io/${PROJECT_ID}/threat-intelligence-platform:${COMMIT_SHA} \
        --region ${_REGION} \
        --platform managed \
        --allow-unauthenticated \
        --cpu 2 \
        --memory 2Gi \
        --set-env-vars "ENVIRONMENT=${_ENVIRONMENT},GCP_PROJECT=${PROJECT_ID},GCP_REGION=${_REGION}" \
        --service-account cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_STANDARD_4'

substitutions:
  _ENVIRONMENT: 'production'
  _REGION: 'us-central1'

images:
  - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:${COMMIT_SHA}'
  - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest'

timeout: '1800s'
