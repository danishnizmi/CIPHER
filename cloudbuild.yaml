# Cloud Build configuration for Threat Intelligence Platform
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: threat-intelligence-platform
  _DATASET: threat_intelligence
  _BUCKET_SUFFIX: threat-data

steps:
  # Step 0: Create necessary GCP resources
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "Creating necessary GCP resources..."
        
        # Create BigQuery dataset if it doesn't exist
        echo "Checking if BigQuery dataset exists: ${_DATASET}"
        if bq show --project_id=$PROJECT_ID ${_DATASET} >/dev/null 2>&1; then
          echo "BigQuery dataset already exists: ${_DATASET}"
        else
          echo "Creating BigQuery dataset: ${_DATASET}"
          bq mk --dataset --location=US --project_id=$PROJECT_ID ${_DATASET}
        fi
        
        # Create Cloud Storage bucket if it doesn't exist
        BUCKET_NAME="${PROJECT_ID}-${_BUCKET_SUFFIX}"
        echo "Checking Cloud Storage bucket: $${BUCKET_NAME}"
        if gsutil ls -p $PROJECT_ID gs://$${BUCKET_NAME} >/dev/null 2>&1; then
          echo "Cloud Storage bucket already exists: $${BUCKET_NAME}"
        else
          echo "Creating Cloud Storage bucket: $${BUCKET_NAME}"
          gsutil mb -p $PROJECT_ID -l ${_REGION} gs://$${BUCKET_NAME}
        fi
        
        # Create Pub/Sub topics if they don't exist
        for topic in threat-data-ingestion threat-analysis-events; do
          if ! gcloud pubsub topics describe $${topic} --project=$PROJECT_ID >/dev/null 2>&1; then
            echo "Creating Pub/Sub topic: $${topic}"
            gcloud pubsub topics create $${topic} --project=$PROJECT_ID
          else
            echo "Pub/Sub topic already exists: $${topic}"
          fi
        done
        
        # Create API key secret if it doesn't exist
        if ! gcloud secrets describe api-keys --project=$PROJECT_ID >/dev/null 2>&1; then
          echo "Creating secret: api-keys"
          API_KEY=$(openssl rand -hex 32)
          echo "Generated API key: $${API_KEY}"
          echo -n "$${API_KEY}" | gcloud secrets create api-keys --data-file=- --project=$PROJECT_ID
        else
          echo "Secret already exists: api-keys"
        fi
        
        # Create feed configuration secret if it doesn't exist
        if ! gcloud secrets describe feed-config --project=$PROJECT_ID >/dev/null 2>&1; then
          echo "Creating secret: feed-config"
          echo '{"feeds": []}' | gcloud secrets create feed-config --data-file=- --project=$PROJECT_ID
        else
          echo "Secret already exists: feed-config"
        fi

  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest'
      - '.'
    timeout: '600s'

  # Step 2: Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME'
    timeout: '300s'

  # Step 3: Deploy to Cloud Run with probes configured directly
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "Deploying to Cloud Run..."
        
        # First, check if the service already exists
        if gcloud run services describe $_SERVICE_NAME --region=$_REGION --project=$PROJECT_ID >/dev/null 2>&1; then
          echo "Service exists, updating..."
          # Use a YAML file for updating configuration
          cat > service.yaml << EOF
        apiVersion: serving.knative.dev/v1
        kind: Service
        metadata:
          name: $_SERVICE_NAME
        spec:
          template:
            metadata:
              annotations:
                autoscaling.knative.dev/minScale: '1'
                autoscaling.knative.dev/maxScale: '10'
                run.googleapis.com/startup-cpu-boost: 'true'
            spec:
              containerConcurrency: 80
              timeoutSeconds: 300
              containers:
              - image: gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA
                ports:
                - containerPort: 8080
                env:
                - name: ENVIRONMENT
                  value: 'production'
                - name: GCP_PROJECT
                  value: '$PROJECT_ID'
                - name: GCP_REGION
                  value: '$_REGION'
                - name: BIGQUERY_DATASET
                  value: '$_DATASET'
                - name: GCS_BUCKET
                  value: '${PROJECT_ID}-${_BUCKET_SUFFIX}'
                - name: PUBSUB_TOPIC
                  value: 'threat-data-ingestion'
                - name: PUBSUB_ANALYSIS_TOPIC
                  value: 'threat-analysis-events'
                - name: VERSION
                  value: '1.0.3'
                - name: DEBUG
                  value: 'false'
                - name: PYTHONPATH
                  value: '/app'
                - name: PYTHONDONTWRITEBYTECODE
                  value: '1'
                - name: PYTHONUNBUFFERED
                  value: '1'
                - name: LOG_LEVEL
                  value: 'INFO'
                - name: LOG_TO_CLOUD
                  value: 'true'
                - name: ENABLE_ERROR_REPORTING
                  value: 'true'
                - name: AUTO_ANALYZE
                  value: 'false'
                - name: NLP_ENABLED
                  value: 'true'
                - name: ANALYSIS_ENABLED
                  value: 'true'
                - name: BIGQUERY_MAX_BYTES_BILLED
                  value: '104857600'
                - name: ENSURE_GCP_RESOURCES
                  value: 'false'
                - name: API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: api-keys
                      key: latest
                resources:
                  limits:
                    memory: 2Gi
                    cpu: '2'
                  requests:
                    memory: 1Gi
                    cpu: '1'
                startupProbe:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 10
                livenessProbe:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
                readinessProbe:
                  httpGet:
                    path: /ready
                    port: 8080
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              serviceAccountName: cloud-build-service@$PROJECT_ID.iam.gserviceaccount.com
        EOF
          
          # Apply the service configuration
          gcloud run services replace service.yaml --region=$_REGION --project=$PROJECT_ID
        else
          echo "Service doesn't exist, creating new deployment..."
          # Create new service with basic configuration
          gcloud run deploy $_SERVICE_NAME \
            --image=gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA \
            --region=$_REGION \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=10 \
            --timeout=300 \
            --concurrency=80 \
            --cpu-boost \
            --set-env-vars=ENVIRONMENT=production,GCP_PROJECT=$PROJECT_ID,GCP_REGION=$_REGION,BIGQUERY_DATASET=$_DATASET,GCS_BUCKET=$PROJECT_ID-$_BUCKET_SUFFIX,PUBSUB_TOPIC=threat-data-ingestion,PUBSUB_ANALYSIS_TOPIC=threat-analysis-events,VERSION=1.0.3,DEBUG=false,PYTHONPATH=/app,PYTHONDONTWRITEBYTECODE=1,PYTHONUNBUFFERED=1,LOG_LEVEL=INFO,LOG_TO_CLOUD=true,ENABLE_ERROR_REPORTING=true,AUTO_ANALYZE=false,NLP_ENABLED=true,ANALYSIS_ENABLED=true,BIGQUERY_MAX_BYTES_BILLED=104857600,ENSURE_GCP_RESOURCES=false \
            --set-secrets=API_KEY=api-keys:latest \
            --service-account=cloud-build-service@$PROJECT_ID.iam.gserviceaccount.com
        fi

  # Step 4: Verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "Verifying deployment..."
        
        # Get the service URL
        SERVICE_URL=$(gcloud run services describe $_SERVICE_NAME \
          --platform managed \
          --region $_REGION \
          --format 'value(status.url)')
        
        echo "Service URL: $${SERVICE_URL}"
        
        # Wait for the service to be ready with longer timeout
        echo "Waiting for service to be ready..."
        for i in {1..40}; do
          if curl -s "$${SERVICE_URL}/health" > /dev/null; then
            echo "Service is ready!"
            break
          fi
          echo "Attempt $${i}/40: Service not ready yet..."
          sleep 10
        done
        
        # Final health check
        echo "Performing final health check..."
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$${SERVICE_URL}/health")
        
        if [ "$${HTTP_CODE}" -eq 200 ]; then
          echo "Deployment successful! Service is healthy."
          echo "Application URL: $${SERVICE_URL}"
        else
          echo "WARNING: Service returned HTTP $${HTTP_CODE}"
          echo "Check logs at: https://console.cloud.google.com/logs/viewer?project=$PROJECT_ID&resource=cloud_run_revision/service_name/$_SERVICE_NAME"
          
          # Still exit successfully to allow the deployment to complete
          echo "Service may need more time to initialize. Please check the logs."
        fi

images:
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '2400s'  # 40 minutes total timeout
