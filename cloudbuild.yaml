steps:
  # Install dependencies and run checks in a single step
  - name: 'python:3.10'
    id: 'setup-and-checks'
    script: |
      echo "Installing dependencies and running basic checks..."
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt
      
      # Optional: Run simple verification checks
      python -c "import config; print('Config module loaded successfully')"

  # Build frontend assets
  - name: 'node:16'
    id: 'build-frontend'
    script: |
      echo "Building frontend assets..."
      
      # Create directories and files
      mkdir -p static/src static/dist templates
      echo '@tailwind base; @tailwind components; @tailwind utilities;' > static/src/input.css
      
      # Set up package.json for Tailwind
      cat > package.json << 'EOF'
      {
        "name": "threat-intelligence-platform",
        "version": "1.0.0",
        "scripts": {
          "build": "tailwindcss -i static/src/input.css -o static/dist/output.css --minify"
        },
        "devDependencies": {
          "tailwindcss": "^3.3.0",
          "postcss": "^8.4.21",
          "autoprefixer": "^10.4.14"
        }
      }
      EOF
      
      # Set up Tailwind config
      cat > tailwind.config.js << 'EOF'
      module.exports = {
        content: ["./templates/**/*.html"],
        theme: {
          extend: {
            colors: {
              primary: '#0d6efd',
              secondary: '#6c757d',
              success: '#198754',
              info: '#0dcaf0',
              warning: '#ffc107',
              danger: '#dc3545',
              light: '#f8f9fa',
              dark: '#212529'
            }
          }
        },
        plugins: []
      };
      EOF
      
      # Install dependencies and build CSS
      npm install
      npx tailwindcss -i static/src/input.css -o static/dist/output.css --minify

  # Enable required Google Cloud APIs
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-gcp'
    script: |
      echo "Setting up Google Cloud resources..."
      
      # Get project ID
      PROJECT_ID=$(gcloud config get-value project)
      
      # Enable required APIs
      gcloud services enable \
        run.googleapis.com \
        cloudbuild.googleapis.com \
        secretmanager.googleapis.com \
        cloudresourcemanager.googleapis.com \
        clouderrorreporting.googleapis.com \
        pubsub.googleapis.com \
        storage.googleapis.com \
        bigquery.googleapis.com \
        iam.googleapis.com
      
      # Create or verify service account
      SERVICE_ACCOUNT="threat-intelligence-sa"
      SERVICE_ACCOUNT_EMAIL="${SERVICE_ACCOUNT}@${PROJECT_ID}.iam.gserviceaccount.com"
      
      if ! gcloud iam service-accounts describe ${SERVICE_ACCOUNT_EMAIL} 2>/dev/null; then
        echo "Creating service account: ${SERVICE_ACCOUNT_EMAIL}"
        gcloud iam service-accounts create ${SERVICE_ACCOUNT} \
          --display-name="Threat Intelligence Platform Service Account"
      else
        echo "Service account ${SERVICE_ACCOUNT_EMAIL} already exists"
      fi
      
      # Set up secrets
      echo "Setting up secrets..."
      
      # API Keys
      if ! gcloud secrets describe api-keys 2>/dev/null; then
        platform_api_key=$(cat /dev/urandom | LC_ALL=C tr -dc 'a-f0-9' | fold -w 48 | head -n 1)
        api_keys_json="{\"platform_api_key\":\"$platform_api_key\",\"created_at\":\"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}"
        echo "$api_keys_json" | gcloud secrets create api-keys --replication-policy="automatic" --data-file=-
        echo "Created api-keys secret"
      else
        echo "Secret api-keys already exists"
      fi
      
      # Admin password
      if ! gcloud secrets describe admin-initial-password 2>/dev/null; then
        admin_password=$(cat /dev/urandom | LC_ALL=C tr -dc 'a-zA-Z0-9' | fold -w 16 | head -n 1)
        echo "$admin_password" | gcloud secrets create admin-initial-password --replication-policy="automatic" --data-file=-
        echo "Created admin-initial-password secret with value: [REDACTED]"
      else
        echo "Secret admin-initial-password already exists"
      fi
      
      # Auth config
      if ! gcloud secrets describe auth-config 2>/dev/null; then
        session_secret=$(cat /dev/urandom | LC_ALL=C tr -dc 'a-f0-9' | fold -w 64 | head -n 1)
        auth_config_json="{\"session_secret\":\"$session_secret\",\"users\":{}}"
        echo "$auth_config_json" | gcloud secrets create auth-config --replication-policy="automatic" --data-file=-
        echo "Created auth-config secret"
      else
        echo "Secret auth-config already exists"
      fi
      
      # Grant secret access to the service accounts (cloud-build-service and threat-intelligence-sa)
      for SECRET_NAME in api-keys admin-initial-password auth-config; do
        echo "Granting secret access to $SECRET_NAME..."
        
        # Grant access to threat-intelligence-sa
        gcloud secrets add-iam-policy-binding $SECRET_NAME \
          --member="serviceAccount:$SERVICE_ACCOUNT_EMAIL" \
          --role="roles/secretmanager.secretAccessor" || echo "Warning: Could not grant access on $SECRET_NAME to $SERVICE_ACCOUNT_EMAIL"
          
        # Grant access to cloud-build-service
        gcloud secrets add-iam-policy-binding $SECRET_NAME \
          --member="serviceAccount:cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com" \
          --role="roles/secretmanager.secretAccessor" || echo "Warning: Could not grant access on $SECRET_NAME to cloud-build-service"
      done
      
      # Create BigQuery dataset if needed
      echo "Setting up BigQuery..."
      DATASET_ID="threat_intelligence"
      if ! bq ls --project_id=${PROJECT_ID} | grep -q ${DATASET_ID}; then
        bq --location=US mk --dataset \
          --description="Threat Intelligence Platform Data" \
          ${PROJECT_ID}:${DATASET_ID} || echo "Warning: Failed to create BigQuery dataset"
        echo "Created BigQuery dataset ${DATASET_ID}"
      else
        echo "BigQuery dataset ${DATASET_ID} already exists"
      fi
      
      # Grant BigQuery access to service accounts
      echo "Granting BigQuery access..."
      for ACCOUNT in "$SERVICE_ACCOUNT_EMAIL" "cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com"; do
        gcloud projects add-iam-policy-binding ${PROJECT_ID} \
          --member="serviceAccount:${ACCOUNT}" \
          --role="roles/bigquery.dataEditor" --condition=None || echo "Warning: Could not grant BigQuery access to ${ACCOUNT}"
      done
      
      # Create GCS bucket if needed
      echo "Setting up Cloud Storage..."
      BUCKET_NAME="${PROJECT_ID}-threat-data"
      if ! gsutil ls -b gs://${BUCKET_NAME} &>/dev/null; then
        gsutil mb -l us-central1 gs://${BUCKET_NAME} || echo "Warning: Failed to create bucket"
        echo "Created GCS bucket ${BUCKET_NAME}"
      else
        echo "GCS bucket ${BUCKET_NAME} already exists"
      fi
      
      # Grant Storage access to service accounts
      echo "Granting Storage access..."
      for ACCOUNT in "$SERVICE_ACCOUNT_EMAIL" "cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com"; do
        gsutil iam ch serviceAccount:${ACCOUNT}:objectAdmin gs://${BUCKET_NAME} || echo "Warning: Could not grant Storage access to ${ACCOUNT}"
      done
      
      # Create PubSub topics if needed
      echo "Setting up PubSub..."
      for TOPIC in threat-data-ingestion threat-analysis-events; do
        if ! gcloud pubsub topics describe ${TOPIC} --project=${PROJECT_ID} &>/dev/null; then
          gcloud pubsub topics create ${TOPIC} --project=${PROJECT_ID} || echo "Warning: Failed to create PubSub topic ${TOPIC}"
          echo "Created PubSub topic ${TOPIC}"
        else
          echo "PubSub topic ${TOPIC} already exists"
        fi
        
        # Grant Pub/Sub access to service accounts
        for ACCOUNT in "$SERVICE_ACCOUNT_EMAIL" "cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com"; do
          gcloud pubsub topics add-iam-policy-binding ${TOPIC} \
            --member="serviceAccount:${ACCOUNT}" \
            --role="roles/pubsub.publisher" || echo "Warning: Could not grant Pub/Sub access to ${ACCOUNT}"
        done
      done
      
      echo "GCP resource setup completed successfully"

  # Build container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-container'
    args: [
      'build',
      '--cache-from', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest',
      '-t', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest',
      '-t', 'gcr.io/$PROJECT_ID/threat-intelligence-platform:$COMMIT_SHA',
      '.'
    ]

  # Push container to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-container'
    args: [
      'push', 
      'gcr.io/$PROJECT_ID/threat-intelligence-platform:latest'
    ]

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    script: |
      echo "Deploying to Cloud Run..."
      
      # Get project ID
      PROJECT_ID=$(gcloud config get-value project)
      
      # Deploy to Cloud Run
      gcloud run deploy threat-intelligence-platform \
        --image "gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest" \
        --region us-central1 \
        --platform managed \
        --allow-unauthenticated \
        --cpu 2 \
        --memory 2Gi \
        --set-env-vars="ENVIRONMENT=production,GCP_PROJECT=${PROJECT_ID},GCP_REGION=us-central1,BIGQUERY_DATASET=threat_intelligence,GCS_BUCKET=${PROJECT_ID}-threat-data,PUBSUB_TOPIC=threat-data-ingestion,PUBSUB_ANALYSIS_TOPIC=threat-analysis-events,VERSION=${COMMIT_SHA},DEBUG=false,PYTHONPATH=/app,CLOUD_LOGGING=true,ENABLE_ERROR_REPORTING=true,LOG_LEVEL=INFO,LOAD_SECRETS=true,ENSURE_GCP_RESOURCES=true,IGNORE_PERMISSION_ERRORS=true" \
        --service-account="cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com" \
        --min-instances=1 \
        --max-instances=20 \
        --execution-environment=gen2 \
        --update-secrets="API_KEY=api-keys:platform_api_key,SECRET_KEY=auth-config:session_secret"
      
      # Get Cloud Run URL
      CLOUD_RUN_URL=$(gcloud run services describe threat-intelligence-platform --region=us-central1 --format='value(status.url)')
      echo "Deployed to: $CLOUD_RUN_URL"

  # Verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify-deployment'
    script: |
      echo "Verifying deployment..."
      
      # Wait for service to be ready
      sleep 60
      service_url=$(gcloud run services describe threat-intelligence-platform --region=us-central1 --format='value(status.url)')
      echo "Service deployed at: ${service_url}"
      
      # Check health endpoint
      max_attempts=10
      for attempt in $(seq 1 $max_attempts); do
        echo "Health check attempt $attempt of $max_attempts..."
        response_code=$(curl -s -o /dev/null -w "%{http_code}" "${service_url}/health" || echo "failed")
        if [ "$response_code" = "200" ]; then
          echo "✅ Health check successful!"
          break
        else
          echo "⚠️ Health check returned: $response_code - waiting 30s..."
          sleep 30
        fi
      done
      
      echo "Deployment completed. Service URL: ${service_url}"

# Build timeout and options
timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
