steps:
# Install dependencies
- name: 'python:3.10'
  id: 'install-dependencies'
  entrypoint: bash
  args:
    - '-c'
    - |
      pip install --upgrade pip
      pip install -r requirements.txt --user

# Create a completely new Dockerfile that works around substitution issues
- name: 'bash'
  id: 'create-new-dockerfile'
  args:
    - '-c'
    - |
      # Rename original Dockerfile to avoid conflicts
      mv Dockerfile Dockerfile.original || true
      
      # Create a new Dockerfile that doesn't use substitution syntax
      cat > Dockerfile << 'EOF'
      FROM python:3.10-slim

      WORKDIR /app
      
      # Use environment variables with single $ to avoid substitution issues
      ENV PORT=8080 \
          PYTHONPATH=/app \
          PYTHONDONTWRITEBYTECODE=1 \
          PYTHONUNBUFFERED=1 \
          CONTAINER_BUILD=true \
          PIP_NO_CACHE_DIR=1 \
          PIP_DISABLE_PIP_VERSION_CHECK=1 \
          GO_INGESTION_PORT=8081
      
      # Install system dependencies 
      RUN apt-get update && apt-get install -y --no-install-recommends \
          gcc \
          curl \
          python3-dev \
          libffi-dev \
          git \
          procps \
          netcat \
          && apt-get clean \
          && rm -rf /var/lib/apt/lists/*

      # Create necessary directories
      RUN mkdir -p scripts static functions/ingestion functions/analysis bin logs
      
      # Copy requirements and install
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt
      
      # Copy application code
      COPY . .
      
      # Simple startup script
      RUN echo '#!/bin/bash\ncd /app && exec gunicorn --bind :$PORT --workers 2 --threads 8 app:app' > /app/entrypoint.sh && \
          chmod +x /app/entrypoint.sh
      
      EXPOSE 8080
      ENTRYPOINT ["/app/entrypoint.sh"]
      EOF
      
      echo "Created new Dockerfile without substitution variables"

# Build and push container
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/${PROJECT_ID}/threat-intel:${COMMIT_SHA}', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/${PROJECT_ID}/threat-intel:${COMMIT_SHA}']

# Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args:
    - 'run'
    - 'deploy'
    - 'threat-intel'
    - '--image'
    - 'gcr.io/${PROJECT_ID}/threat-intel:${COMMIT_SHA}'
    - '--region'
    - 'us-central1'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'

images:
  - 'gcr.io/${PROJECT_ID}/threat-intel:${COMMIT_SHA}'

timeout: '1800s'
