steps:
# Install dependencies
- name: 'python:3.10'
  id: 'install-dependencies'
  entrypoint: bash
  args:
    - '-c'
    - |
      pip install --upgrade pip
      pip install -r requirements.txt --user

# Setup functions directories
- name: 'python:3.10'
  id: 'prepare-functions'
  entrypoint: bash
  args:
    - '-c'
    - |
      # Create functions directory structure
      mkdir -p functions/ingestion functions/analysis scripts
      
      # Copy main application code to functions
      cp analysis.py functions/analysis/
      cp config.py functions/analysis/
      cp config.py functions/ingestion/
      
      # Create function entry points
      cat > functions/ingestion/main.py << 'EOF'
      from ingestion import ingest_threat_data
      EOF
      
      cat > functions/analysis/main.py << 'EOF'
      from analysis import analyze_threat_data
      EOF
      
      # Create function requirements - With proper package name (google-cloud-secret-manager)
      cat > functions/ingestion/requirements.txt << 'EOF'
      google-cloud-bigquery>=3.3.5
      google-cloud-storage>=2.7.0
      google-cloud-pubsub>=2.13.11
      google-cloud-secret-manager>=2.0.0
      google-cloud-logging>=3.2.5
      google-cloud-error-reporting>=1.6.0
      google-auth>=2.15.0
      requests>=2.28.1
      python-dateutil>=2.8.2
      EOF
      
      cat > functions/analysis/requirements.txt << 'EOF'
      google-cloud-bigquery>=3.3.5
      google-cloud-storage>=2.7.0
      google-cloud-pubsub>=2.13.11
      google-cloud-language>=2.6.1
      google-cloud-secret-manager>=2.0.0
      google-cloud-logging>=3.2.5
      google-cloud-error-reporting>=1.6.0
      vertexai>=1.0.0
      google-auth>=2.15.0
      requests>=2.28.1
      python-dateutil>=2.8.2
      EOF
      
      # Copy application's requirements to scripts directory
      cp requirements.txt scripts/
      
      # Create BigQuery setup script
      cat > scripts/setup_bigquery_tables.py << 'EOF'
      import os
      from google.cloud import bigquery
      
      PROJECT_ID = os.environ.get("GCP_PROJECT", "${PROJECT_ID}")
      DATASET_ID = os.environ.get("BIGQUERY_DATASET", "threat_intelligence")
      
      def create_dataset():
          client = bigquery.Client(project=PROJECT_ID)
          try:
              dataset_ref = f"{PROJECT_ID}.{DATASET_ID}"
              dataset = bigquery.Dataset(dataset_ref)
              dataset.location = "US"
              dataset = client.create_dataset(dataset, exists_ok=True)
              print(f"Dataset {DATASET_ID} created or already exists")
              
              # Create standard tables
              create_standard_tables(client)
              return True
          except Exception as e:
              print(f"Error creating dataset: {str(e)}")
              return False
      
      def create_standard_tables(client):
          # Create threat_analysis table
          analysis_table_id = f"{PROJECT_ID}.{DATASET_ID}.threat_analysis"
          analysis_schema = [
              bigquery.SchemaField("source_id", "STRING"),
              bigquery.SchemaField("source_type", "STRING"),
              bigquery.SchemaField("iocs", "STRING"),
              bigquery.SchemaField("vertex_analysis", "STRING"),
              bigquery.SchemaField("analysis_timestamp", "TIMESTAMP"),
              bigquery.SchemaField("severity", "STRING"),
              bigquery.SchemaField("confidence", "STRING")
          ]
          
          create_table_if_not_exists(client, analysis_table_id, analysis_schema)
          
          # Create threat_campaigns table
          campaigns_table_id = f"{PROJECT_ID}.{DATASET_ID}.threat_campaigns"
          campaigns_schema = [
              bigquery.SchemaField("campaign_id", "STRING"),
              bigquery.SchemaField("campaign_name", "STRING"),
              bigquery.SchemaField("threat_actor", "STRING"),
              bigquery.SchemaField("malware", "STRING"),
              bigquery.SchemaField("techniques", "STRING"),
              bigquery.SchemaField("targets", "STRING"),
              bigquery.SchemaField("severity", "STRING"),
              bigquery.SchemaField("sources", "STRING"),
              bigquery.SchemaField("iocs", "STRING"),
              bigquery.SchemaField("source_count", "INTEGER"),
              bigquery.SchemaField("ioc_count", "INTEGER"),
              bigquery.SchemaField("first_seen", "STRING"),
              bigquery.SchemaField("last_seen", "STRING"),
              bigquery.SchemaField("detection_timestamp", "STRING")
          ]
          
          create_table_if_not_exists(client, campaigns_table_id, campaigns_schema)
          
          # Create common feed tables
          for feed in ["threatfox_iocs", "phishtank_urls", "urlhaus_malware"]:
              feed_table_id = f"{PROJECT_ID}.{DATASET_ID}.{feed}"
              feed_schema = [
                  bigquery.SchemaField("_ingestion_timestamp", "TIMESTAMP"),
                  bigquery.SchemaField("_ingestion_id", "STRING"),
                  bigquery.SchemaField("_source", "STRING"),
                  bigquery.SchemaField("_feed_type", "STRING")
              ]
              create_table_if_not_exists(client, feed_table_id, feed_schema)
      
      def create_table_if_not_exists(client, table_id, schema):
          try:
              from google.cloud.exceptions import NotFound
              
              try:
                  client.get_table(table_id)
                  print(f"Table {table_id} already exists")
              except NotFound:
                  table = bigquery.Table(table_id, schema=schema)
                  table = client.create_table(table, exists_ok=True)
                  print(f"Created table {table_id}")
          except Exception as e:
              print(f"Error with table {table_id}: {str(e)}")
      
      if __name__ == "__main__":
          create_dataset()
      EOF

# Run tests (minimal)
- name: 'python:3.10'
  id: 'run-tests'
  entrypoint: bash
  args:
    - '-c'
    - |
      echo "Running basic tests..."
      # Test that python files are valid syntax
      python -m py_compile app.py config.py api.py frontend.py || echo "Warning: Python syntax check failed"
      
      # Test that templates are present
      if [ -d "templates" ]; then
        echo "Template directory exists"
      else
        echo "Warning: Template directory missing"
      fi
      
      echo "Test phase completed"

# Build frontend static files
- name: 'node:16'
  id: 'build-frontend'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Create static directories if they don't exist
      mkdir -p static/src static/dist
      
      # Create basic input.css file if it doesn't exist
      if [ ! -f static/src/input.css ]; then
        echo '@tailwind base; @tailwind components; @tailwind utilities;' > static/src/input.css
      fi
      
      # Create proper package.json with scripts
      cat > package.json << 'EOF'
      {
        "name": "threat-intelligence-platform",
        "version": "1.0.0",
        "scripts": {
          "build": "tailwindcss -i static/src/input.css -o static/dist/output.css --minify"
        },
        "devDependencies": {
          "tailwindcss": "^3.3.0",
          "postcss": "^8.4.21",
          "autoprefixer": "^10.4.14"
        }
      }
      EOF
      
      # Create tailwind config
      cat > tailwind.config.js << 'EOF'
      module.exports = {
        content: ["./templates/**/*.html"],
        theme: {
          extend: {
            colors: {
              primary: '#0d6efd',
              secondary: '#6c757d',
              success: '#198754',
              info: '#0dcaf0',
              warning: '#ffc107',
              danger: '#dc3545',
              light: '#f8f9fa',
              dark: '#212529',
            }
          }
        },
        plugins: []
      };
      EOF
      
      # Install dependencies and build CSS
      npm install
      npm run build

# Enable required APIs
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'enable-apis'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo "Enabling required APIs..."
      gcloud services enable cloudfunctions.googleapis.com
      gcloud services enable eventarc.googleapis.com
      gcloud services enable appengine.googleapis.com
      gcloud services enable cloudscheduler.googleapis.com
      gcloud services enable secretmanager.googleapis.com
      gcloud services enable run.googleapis.com
      gcloud services enable cloudbuild.googleapis.com
      gcloud services enable cloudresourcemanager.googleapis.com
      gcloud services enable clouderrorreporting.googleapis.com
      gcloud services enable monitoring.googleapis.com
      gcloud services enable aiplatform.googleapis.com
      echo "APIs enabled successfully."

# Build the container image
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-container'
  args:
    - 'build'
    - '-t'
    - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:${COMMIT_SHA}'
    - '-t'
    - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest'
    - '.'

# Push the container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-container'
  args:
    - 'push'
    - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:${COMMIT_SHA}'

# Add required secrets to Secret Manager
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'setup-secrets'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Check and create secrets with meaningful initial values if they don't exist
      # API Keys
      if ! gcloud secrets describe api-keys 2>/dev/null; then
        # Generate a random API key using Python
        platform_api_key=$$(python3 -c "import secrets; print(secrets.token_hex(16))")
        api_keys_json="{\"platform_api_key\":\"$$platform_api_key\",\"created_at\":\"$$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}"
        echo "$$api_keys_json" | gcloud secrets create api-keys \
          --replication-policy="automatic" \
          --data-file=-
        echo "Created api-keys secret with secure random key"
      else
        echo "Secret api-keys already exists"
      fi
      
      # Auth config (empty users object)
      if ! gcloud secrets describe auth-config 2>/dev/null; then
        # Generate a secure session key
        session_secret=$$(python3 -c "import secrets; print(secrets.token_hex(32))")
        auth_config="{\"users\":{},\"session_secret\":\"$$session_secret\"}"
        echo "$$auth_config" | gcloud secrets create auth-config \
          --replication-policy="automatic" \
          --data-file=-
        echo "Created auth-config secret with secure session secret"
      else
        echo "Secret auth-config already exists"
      fi
      
      # Database credentials (empty defaults)
      if ! gcloud secrets describe database-credentials 2>/dev/null; then
        db_config="{\"project_id\":\"${PROJECT_ID}\",\"dataset_id\":\"threat_intelligence\"}"
        echo "$$db_config" | gcloud secrets create database-credentials \
          --replication-policy="automatic" \
          --data-file=-
        echo "Created database-credentials secret"
      else
        echo "Secret database-credentials already exists"
      fi
      
      # Feed configuration
      if ! gcloud secrets describe feed-config 2>/dev/null; then
        feed_config="{\"threatfox\":{\"url\":\"https://threatfox.abuse.ch/export/json/recent/\"},\"phishtank\":{\"url\":\"https://data.phishtank.com/data/online-valid.json\"},\"urlhaus\":{\"url\":\"https://urlhaus.abuse.ch/downloads/csv_recent/\"}}"
        echo "$$feed_config" | gcloud secrets create feed-config \
          --replication-policy="automatic" \
          --data-file=-
        echo "Created feed-config secret with standard threat feeds"
      else
        echo "Secret feed-config already exists"
      fi
      
      # Create admin password if needed
      if ! gcloud secrets describe admin-initial-password 2>/dev/null; then
        # Generate a secure admin password
        admin_password=$$(python3 -c "import secrets, string; chars = string.ascii_letters + string.digits + '!@#$%^&*()'; print(''.join(secrets.choice(chars) for i in range(12)))")
        echo "$$admin_password" | gcloud secrets create admin-initial-password \
          --replication-policy="automatic" \
          --data-file=-
        echo "Created admin-initial-password secret"
      else
        echo "Secret admin-initial-password already exists"
      fi
      
      # Grant the service account access to the secrets - AVOIDING FOR LOOP WITH EXPLICIT LISTING
      gcloud secrets add-iam-policy-binding api-keys \
        --member="serviceAccount:cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com" \
        --role="roles/secretmanager.secretAccessor"
        
      gcloud secrets add-iam-policy-binding database-credentials \
        --member="serviceAccount:cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com" \
        --role="roles/secretmanager.secretAccessor"
        
      gcloud secrets add-iam-policy-binding feed-config \
        --member="serviceAccount:cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com" \
        --role="roles/secretmanager.secretAccessor"
        
      gcloud secrets add-iam-policy-binding auth-config \
        --member="serviceAccount:cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com" \
        --role="roles/secretmanager.secretAccessor"
        
      gcloud secrets add-iam-policy-binding admin-initial-password \
        --member="serviceAccount:cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com" \
        --role="roles/secretmanager.secretAccessor"

# Deploy container image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy-cloudrun'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Get the API key from Secret Manager
      api_key_value=$$(gcloud secrets versions access latest --secret=api-keys | python3 -c "import sys, json; print(json.load(sys.stdin).get('platform_api_key', ''))" || echo "")
      
      if [ -z "$$api_key_value" ]; then
        echo "Warning: Could not retrieve API key, generating a new one"
        # Generate a new API key using Python
        api_key_value=$$(python3 -c "import secrets; print(secrets.token_hex(16))")
        
        # Store it in Secret Manager
        api_keys_json="{\"platform_api_key\":\"$$api_key_value\",\"updated_at\":\"$$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}"
        echo "$$api_keys_json" | gcloud secrets versions add api-keys --data-file=-
        echo "Generated and stored new API key"
      fi
      
      # Get or generate Flask session secret key
      secret_key_value=$$(gcloud secrets versions access latest --secret=auth-config | python3 -c "import sys, json; print(json.load(sys.stdin).get('session_secret', ''))" || echo "")
      if [ -z "$$secret_key_value" ]; then
        secret_key_value=$$(python3 -c "import secrets; print(secrets.token_hex(32))")
        echo "Generated new Flask session key"
      fi
      
      # Deploy to Cloud Run with proper environment variables
      gcloud run deploy threat-intelligence-platform \
        --image gcr.io/${PROJECT_ID}/threat-intelligence-platform:${COMMIT_SHA} \
        --region ${_REGION} \
        --platform managed \
        --allow-unauthenticated \
        --cpu 2 \
        --memory 2Gi \
        --set-env-vars "ENVIRONMENT=${_ENVIRONMENT},GCP_PROJECT=${PROJECT_ID},GCP_REGION=${_REGION},BIGQUERY_DATASET=threat_intelligence,GCS_BUCKET=${PROJECT_ID}-threat-data,PUBSUB_TOPIC=threat-data-ingestion,API_KEY=$$api_key_value,SECRET_KEY=$$secret_key_value,VERSION=1.0.2,OTX_API_KEY=a86c2d20623de217e13dda7687e91eb657fde2442ce82aa44df5cba24ad4e90d" \
        --service-account cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com

# Create/update BigQuery dataset and tables
- name: 'python:3.10'
  id: 'setup-bigquery'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Install required packages
      cd scripts
      pip install -r requirements.txt
      
      # Set environment variables
      export GCP_PROJECT=${PROJECT_ID}
      export BIGQUERY_DATASET=threat_intelligence
      
      # Run the script
      echo "Running BigQuery setup script..."
      python setup_bigquery_tables.py

# Set up Pub/Sub topics
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'setup-pubsub'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Create Pub/Sub topics using gcloud's built-in idempotent behavior
      echo "Setting up Pub/Sub topics and subscriptions..."
      
      # Create topics
      gcloud pubsub topics create threat-data-ingestion --project=${PROJECT_ID} 2>/dev/null || \
        echo "Topic threat-data-ingestion already exists"
      
      gcloud pubsub topics create threat-analysis-events --project=${PROJECT_ID} 2>/dev/null || \
        echo "Topic threat-analysis-events already exists"
      
      # Create subscriptions with 7-day message retention
      gcloud pubsub subscriptions create threat-data-ingestion-sub \
        --topic=threat-data-ingestion \
        --project=${PROJECT_ID} \
        --message-retention-duration=7d \
        --ack-deadline=60s 2>/dev/null || \
        echo "Subscription threat-data-ingestion-sub already exists"
      
      gcloud pubsub subscriptions create threat-analysis-events-sub \
        --topic=threat-analysis-events \
        --project=${PROJECT_ID} \
        --message-retention-duration=7d \
        --ack-deadline=60s 2>/dev/null || \
        echo "Subscription threat-analysis-events-sub already exists"

# Deploy Cloud Function for feed ingestion
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy-ingestion-function'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Get the API key from Secret Manager
      api_key_value=$$(gcloud secrets versions access latest --secret=api-keys | python3 -c "import sys, json; print(json.load(sys.stdin).get('platform_api_key', ''))" || echo "")
      
      if [ -z "$$api_key_value" ]; then
        echo "Warning: Could not retrieve API key, generating a new one"
        api_key_value=$$(python3 -c "import secrets; print(secrets.token_hex(16))")
      fi
      
      # Copy required files to functions directory
      cp ingestion.py functions/ingestion/
      
      # Deploy the ingestion function
      cd functions/ingestion
      echo "Deploying ingestion function..."
      
      gcloud functions deploy ingest_threat_data \
        --region=${_REGION} \
        --runtime=python310 \
        --trigger-http \
        --no-gen2 \
        --allow-unauthenticated \
        --timeout=540s \
        --memory=1024MB \
        --project=${PROJECT_ID} \
        --service-account=cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com \
        --set-env-vars=GCP_PROJECT=${PROJECT_ID},GCP_REGION=${_REGION},API_KEY=$$api_key_value,ENVIRONMENT=${_ENVIRONMENT},OTX_API_KEY=a86c2d20623de217e13dda7687e91eb657fde2442ce82aa44df5cba24ad4e90d

# Fix IAM policy for ingestion function
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'fix-ingestion-iam'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo "Setting IAM policy for ingestion function..."
      
      # Try to grant the service account cloudfunctions.admin role
      gcloud projects add-iam-policy-binding ${PROJECT_ID} \
        --member=serviceAccount:cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com \
        --role=roles/cloudfunctions.admin 2>/dev/null || echo "Note: Could not grant cloudfunctions.admin role"
      
      # Try to set allUsers invoker access
      gcloud functions add-iam-policy-binding ingest_threat_data \
        --region=${_REGION} \
        --member=allUsers \
        --role=roles/cloudfunctions.invoker || {
          echo "Notice: Could not set IAM policy for ingestion function."
          echo "Function is still accessible because it was deployed with --allow-unauthenticated"
        }

# Deploy Cloud Function for analysis
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy-analysis-function'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Get the API key from Secret Manager
      api_key_value=$$(gcloud secrets versions access latest --secret=api-keys | python3 -c "import sys, json; print(json.load(sys.stdin).get('platform_api_key', ''))" || echo "")
      
      # Deploy the analysis function
      cd functions/analysis
      echo "Deploying analysis function..."
      
      gcloud functions deploy analyze_threat_data \
        --region=${_REGION} \
        --runtime=python310 \
        --no-gen2 \
        --trigger-topic=threat-data-ingestion \
        --timeout=540s \
        --memory=2048MB \
        --project=${PROJECT_ID} \
        --service-account=cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com \
        --set-env-vars=GCP_PROJECT=${PROJECT_ID},GCP_REGION=${_REGION},API_KEY=$$api_key_value,ENVIRONMENT=${_ENVIRONMENT},OTX_API_KEY=a86c2d20623de217e13dda7687e91eb657fde2442ce82aa44df5cba24ad4e90d

# Set up Cloud Scheduler jobs for periodic feed updates
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'setup-scheduler'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Get the API key from Secret Manager
      api_key_value=$$(gcloud secrets versions access latest --secret=api-keys | python3 -c "import sys, json; print(json.load(sys.stdin).get('platform_api_key', ''))" || echo "")
      
      # Delete any existing job to avoid conflicts
      gcloud scheduler jobs delete update-threat-feeds --location=${_REGION} --quiet 2>/dev/null || true
      
      if [ -z "$$api_key_value" ]; then
        echo "Warning: Could not retrieve API key, using Pub/Sub method instead"
        # Use Pub/Sub approach if we can't get the API key
        gcloud scheduler jobs create pubsub update-threat-feeds \
          --location=${_REGION} \
          --schedule="0 */3 * * *" \
          --topic="projects/${PROJECT_ID}/topics/threat-data-ingestion" \
          --message-body='{"process_all": true}' \
          --time-zone="UTC" \
          --description="Update threat feeds every 3 hours" \
          --project=${PROJECT_ID}
      else
        # Create with API key in header
        gcloud scheduler jobs create http update-threat-feeds \
          --location=${_REGION} \
          --schedule="0 */3 * * *" \
          --uri="https://${_REGION}-${PROJECT_ID}.cloudfunctions.net/ingest_threat_data" \
          --http-method=POST \
          --headers="X-API-Key=$$api_key_value" \
          --message-body='{"process_all": true}' \
          --time-zone="UTC" \
          --attempt-deadline=30m \
          --description="Update threat feeds every 3 hours" \
          --project=${PROJECT_ID}
      fi

# Run post-deployment check
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'post-deployment-check'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Wait for deployment to be ready
      echo "Waiting for service to be ready..."
      sleep 30
      
      # Get service URL
      service_url=$$(gcloud run services describe threat-intelligence-platform --region=${_REGION} --project=${PROJECT_ID} --format='value(status.url)')
      echo "Service deployed at: $$service_url"
      
      # Check if the service is responding
      echo "Checking health endpoint..."
      attempt=1
      max_attempts=5
      success=false
      
      while [ $$attempt -le $$max_attempts ]; do
        echo "Attempt $$attempt of $$max_attempts..."
        response_code=$$(curl -s -o /dev/null -w "%{http_code}" "$$service_url/health" || echo "failed")
        
        if [ "$$response_code" = "200" ]; then
          echo "✅ Health check successful!"
          success=true
          break
        else
          echo "⚠️ Health check returned: $$response_code"
          echo "Waiting for service to initialize..."
          sleep 30
          attempt=$$((attempt+1))
        fi
      done
      
      if [ "$$success" = false ]; then
        echo "⚠️ Health check did not succeed after $$max_attempts attempts."
        echo "For troubleshooting, check the logs at: https://console.cloud.google.com/run/detail/${_REGION}/threat-intelligence-platform/logs?project=${PROJECT_ID}"
      fi
      
      echo "✨ Deployment completed! ✨"
      echo "Access your threat intelligence platform at: $$service_url"

# Clean up old container images
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'cleanup-old-images'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # Keep only the 5 most recent images
      echo "Cleaning up old container images..."
      # Use || true to prevent build failure if cleanup fails
      gcloud container images list-tags gcr.io/${PROJECT_ID}/threat-intelligence-platform \
        --format="get(digest)" | tail -n +6 | xargs -I {} gcloud container images delete \
        --quiet gcr.io/${PROJECT_ID}/threat-intelligence-platform@{} --force-delete-tags || true

# Add the required logging configuration
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Add required substitutions
substitutions:
  _ENVIRONMENT: 'production'
  _REGION: 'us-central1'

# Specify the images that will be preserved as outputs of this build
images:
  - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:${COMMIT_SHA}'
  - 'gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest'

# Configure build timeout
timeout: '2700s'
