steps:
  # Install dependencies and run checks
  - name: 'python:3.10'
    id: 'setup-and-checks'
    script: |
      echo "Installing dependencies and running basic checks..."
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt
      
      # Basic verification checks
      python -c "import config; print('Config module loaded successfully')"

  # Build frontend assets
  - name: 'node:16'
    id: 'build-frontend'
    script: |
      echo "Building frontend assets..."
      
      # Create directories and files
      mkdir -p static/src static/dist templates
      echo '@tailwind base; @tailwind components; @tailwind utilities;' > static/src/input.css
      
      # Set up package.json for Tailwind
      cat > package.json << 'EOF'
      {
        "name": "threat-intelligence-platform",
        "version": "1.0.0",
        "scripts": {
          "build": "tailwindcss -i static/src/input.css -o static/dist/output.css --minify"
        },
        "devDependencies": {
          "tailwindcss": "^3.3.0",
          "postcss": "^8.4.21",
          "autoprefixer": "^10.4.14"
        }
      }
      EOF
      
      # Set up Tailwind config
      cat > tailwind.config.js << 'EOF'
      module.exports = {
        content: ["./templates/**/*.html"],
        theme: {
          extend: {
            colors: {
              primary: '#0d6efd',
              secondary: '#6c757d',
              success: '#198754',
              info: '#0dcaf0',
              warning: '#ffc107',
              danger: '#dc3545',
              light: '#f8f9fa',
              dark: '#212529'
            }
          }
        },
        plugins: []
      };
      EOF
      
      # Install dependencies and build CSS
      npm install
      npx tailwindcss -i static/src/input.css -o static/dist/output.css --minify

  # Enable required Google Cloud APIs and setup resources
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-gcp'
    script: |
      echo "Setting up Google Cloud resources..."
      
      # Define project ID
      PROJECT_ID="primal-chariot-382610"
      SERVICE_ACCOUNT="cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com"
      
      # Enable required APIs
      gcloud services enable \
        run.googleapis.com \
        cloudbuild.googleapis.com \
        secretmanager.googleapis.com \
        cloudresourcemanager.googleapis.com \
        clouderrorreporting.googleapis.com \
        pubsub.googleapis.com \
        storage.googleapis.com \
        bigquery.googleapis.com \
        logging.googleapis.com \
        iam.googleapis.com
      
      # Verify secrets exist and ensure service account has access
      echo "Verifying required secrets..."
      for SECRET_NAME in api-keys auth-config admin-initial-password feed-config flask-secret-key; do
        if ! gcloud secrets describe $SECRET_NAME --project=${PROJECT_ID} >/dev/null 2>&1; then
          echo "Creating secret $SECRET_NAME..."
          if [ "$SECRET_NAME" = "api-keys" ]; then
            echo '{"platform_api_key":"'$(openssl rand -hex 16)'"}' | \
            gcloud secrets create $SECRET_NAME --data-file=- \
            --project=${PROJECT_ID}
          elif [ "$SECRET_NAME" = "auth-config" ]; then
            echo '{"session_secret":"'$(openssl rand -hex 32)'","users":{"admin":{"password":"'$(echo -n "admin" | sha256sum | awk '{print $1}')'",'
            echo '"role":"admin","created_at":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}}}'| \
            gcloud secrets create $SECRET_NAME --data-file=- \
            --project=${PROJECT_ID}
          elif [ "$SECRET_NAME" = "admin-initial-password" ]; then
            echo "admin" | gcloud secrets create $SECRET_NAME --data-file=- \
            --project=${PROJECT_ID}
          elif [ "$SECRET_NAME" = "feed-config" ]; then
            echo '{
              "feeds": [
                {
                  "id": "phishtank",
                  "name": "PhishTank URLs",
                  "url": "http://data.phishtank.com/data/online-valid.json",
                  "description": "URLs verified as phishing by PhishTank community",
                  "format": "json",
                  "type": "url",
                  "update_frequency": "daily",
                  "enabled": true
                },
                {
                  "id": "urlhaus",
                  "name": "URLhaus Malware",
                  "url": "https://urlhaus.abuse.ch/downloads/csv_recent/",
                  "description": "Recent malware URLs from URLhaus",
                  "format": "csv",
                  "type": "url",
                  "update_frequency": "daily",
                  "enabled": true
                },
                {
                  "id": "threatfox",
                  "name": "ThreatFox IOCs",
                  "url": "https://threatfox.abuse.ch/export/json/recent/",
                  "description": "Recent indicators from ThreatFox",
                  "format": "json",
                  "type": "mixed",
                  "update_frequency": "daily",
                  "enabled": true
                }
              ],
              "update_interval_hours": 6,
              "default_tags": [],
              "user_agent": "ThreatIntelligencePlatform/1.0.2",
              "request_timeout": 30,
              "max_retries": 3
            }' | gcloud secrets create $SECRET_NAME --data-file=- \
            --project=${PROJECT_ID}
          elif [ "$SECRET_NAME" = "flask-secret-key" ]; then
            echo $(openssl rand -hex 32) | gcloud secrets create $SECRET_NAME --data-file=- \
            --project=${PROJECT_ID}
          fi
          echo "Created secret $SECRET_NAME"
        else
          echo "Secret $SECRET_NAME exists"
        fi
          
        # Ensure the service account has access to the secret
        gcloud secrets add-iam-policy-binding $SECRET_NAME \
          --member="serviceAccount:${SERVICE_ACCOUNT}" \
          --role="roles/secretmanager.secretAccessor" \
          --project=${PROJECT_ID} >/dev/null 2>&1 || echo "Note: Service account may already have access to $SECRET_NAME"
      done
      
      # Create BigQuery dataset if needed
      echo "Setting up BigQuery..."
      DATASET_ID="threat_intelligence"
      if ! bq ls --project_id=${PROJECT_ID} | grep -q ${DATASET_ID}; then
        bq --location=US mk --dataset \
          --description="Threat Intelligence Platform Data" \
          ${PROJECT_ID}:${DATASET_ID} || echo "Warning: Failed to create BigQuery dataset"
        echo "Created BigQuery dataset ${DATASET_ID}"
      else
        echo "BigQuery dataset ${DATASET_ID} already exists"
      fi
      
      # Create GCS bucket if needed
      echo "Setting up Cloud Storage..."
      BUCKET_NAME="${PROJECT_ID}-threat-data"
      if ! gsutil ls -b gs://${BUCKET_NAME} &>/dev/null; then
        gsutil mb -l us-central1 gs://${BUCKET_NAME} || echo "Warning: Failed to create bucket"
        # Create folder structure
        for FOLDER in raw processed exports temp feeds cache; do
          gsutil cp /dev/null gs://${BUCKET_NAME}/${FOLDER}/ || true
        done
        echo "Created GCS bucket ${BUCKET_NAME} with folder structure"
      else
        echo "GCS bucket ${BUCKET_NAME} already exists"
      fi
      
      # Create PubSub topics if needed
      echo "Setting up PubSub..."
      for TOPIC in threat-data-ingestion threat-analysis-events; do
        if ! gcloud pubsub topics describe ${TOPIC} --project=${PROJECT_ID} &>/dev/null; then
          gcloud pubsub topics create ${TOPIC} --project=${PROJECT_ID} || echo "Warning: Failed to create PubSub topic ${TOPIC}"
          echo "Created PubSub topic ${TOPIC}"
        else
          echo "PubSub topic ${TOPIC} already exists"
        fi
        
        # Ensure Pub/Sub access for the service account
        gcloud pubsub topics add-iam-policy-binding ${TOPIC} \
          --project=${PROJECT_ID} \
          --member="serviceAccount:${SERVICE_ACCOUNT}" \
          --role="roles/pubsub.publisher" || echo "Warning: Could not grant Pub/Sub access"
      done
      
      echo "GCP resource setup completed successfully"

  # Build container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-container'
    args: [
      'build',
      '--cache-from', 'gcr.io/primal-chariot-382610/threat-intelligence-platform:latest',
      '-t', 'gcr.io/primal-chariot-382610/threat-intelligence-platform:latest',
      '-t', 'gcr.io/primal-chariot-382610/threat-intelligence-platform:$COMMIT_SHA',
      '.'
    ]

  # Push container to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-container'
    args: [
      'push', 
      'gcr.io/primal-chariot-382610/threat-intelligence-platform:latest'
    ]

  # Deploy to Cloud Run using Secret Manager integration
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    script: |
      echo "Deploying to Cloud Run..."
      
      # Define project ID and service account
      PROJECT_ID="primal-chariot-382610"
      SERVICE_ACCOUNT="cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com"
      
      # Deploy to Cloud Run using Secret Manager references
      gcloud run deploy threat-intelligence-platform \
        --image "gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest" \
        --region us-central1 \
        --platform managed \
        --allow-unauthenticated \
        --cpu 2 \
        --memory 2Gi \
        --service-account="${SERVICE_ACCOUNT}" \
        --set-env-vars="ENVIRONMENT=production,GCP_PROJECT=${PROJECT_ID},GCP_REGION=us-central1,BIGQUERY_DATASET=threat_intelligence,GCS_BUCKET=${PROJECT_ID}-threat-data,PUBSUB_TOPIC=threat-data-ingestion,PUBSUB_ANALYSIS_TOPIC=threat-analysis-events,VERSION=1.0.2,DEBUG=false,PYTHONPATH=/app,CLOUD_LOGGING=true,ENABLE_ERROR_REPORTING=true,LOG_LEVEL=INFO,LOAD_SECRETS_IN_DEV=true" \
        --update-secrets="API_KEY=api-keys:platform_api_key,SECRET_KEY=auth-config:session_secret" \
        --min-instances=1 \
        --max-instances=20 \
        --execution-environment=gen2 \
        --project=${PROJECT_ID}
      
      # Get Cloud Run URL
      CLOUD_RUN_URL=$(gcloud run services describe threat-intelligence-platform --region=us-central1 --project=${PROJECT_ID} --format='value(status.url)')
      echo "Deployed to: $CLOUD_RUN_URL"

  # Verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify-deployment'
    script: |
      echo "Verifying deployment..."
      
      # Define project ID
      PROJECT_ID="primal-chariot-382610"
      
      # Wait for service to be ready
      sleep 60
      service_url=$(gcloud run services describe threat-intelligence-platform --region=us-central1 --project=${PROJECT_ID} --format='value(status.url)')
      echo "Service deployed at: ${service_url}"
      
      # Check health endpoint
      max_attempts=10
      for attempt in $(seq 1 $max_attempts); do
        echo "Health check attempt $attempt of $max_attempts..."
        response_code=$(curl -s -o /dev/null -w "%{http_code}" "${service_url}/health" || echo "failed")
        if [ "$response_code" = "200" ]; then
          echo "✅ Health check successful!"
          break
        else
          echo "⚠️ Health check returned: $response_code - waiting 30s..."
          sleep 30
        fi
      done
      
      echo "Deployment completed successfully! Service URL: ${service_url}"

# Build timeout and options
timeout: '3600s'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
