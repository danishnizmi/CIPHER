apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: threat-intelligence-platform
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
  labels:
    app: threat-intelligence-platform
    environment: production
spec:
  template:
    metadata:
      annotations:
        # Cost optimization: Scale to zero when not in use
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        # Startup boost for better user experience
        run.googleapis.com/startup-cpu-boost: "true"
        # CPU throttling for cost savings during idle periods
        run.googleapis.com/cpu-throttling: "true"
      labels:
        app: threat-intelligence-platform
        environment: production
    spec:
      # Reduce concurrent connections for better stability with less resources
      containerConcurrency: 50
      # 5 minute timeout for requests
      timeoutSeconds: 300
      containers:
      - image: gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest
        ports:
        - name: http1
          containerPort: 8080
        # Cost-effective resources: 2 CPU, 2GB memory
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
          requests:
            cpu: "1"
            memory: "512Mi"
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: GCP_PROJECT
          value: "${PROJECT_ID}"
        - name: GCP_REGION
          value: "us-central1"
        - name: BIGQUERY_DATASET
          value: "threat_intelligence"
        - name: GCS_BUCKET
          value: "${PROJECT_ID}-threat-data"
        - name: PUBSUB_TOPIC
          value: "threat-data-ingestion"
        - name: PUBSUB_ANALYSIS_TOPIC
          value: "threat-analysis-events"
        - name: VERSION
          value: "1.0.3"
        - name: DEBUG
          value: "false"
        - name: PYTHONPATH
          value: "/app"
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        # Cost optimization: Reduce BigQuery bytes billed
        - name: BIGQUERY_MAX_BYTES_BILLED
          value: "104857600"  # 100MB
        # Cost optimization: Turn off autoanalysis for manual control
        - name: AUTO_ANALYZE
          value: "false"
        # Authentication settings
        - name: AUTH_ENABLED
          value: "true"
        - name: SESSION_COOKIE_SECURE
          value: "true"
        - name: SESSION_COOKIE_HTTPONLY
          value: "true"
        - name: SESSION_COOKIE_SAMESITE
          value: "Lax"
        - name: SESSION_USE_SIGNER
          value: "true"
        - name: SESSION_KEY_PREFIX
          value: "threat_intel:"
        - name: SESSION_PROTECTION
          value: "basic"
        - name: PREFERRED_URL_SCHEME
          value: "https"
        # Only use secrets for sensitive variables, not direct values
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: latest
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auth-config
              key: latest
        # Optimized Gunicorn settings for performance
        - name: GUNICORN_WORKERS
          value: "2" 
        - name: GUNICORN_THREADS
          value: "4"
        - name: GUNICORN_TIMEOUT
          value: "120"
        - name: GUNICORN_WORKER_CLASS
          value: "gthread"
        # Logging settings
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOG_TO_CLOUD
          value: "true"
        - name: ENABLE_ERROR_REPORTING
          value: "true"
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-data
          mountPath: /app/data
        # Mount secrets as volumes
        - name: api-keys-volume
          readOnly: true
          mountPath: /app/secrets/api-keys
        - name: auth-config-volume
          readOnly: true
          mountPath: /app/secrets/auth-config
        - name: feed-config-volume
          readOnly: true
          mountPath: /app/secrets/feed-config
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
      - name: app-data
        emptyDir:
          medium: Memory
      - name: api-keys-volume
        secret:
          secretName: api-keys
          items:
          - key: latest
            path: api-keys.json
      - name: auth-config-volume
        secret:
          secretName: auth-config
          items:
          - key: latest
            path: auth-config.json
      - name: feed-config-volume
        secret:
          secretName: feed-config
          items:
          - key: latest
            path: feed-config.json
  traffic:
  - percent: 100
    latestRevision: true
