apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: threat-intelligence-platform
  annotations:
    run.googleapis.com/client-name: "cloud-console"
    run.googleapis.com/launch-stage: "BETA"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/client-name: "cloud-console"
        run.googleapis.com/vpc-access-connector: "connector-threat-intel"
        run.googleapis.com/vpc-access-egress: "all-traffic"
        run.googleapis.com/cloudsql-instances: ""
    spec:
      serviceAccountName: "cloud-build-service@primal-chariot-382610.iam.gserviceaccount.com"
      timeoutSeconds: 300
      containerConcurrency: 80
      containers:
      - image: gcr.io/primal-chariot-382610/threat-intelligence-platform:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
        env:
        - name: GCP_PROJECT
          value: "primal-chariot-382610"
        - name: ENVIRONMENT
          value: "production"
        - name: GCP_REGION
          value: "us-central1"
        - name: BIGQUERY_DATASET
          value: "threat_intelligence"
        - name: PORT
          value: "8080"
        - name: GO_INGESTION_PORT
          value: "8081"
        - name: API_URL
          value: "https://api-production.primal-chariot-382610.cloudfunctions.net"
        - name: GCS_BUCKET
          value: "primal-chariot-382610-threat-data"
        - name: PUBSUB_TOPIC
          value: "threat-data-ingestion"
        - name: API_KEY
          value: "b03bb05c6597c6473e83a271c0bb5d492061fea4c0e67cc7"
        - name: SECRET_KEY
          value: "5a92c3067bc4587d021925678ea071825973c85c2b824df3bfff14ff8bc803a9"
        - name: VERSION
          value: "1.0.2" 
        - name: REQUIRE_AUTH
          value: "true"
        - name: SERVICE_ACCOUNT
          value: "cloud-build-service@primal-chariot-382610.iam.gserviceaccount.com"
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20  # Increased from 10 to give more startup time
          periodSeconds: 10
          failureThreshold: 5      # Increased from 3 to allow more retry attempts
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
  traffic:
  - percent: 100
    latestRevision: true
