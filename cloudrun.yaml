apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: threat-intelligence-platform
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
  labels:
    app: threat-intelligence-platform
    environment: production
    managed-by: cloudbuild
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cpu-throttling: "false"
      labels:
        app: threat-intelligence-platform
        environment: production
        managed-by: cloudbuild
    spec:
      containerConcurrency: 80
      timeoutSeconds: 900
      serviceAccountName: cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com
      containers:
      - name: threat-intelligence-platform-1
        image: gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest
        command: ["/app/init-app.sh"]
        args: ["gunicorn", "--bind", "0.0.0.0:8080", "--workers", "2", "--threads", "4", "--timeout", "120", "--worker-class", "gthread", "--preload", "--log-level", "info", "app:app"]
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: ENVIRONMENT
          value: production
        - name: GCP_PROJECT
          value: ${PROJECT_ID}
        - name: GCP_REGION
          value: us-central1
        - name: BIGQUERY_DATASET
          value: threat_intelligence
        - name: GCS_BUCKET
          value: ${PROJECT_ID}-threat-data
        - name: PUBSUB_TOPIC
          value: threat-data-ingestion
        - name: PUBSUB_ANALYSIS_TOPIC
          value: threat-analysis-events
        - name: VERSION
          value: 1.0.3
        - name: DEBUG
          value: 'false'
        - name: PYTHONPATH
          value: /app
        - name: PYTHONDONTWRITEBYTECODE
          value: '1'
        - name: PYTHONUNBUFFERED
          value: '1'
        - name: LOG_LEVEL
          value: INFO
        - name: LOG_TO_CLOUD
          value: 'true'
        - name: ENABLE_ERROR_REPORTING
          value: 'true'
        - name: AUTO_ANALYZE
          value: 'false'
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              key: latest
              name: api-keys
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: latest
              name: auth-config
        resources:
          limits:
            cpu: '2'
            memory: 2Gi
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-data
          mountPath: /app/data
        - name: api-keys-volume
          mountPath: /app/secrets/api-keys
          readOnly: true
        - name: auth-config-volume
          mountPath: /app/secrets/auth-config
          readOnly: true
        - name: feed-config-volume
          mountPath: /app/secrets/feed-config
          readOnly: true
        - name: admin-password-volume
          mountPath: /app/secrets/admin-password
          readOnly: true
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
      - name: app-data
        emptyDir:
          medium: Memory
      - name: api-keys-volume
        secret:
          secretName: api-keys
      - name: auth-config-volume
        secret:
          secretName: auth-config
      - name: feed-config-volume
        secret:
          secretName: feed-config
      - name: admin-password-volume
        secret:
          secretName: admin-initial-password
  traffic:
  - percent: 100
    latestRevision: true
