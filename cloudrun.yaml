apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: threat-intelligence-platform
  namespace: '561511062593'
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
  labels:
    app: threat-intelligence-platform
    environment: production
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
      labels:
        app: threat-intelligence-platform
        environment: production
    spec:
      containerConcurrency: 80
      timeoutSeconds: 900
      serviceAccountName: cloud-build-service@primal-chariot-382610.iam.gserviceaccount.com
      containers:
      - image: gcr.io/primal-chariot-382610/threat-intelligence-platform:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: "4"
            memory: "4Gi"
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: GCP_PROJECT
          value: "primal-chariot-382610"
        - name: GCP_REGION
          value: "us-central1"
        - name: BIGQUERY_DATASET
          value: "threat_intelligence"
        - name: GCS_BUCKET
          value: "primal-chariot-382610-threat-data"
        - name: PUBSUB_TOPIC
          value: "threat-data-ingestion"
        - name: PUBSUB_ANALYSIS_TOPIC
          value: "threat-analysis-events"
        - name: VERSION
          value: "1.0.3"
        - name: PYTHONPATH
          value: "/app"
        - name: LOAD_SECRETS
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        - name: SESSION_COOKIE_SECURE
          value: "true"
        - name: SESSION_COOKIE_HTTPONLY
          value: "true"
        - name: SESSION_COOKIE_SAMESITE
          value: "Lax"
        - name: SESSION_USE_SIGNER
          value: "true"
        - name: SESSION_KEY_PREFIX
          value: "threat_intel:"
        - name: PREFERRED_URL_SCHEME
          value: "https"
        - name: SESSION_PROTECTION
          value: "basic"
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: latest
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auth-config
              key: latest
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
  traffic:
  - percent: 100
    latestRevision: true
