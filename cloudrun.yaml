apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: threat-intelligence-platform
  namespace: '${PROJECT_ID}'
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
  labels:
    app: threat-intelligence-platform
    environment: production
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
      labels:
        app: threat-intelligence-platform
        environment: production
    spec:
      containerConcurrency: 80
      timeoutSeconds: 900
      serviceAccountName: cloud-build-service@${PROJECT_ID}.iam.gserviceaccount.com
      containers:
      - image: gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: "4"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "1Gi"
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: GCP_PROJECT
          value: "${PROJECT_ID}"
        - name: GCP_REGION
          value: "us-central1"
        - name: BIGQUERY_DATASET
          value: "threat_intelligence"
        - name: GCS_BUCKET
          value: "${PROJECT_ID}-threat-data"
        - name: PUBSUB_TOPIC
          value: "threat-data-ingestion"
        - name: PUBSUB_ANALYSIS_TOPIC
          value: "threat-analysis-events"
        - name: VERSION
          value: "1.0.3"
        - name: PYTHONPATH
          value: "/app"
        - name: LOAD_SECRETS
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        - name: SESSION_COOKIE_SECURE
          value: "true"
        - name: SESSION_COOKIE_HTTPONLY
          value: "true"
        - name: SESSION_COOKIE_SAMESITE
          value: "Lax"
        - name: SESSION_USE_SIGNER
          value: "true"
        - name: SESSION_KEY_PREFIX
          value: "threat_intel:"
        - name: PREFERRED_URL_SCHEME
          value: "https"
        - name: SESSION_PROTECTION
          value: "basic"
        - name: GUNICORN_WORKERS
          value: "2"
        - name: GUNICORN_THREADS
          value: "4"
        - name: USE_ENV_VARS_FOR_SECRETS
          value: "true"
        - name: BIGQUERY_MAX_BYTES_BILLED
          value: "1073741824"
        # API key as environment variable first (Cloud Run will use Secret if available)
        - name: API_KEY
          value: "dev-api-key"
        # Also include as Secret reference if exists
        - name: API_KEY_FROM_SECRET
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: latest
              optional: true
        # Secret key as environment variable first
        - name: SECRET_KEY
          value: "dev-secret-key"  
        # Also include as Secret reference if exists
        - name: SECRET_KEY_FROM_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-config
              key: latest
              optional: true
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-data
          mountPath: /app/data
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
      - name: app-data
        emptyDir:
          medium: Memory
  traffic:
  - percent: 100
    latestRevision: true
