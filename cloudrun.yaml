apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: threat-intelligence-platform
  annotations:
    run.googleapis.com/client-name: "cloud-console"
    run.googleapis.com/launch-stage: "BETA"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: "cloud-build-service@primal-chariot-382610.iam.gserviceaccount.com"
      timeoutSeconds: 300
      containerConcurrency: 80
      containers:
      - image: gcr.io/primal-chariot-382610/threat-intelligence-platform:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
        env:
        - name: GCP_PROJECT
          value: "primal-chariot-382610"
        - name: ENVIRONMENT
          value: "production"
        - name: GCP_REGION
          value: "us-central1"
        - name: BIGQUERY_DATASET
          value: "threat_intelligence"
        - name: PORT
          value: "8080"
        - name: API_URL
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['run.googleapis.com/custom-domain']
        - name: GCS_BUCKET
          value: "primal-chariot-382610-threat-data"
        - name: PUBSUB_TOPIC
          value: "threat-data-ingestion"
        - name: PUBSUB_ANALYSIS_TOPIC
          value: "threat-analysis-events"
        - name: REQUIRE_AUTH
          value: "true"
        - name: VERSION
          value: "1.0.2"
        - name: DEBUG
          value: "false"
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
  traffic:
  - percent: 100
    latestRevision: true
