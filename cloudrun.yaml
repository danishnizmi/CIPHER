apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: threat-intelligence-platform
  annotations:
    run.googleapis.com/client-name: "cloud-console"
    run.googleapis.com/launch-stage: "BETA"
    autoscaling.knative.dev/maxScale: "20"
    run.googleapis.com/cpu-throttling: "false"
  labels:
    app: threat-intelligence-platform
    environment: production
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/execution-environment: "gen2"
        run.googleapis.com/cloudsql-instances: ""
    spec:
      serviceAccountName: "threat-intelligence-sa@${PROJECT_ID}.iam.gserviceaccount.com"
      timeoutSeconds: 300
      containerConcurrency: 80
      containers:
      - image: gcr.io/${PROJECT_ID}/threat-intelligence-platform:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
        env:
        - name: GCP_PROJECT
          value: "${PROJECT_ID}"
        - name: ENVIRONMENT
          value: "production"
        - name: GCP_REGION
          value: "us-central1"
        - name: BIGQUERY_DATASET
          value: "threat_intelligence"
        - name: PORT
          value: "8080"
        - name: API_URL
          value: "https://threat-intelligence-platform-${HASH}-${REGION}.a.run.app"
        - name: GCS_BUCKET
          value: "${PROJECT_ID}-threat-data"
        - name: PUBSUB_TOPIC
          value: "threat-data-ingestion"
        - name: PUBSUB_ANALYSIS_TOPIC
          value: "threat-analysis-events"
        - name: REQUIRE_AUTH
          value: "true"
        - name: VERSION
          value: "${COMMIT_SHA}"
        - name: DEBUG
          value: "false"
        - name: PYTHONPATH
          value: "/app"
        - name: CLOUD_LOGGING
          value: "true"
        - name: ENABLE_ERROR_REPORTING
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: platform_api_key
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auth-config
              key: session_secret
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-data
          mountPath: /app/data
      volumes:
      - name: tmp
        emptyDir: {}
      - name: app-data
        emptyDir: {}
  traffic:
  - percent: 100
    latestRevision: true
