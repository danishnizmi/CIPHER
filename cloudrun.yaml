apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: threat-intelligence-platform
  namespace: '561511062593'
  annotations:
    run.googleapis.com/client-name: "cloud-console"
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
  labels:
    app: threat-intelligence-platform
    environment: production
    managed-by: cloudbuild
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/execution-environment: "gen2"
      labels:
        app: threat-intelligence-platform
        managed-by: cloudbuild
        run.googleapis.com/startupProbeType: Default
    spec:
      serviceAccountName: "threat-intelligence-sa@primal-chariot-382610.iam.gserviceaccount.com"
      timeoutSeconds: 300
      containerConcurrency: 80
      containers:
      - image: gcr.io/primal-chariot-382610/threat-intelligence-platform:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
        env:
        - name: GCP_PROJECT
          value: "primal-chariot-382610"
        - name: ENVIRONMENT
          value: "production"
        - name: GCP_REGION
          value: "us-central1"
        - name: BIGQUERY_DATASET
          value: "threat_intelligence"
        - name: GCS_BUCKET
          value: "primal-chariot-382610-threat-data"
        - name: PUBSUB_TOPIC
          value: "threat-data-ingestion"
        - name: PUBSUB_ANALYSIS_TOPIC
          value: "threat-analysis-events"
        - name: VERSION
          value: "1.0.2"
        - name: DEBUG
          value: "false"
        - name: PYTHONPATH
          value: "/app"
        - name: CLOUD_LOGGING
          value: "true"
        - name: ENABLE_ERROR_REPORTING
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOAD_SECRETS
          value: "true"
        - name: ENSURE_GCP_RESOURCES
          value: "true"
        - name: IGNORE_PERMISSION_ERRORS 
          value: "false"
        # Secret references
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: latest
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auth-config
              key: latest
        # Health Check Probes - HTTP based
        startupProbe:
          httpGet:
            path: /health
            port: http1
          periodSeconds: 10
          timeoutSeconds: 30
          failureThreshold: 30
          successThreshold: 1
        livenessProbe:
          httpGet:
            path: /health
            port: http1
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-data
          mountPath: /app/data
        - name: api-keys-volume
          mountPath: /app/secrets/api-keys
          readOnly: true
        - name: auth-config-volume
          mountPath: /app/secrets/auth-config
          readOnly: true
        - name: feed-config-volume
          mountPath: /app/secrets/feed-config
          readOnly: true
        - name: admin-password-volume
          mountPath: /app/secrets/admin-password
          readOnly: true
      volumes:
      - name: tmp
        emptyDir: {}
      - name: app-data
        emptyDir: {}
      - name: api-keys-volume
        secret:
          secretName: api-keys
          items:
          - key: latest
            path: api-keys.json
      - name: auth-config-volume
        secret:
          secretName: auth-config
          items:
          - key: latest
            path: auth-config.json
      - name: feed-config-volume
        secret:
          secretName: feed-config
          items:
          - key: latest
            path: feed-config.json
      - name: admin-password-volume
        secret:
          secretName: admin-initial-password
          items:
          - key: latest
            path: admin-password.txt
  traffic:
  - percent: 100
    latestRevision: true
